services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # DATABASE_URL must be set in .env (env_file above) — no default here
      # so the env_file value is never silently shadowed by a hardcoded fallback.
      # Internal Docker DNS uses the service name "db" on port 5432.
      # Example: DATABASE_URL=postgresql://harmoven:CHANGE_ME@db:5432/harmoven
      # LiteLLM gateway — app talks to sidecar, NEVER to provider APIs directly (Am.91).
      # Only relevant when litellm.enabled=true in orchestrator.yaml.
      - LITELLM_GATEWAY_URL=${LITELLM_GATEWAY_URL:-http://litellm:4000}
    networks:
      - app_net          # reaches db + docker-proxy + internet (LLM direct calls)
      - litellm_net      # reaches litellm sidecar (opt-in)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    # Enforce synchronous_commit=on (spec §34 crash safety requirement).
    # PostgreSQL defaults to on, but we make it explicit so a future tuning
    # pass cannot silently lower it without touching this file.
    command: postgres -c synchronous_commit=on
    ports:
      # Bind to loopback only — DB must not be reachable from external hosts.
      - "127.0.0.1:${HARMOVEN_DB_PORT:-5432}:5432"
    networks:
      - app_net          # only the app service is on this network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-harmoven}
      POSTGRES_USER: ${POSTGRES_USER:-harmoven}
      # SECURITY: POSTGRES_PASSWORD must be set in .env — no default is provided.
      # Use: POSTGRES_PASSWORD=$(openssl rand -base64 32)
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmoven -d harmoven"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # LiteLLM sidecar — Amendment 91 (T3.8 supply chain security)
  # Opt-in: set litellm.enabled: true in orchestrator.yaml to activate.
  #
  # Isolation requirements (Am.91):
  #   - Image pinned by digest (NOT by tag — prevents tag-hijacking attacks)
  #   - Runs on isolated internal network only (no direct host port exposure in prod)
  #   - Receives ONLY LLM API provider keys, NOT DATABASE_URL, AUTH_SECRET, or LITELLM_MASTER_KEY
  #   - App receives ONLY LITELLM_GATEWAY_URL — never the raw provider API keys
  #
  # LITELLM_DIGEST must be set in .env — use the immutable digest for the pinned version.
  # Example: LITELLM_DIGEST=sha256:abc123...
  # Find digest via: docker pull ghcr.io/berriai/litellm:main-v1.82.6 && docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/berriai/litellm:main-v1.82.6
  litellm:
    image: ghcr.io/berriai/litellm@${LITELLM_DIGEST:?LITELLM_DIGEST must be set in .env — use immutable digest, not a tag}
    # No 'ports:' here — accessible only via internal Docker DNS: http://litellm:4000
    # Expose to host ONLY for local development by adding: ports: ["127.0.0.1:4000:4000"]
    # litellm_net is NOT internal — LiteLLM needs internet to reach provider APIs.
    # LiteLLM is isolated from app_net (cannot reach the DB).
    networks:
      - litellm_net
    environment:
      # LiteLLM receives ONLY its own master key + LLM provider API keys.
      # DATABASE_URL, AUTH_SECRET, and app secrets MUST NOT be in this block.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set in .env}
      # Add only the provider keys LiteLLM needs (omit keys for disabled providers):
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - litellm   # only started when: docker compose --profile litellm up

  # Docker socket proxy (Tecnativa) — Amendment 92 H4.
  # The Smoke Test Agent needs Docker to launch preview containers but must NOT
  # have full Docker socket access. This proxy restricts it to the minimum needed.
  #
  # DOCKER_PROXY_DIGEST must be set in .env — use an immutable digest, not a tag.
  # Find digest: docker pull ghcr.io/tecnativa/docker-socket-proxy:latest &&
  #   docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/tecnativa/docker-socket-proxy:latest
  docker-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy@${DOCKER_PROXY_DIGEST:?DOCKER_PROXY_DIGEST must be set in .env — use immutable digest, not a tag}
    environment:
      # ── Allow what the Smoke Test Agent needs ─────────────────────────────
      CONTAINERS: 1    # list, inspect, start, stop containers
      IMAGES:     1    # pull images for preview containers
      NETWORKS:   1    # create/inspect preview networks
      POST:       1    # allow POST operations (start/stop/create)
      # ── Explicitly block dangerous capabilities ────────────────────────────
      AUTH:       0    # no auth config access
      BUILD:      0    # no docker build (prevents arbitrary code execution)
      COMMIT:     0    # no docker commit (prevents image poisoning)
      CONFIGS:    0    # no swarm configs
      DISTRIBUTION: 0  # no registry access from proxy
      EXEC:       0    # NO exec into containers — critical: prevents shell escape
      INFO:       0    # no daemon info (hides host system details)
      NODES:      0    # no swarm nodes
      PING:       0    # no ping (reduce fingerprinting)
      PLUGINS:    0    # no plugin management
      SECRETS:    0    # no swarm secrets
      SERVICES:   0    # no swarm services
      SESSION:    0    # no session management
      SWARM:      0    # no swarm operations
      SYSTEM:     0    # no system-level access
      TASKS:      0    # no swarm tasks
      VERSION:    0    # no version endpoint
      VOLUMES:    0    # no volume creation/deletion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # read-only mount — proxy enforces further restrictions
    networks:
      - app_net          # reachable from app only (no other service is on app_net)
    restart: unless-stopped
    # No ports exposed — app connects via internal Docker network only

volumes:
  postgres_data:

networks:
  app_net:
    # Main application network: app ↔ db, app ↔ docker-proxy, app → internet.
    # NOT internal — the app needs outbound internet for DirectLLMClient calls
    # (Anthropic, OpenAI, Google, etc.) when LiteLLM sidecar is not active.
    driver: bridge
  litellm_net:
    # Network between app and LiteLLM sidecar.
    # NOT internal — LiteLLM needs outbound internet to reach provider APIs.
    # LiteLLM is isolated from app_net: it CANNOT reach the DB.
    driver: bridge
