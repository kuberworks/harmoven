              properties:
                finding_id:
                  type: string
                  description: "Identifier of the Critical Reviewer finding, scoped to the result it belongs to."
                finding:
                  $ref: '#/components/schemas/CriticalFinding'
                  description: "Complete CriticalFinding object to be actioned (ignored or queued for fix)."
                result_id:
                  type: string
                  description: "Identifier of the Critical Reviewer output result that contains this finding."
      responses:
        '200':
          description: "Finding marked as acknowledged-and-ignored. The decision is appended to the immutable audit trail with the caller's identity and timestamp. The human gate can now be approved despite this finding remaining unresolved."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/critical-fix:
    post:
      operationId: fixCriticalFinding
      x-required-permissions: [gates:read_critical]
      summary: Trigger targeted fix for a critical finding (Am.75)
      description: |
        > **Required permission:** `gates:read_critical` — minimum role: `operator`
        Dispatches a fix sub-agent with a $0.10 USD budget cap.
        Returns immediately — fix runs asynchronously.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [finding_id, finding, result_id]
              properties:
                finding_id:
