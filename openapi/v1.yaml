  # ══════════════════════════════════════════════════════════════════════════
  # PIPELINE TEMPLATES
  # ══════════════════════════════════════════════════════════════════════════

  /pipeline-templates:
    get:
      operationId: listPipelineTemplates
      summary: List pipeline templates visible to caller
      description: |
        Returns templates created by the calling user, public templates, and
        templates scoped to projects the caller has access to.
        Optionally filtered by `project_id`. API key callers are not allowed.
      tags: [pipeline-templates]
      parameters:
        - in: query
          name: project_id
          schema:
            type: string
            format: uuid
          description: "Filter templates to a specific project."
      responses:
        '200':
          description: "List of pipeline templates."
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createPipelineTemplate
      summary: Create a new pipeline template
      description: |
        Creates a reusable pipeline template from a DAG definition.
        API key callers are not allowed — session auth required.
      tags: [pipeline-templates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dag]
              properties:
                name:
                  type: string
                  description: "Human-readable template name."
                description:
                  type: string
                  description: "Optional description of the template's purpose."
                project_id:
                  type: string
                  format: uuid
                  description: |
                    Optional project scope. If omitted the template is personal (visible to the creating user only).
                    **Security:** When supplied, the caller must be a member of the referenced project — returns `403 Forbidden` otherwise.
                is_public:
                  type: boolean
                  default: false
                  description: "When true, the template is visible to all users on the instance."
                dag:
                  type: object
                  required: [nodes, edges]
                  description: "DAG definition (`{ nodes: [], edges: [] }`)."
              additionalProperties: false
      responses:
        '201':
          description: "Template created successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/PipelineTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /pipeline-templates/{id}:
    get:
      operationId: getPipelineTemplate
      summary: Get a pipeline template
      description: |
        Returns the full template object including its current DAG definition.
        Accessible to the creator, any user with access to the scoped project,
        and `instance_admin` accounts. Returns 404 for templates that exist but
        are not accessible to the caller (prevents enumeration).
      tags: [pipeline-templates]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: "Pipeline template with its version history."
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/PipelineTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePipelineTemplate
      summary: Update a pipeline template
      description: |
        Updates the template. If `dag` changes, a new version is created automatically.
        Only the creator or an `instance_admin` can modify a template.
      tags: [pipeline-templates]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "New human-readable name for the template."
                description:
                  type: string
                  description: "Updated description of the template's purpose."
                is_public:
                  type: boolean
                  description: "Change template visibility. `true` makes it visible to all instance users; `false` restricts it to the creator and project members."
                dag:
                  type: object
                  description: "New DAG definition. Providing this field creates a new immutable version — the previous version is preserved in version history."
                change_note:
                  type: string
                  description: "Optional human-readable note describing what changed in this version."
              additionalProperties: false
      responses:
        '200':
          description: "Updated template."
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    $ref: '#/components/schemas/PipelineTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deletePipelineTemplate
      summary: Delete a pipeline template
      description: "Only the creator or an `instance_admin` can delete a template."
      tags: [pipeline-templates]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: "Template deleted."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /pipeline-templates/{id}/feedback:
    post:
      operationId: recordPipelineTemplateFeedback
      summary: Record run feedback or accept AI suggestion for a template
      description: |
        Two actions in one endpoint controlled by the request body:
        - **Record feedback** (`run_id` required): associates a run outcome with
          the template and may trigger an async AI improvement suggestion.
        - **Accept suggestion** (`accept_suggestion: true`): promotes the pending
          AI-generated DAG suggestion into a new template version.

        **Authorization rules:**
        - Session authentication is required.
        - The caller must have access to the project the template is scoped to
          (or be an `instance_admin` for global templates).
        - `accept_suggestion` is restricted to the template creator and
          `instance_admin` accounts.
        - When `run_id` is supplied, the run must belong to the same project.
        - Returns 404 for templates that do not exist or are not visible to the
          caller (prevents enumeration).
      tags: [pipeline-templates]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                run_id:
                  type: string
                  format: uuid
                  description: "Required when recording feedback. The run whose outcome is being reported."
                user_rating:
                  type: number
                  description: "Optional numeric quality rating for the run."
                change_note:
                  type: string
                  description: "Optional human-readable note about what should change."
                accept_suggestion:
                  type: boolean
                  description: "When `true`, accepts the pending AI suggestion and creates a new template version. Omit or set `false` to record feedback instead."
              additionalProperties: false
      responses:
        '200':
          description: "Feedback recorded or suggestion accepted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  recorded:
                    type: boolean
                    description: "Present and `true` when run feedback was successfully stored. An async AI suggestion generation may have been triggered."
                  accepted:
                    type: boolean
                    description: "Present and `true` when the pending AI suggestion was promoted to a new template version."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ══════════════════════════════════════════════════════════════════════════
  # PROJECTS
  # ══════════════════════════════════════════════════════════════════════════

  /projects:
    get:
      operationId: listProjects
      x-required-permissions: [project:read]
      summary: List accessible projects
      description: |
        > **Required permission:** `project:read` — minimum role: `viewer`
        `instance_admin`: all projects. Others: projects where caller is a member.
      tags: [projects]
      parameters:
        - in: query
          name: page
          description: "Page number to retrieve (1-indexed). Combine with `per_page` to paginate large result sets."
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          description: "Number of records per page. Maximum 100. Controls response payload size."
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: "Paginated list of projects visible to the caller. Callers with `instance_admin` role receive all projects; other roles receive only projects where they are a member. Use `total` and `per_page` to compute the page count."
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                    description: "Total count of resources matching the query, before pagination. Use with `per_page` to compute total pages."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimit'
    post:
      operationId: createProject
      x-required-permissions: [runs:create]
      summary: Create a project
      description: |
        > **Required permission:** `runs:create` — minimum role: `user`
        Creates a new project. The caller becomes the first `admin` member.
        A `config.git` repository is initialized at creation.
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, domain_profile]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                  description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
                description:
                  type: string
                  maxLength: 500
                  description: "Optional human-readable description of this project's purpose, scope, or domain context. Max 500 characters. Displayed in the project list and admin panel."
                domain_profile:
                  $ref: '#/components/schemas/DomainProfile'
                  description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
                confidentiality:
                  $ref: '#/components/schemas/Confidentiality'
                  description: "Data sensitivity level applied to LLM routing. Determines which providers are eligible. See `Confidentiality` schema."
                regulatory_ctx:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: "Project created. The caller is automatically added as the first `admin` member. A bare `config.git` repository is initialised in the instance's git root partition. `domain_profile` defaults to `generic` if not supplied."
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                    description: "The full Project object for the created or retrieved project."
        '400':
          description: "`name` is missing, empty, or exceeds 120 characters; or a project with the same name already exists for this instance. Check `error.details.field` for the specific constraint violated."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /projects/{projectId}:
    get:
      operationId: getProject
      x-required-permissions: [project:read]
      summary: Get project details
      description: |
        > **Required permission:** `project:read` — minimum role: `viewer`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: "Full `Project` object including domain profile, confidentiality level, regulatory context, config hash, and timestamps. The `config` map contains project-specific overrides as committed to `config.git`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                    description: "The full Project object for the created or retrieved project."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
    patch:
      operationId: updateProject
      x-required-permissions: [project:edit]
      summary: Update project metadata
      description: |
        > **Required permission:** `project:edit` — minimum role: `developer`

        Partial update. If `config` is included, it is both written to the DB and
        committed to the project's `config.git` repository (auto-commit — Am.83).

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                  description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
                description:
                  type: string
                  description: "Optional human-readable description of this project's purpose, scope, or context. Updates are written to `config.git` alongside other config changes when `config` is also supplied."
                domain_profile:
                  $ref: '#/components/schemas/DomainProfile'
                  description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
                confidentiality:
                  $ref: '#/components/schemas/Confidentiality'
                  description: "Data sensitivity level applied to LLM routing. Determines which providers are eligible. See `Confidentiality` schema."
                regulatory_ctx:
                  type: array
                  items:
                    type: string
                config:
                  type: object
                  additionalProperties: true
                  description: "Project-level config overrides — auto-committed to config.git"
      responses:
        '200':
          description: "Project metadata updated and changes committed to `config.git` as an auto-commit. `config_git_hash` and `config_git_at` reflect the new commit. Returns the full updated `Project` object."
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                    description: "The full Project object for the created or retrieved project."
        '400':
          description: "`name` is empty or exceeds 120 characters; no recognised patchable fields were supplied in the body; or `config` contains a key with a reserved `x-harmoven-` prefix. Check `error.details` for the specific error."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
    delete:
      operationId: archiveProject
      x-required-permissions: [admin:instance]
      summary: Archive (soft-delete) a project
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: "Project soft-deleted. All runs, nodes, and audit records are retained but no new runs can be submitted. Members lose access immediately. `config.git` is retained as read-only. `archived_at` is set on the project record."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimit'
  /projects/{projectId}/stream:
    get:
      operationId: streamProject
      x-required-permissions: [stream:project]
      summary: Subscribe to project-level SSE stream
      description: |
        > **Required permission:** `stream:project` — minimum role: `developer`

        Receives events from **all active runs** in the project, tagged with `run_id`.
        Additionally emits `ProjectLifecycleEvent` (run_started, run_finished, gate_opened).

        Same reconnect and filter semantics as the per-run stream.
      tags: [projects, sse]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: header
          name: Last-Event-ID
          description: "Last SSE event ID received by the client. The server resumes the stream from the next event after this ID, enabling transparent reconnection."
          schema:
            type: string
      responses:
        '200':
          description: "Project-level SSE stream opened. Aggregates lifecycle events across all runs in this project, each tagged with `run_id`. Events include `run_started`, `run_finished`, and `gate_opened`. Used by the Kanban board to stay current without polling."
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RunSSEEvent'
                  - $ref: '#/components/schemas/ProjectLifecycleEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── Members ────────────────────────────────────────────────────────────────
