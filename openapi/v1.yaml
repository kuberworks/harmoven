  /runs/{runId}/nodes/{nodeId}/interrupt:
    post:
      operationId: interruptNode
      x-required-permissions: [runs:abort]
      summary: Interrupt a streaming node (Am.65)
      description: |
        > **Required permission:** `runs:abort` — minimum role: `user`
        Aborts the in-flight LLM call for a specific node and transitions it to
        INTERRUPTED. A gate event is emitted so the user can decide what to do next
        (resume from partial, replay, or abort run).
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: "In-flight LLM call aborted. Node transitions to INTERRUPTED and `partial_output` is preserved. An SSE `human_gate` event is emitted. The operator must call `POST /runs/{runId}/nodes/{nodeId}/gate` to choose how to proceed."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  node_id:
                    type: string
                    description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/nodes/{nodeId}/gate:
    post:
      operationId: resolveInterruptGate
