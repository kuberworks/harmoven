  # ── Analytics (internal) ───────────────────────────────────────────────────
  /analytics:
    get:
      operationId: getAnalytics
      x-required-permissions: [admin:audit]
      summary: Retrieve analytics (session auth — admin:audit)
      description: |
        > **Required permission:** `admin:audit` — minimum role: `instance_admin`
        Full analytics access. Returns all project data for `instance_admin`;
        own-project anonymised data for project admins.
      tags: [analytics]
      parameters:
        - in: query
          name: from
          description: "Start of the analytics period (inclusive), ISO 8601 UTC timestamp, e.g. `2025-01-01T00:00:00Z`."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          description: "End of the analytics period (inclusive), ISO 8601 UTC timestamp. Defaults to the current UTC time when omitted."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: project_id
          description: "Filter results to a specific project. Required for admin endpoints when the instance admin manages multiple projects."
          schema:
            type: string
            format: uuid
        - in: query
          name: granularity
          description: "Time bucket size for timeseries data points: `hour`, `day`, `week`, or `month`. Coarser granularity reduces response size."
          schema:
            type: string
            enum: [day, week, month]
            default: week
        - in: query
          name: format
          description: "Response format for analytics exports: `json` (default) or `csv`. CSV format flattens nested fields for spreadsheet compatibility."
          schema:
            type: string
            enum: [json, csv, pdf]
            default: json
      responses:
        '200':
          description: "Aggregated analytics for the requested period and granularity. `instance_admin` callers receive organisation-wide data across all projects; other callers receive own-project data with user names anonymised. `timeseries` bucket size is controlled by the `granularity` parameter."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
            text/csv:
              schema:
                type: string
            text/html:
              schema:
                type: string
                description: "PDF-ready HTML"
        '400':
          description: "`from` or `to` is not a valid ISO 8601 timestamp; `to` is before `from`; `granularity` is not one of `hour|day|week|month`; or the requested period exceeds the maximum window (1 year for `day`, 90 days for `hour`)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: "The analytics module is disabled on this instance (`ANALYTICS_ENABLED=false` in server config). Contact the instance administrator to enable it."
