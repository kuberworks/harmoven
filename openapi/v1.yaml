                task_input_patch:
                  type: object
                  additionalProperties: true
                run_config_patch:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: "New PENDING run created as an independent copy of the source run, with `task_input_patch` and `run_config_patch` applied. The fork is fully independent — aborting the source does not affect it, and vice versa."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/Run'
                    description: "The full Run object representing the created or retrieved execution."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/pause:
    post:
      operationId: pauseRun
      x-required-permissions: [runs:pause]
      summary: Pause a running run (Am.63)
      description: |
        > **Required permission:** `runs:pause` — minimum role: `user`
        Transitions the run from RUNNING → PAUSED.
        In-progress nodes finish their current LLM call, then executor stops dispatching new ones.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: "Run transitioned to PAUSED. In-progress nodes complete their current LLM call before the executor halts. `paused_at` is set immediately. Use `POST /runs/{runId}/resume` to continue. The run remains paused indefinitely until explicitly resumed or aborted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    type: string
                    enum: [PAUSED]
                    description: "Always `PAUSED` after a successful pause. In-progress nodes complete their current LLM call before the executor halts. Use `POST /runs/{runId}/resume` to continue execution."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/re-review:
    post:
      operationId: reReviewRun
      x-required-permissions: [runs:replay]
      summary: Re-run the reviewer node on a completed run
      description: |
        > **Required permission:** `runs:replay` — minimum role: `developer`

        Resets the target REVIEWER node (and all nodes downstream of it) back to
        `PENDING`, transitions the run from `COMPLETED` back to `SUSPENDED`, and
        re-enters the execution loop.

        If `node_id` is omitted the first REVIEWER node in the DAG is used
        automatically. Returns `422` if the run has no REVIEWER node.

        **State effect:** `COMPLETED` → `SUSPENDED` → `RUNNING`
        Node(s) affected: `COMPLETED` → `PENDING`
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                node_id:
                  type: string
                  maxLength: 128
                  description: "DAG node identifier (e.g. `n3`) of the reviewer node to replay. Defaults to the first REVIEWER node in the DAG if omitted."
              additionalProperties: false
      responses:
        '200':
          description: "Reviewer node reset to PENDING and execution loop re-entered. All nodes downstream of the target were also reset to PENDING."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  run_id:
                    type: string
                    description: "Identifier of the parent run."
                  node_id:
                    type: string
                    description: "DAG node identifier of the reviewer node that was reset."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: "Run is not in COMPLETED status."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: "No REVIEWER node found in the run's DAG, or the supplied `node_id` does not exist."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'

  /runs/{runId}/resume:
    post:
      operationId: resumeRun
      x-required-permissions: [runs:pause]
      summary: Resume a paused run (Am.63)
      description: |
        > **Required permission:** `runs:pause` — minimum role: `user`
        Transitions PAUSED → RUNNING and re-enters the executor loop.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: "Run transitioned from PAUSED back to RUNNING. The executor re-enters the dispatch loop immediately and picks up PENDING nodes whose dependencies are satisfied. No nodes are restarted — only unstarted ones are dispatched. `paused_at` is cleared."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    type: string
                    enum: [RUNNING]
                    description: "Always `RUNNING` immediately after a successful resume. The executor re-enters the dispatch loop and picks up PENDING nodes whose upstream dependencies are satisfied. `paused_at` is cleared."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/inject:
    post:
      operationId: injectContext
      x-required-permissions: [runs:inject]
      summary: Inject context into a running run (Am.64)
      description: |
        > **Required permission:** `runs:inject` — minimum role: `user`
        Appends a user message to the `user_injections` list. Applied to all
        subsequent PENDING nodes once acknowledged.
        **Content limit:** 2 000 characters.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 2000
                  description: "Context text injected into subsequent agent system prompts"
      responses:
        '200':
          description: "Injection acknowledged and queued. The content will be prepended to the system prompt of all PENDING nodes dispatched after this call. Nodes already in RUNNING state are unaffected. The injection is recorded in `run.user_injections`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  injection:
                    type: object
                    properties:
                      content:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                        description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
        '400':
          description: "`content` exceeds 2 000 characters or is blank; or the run is not in an active state (RUNNING or PAUSED). Injections into COMPLETED, FAILED, or SUSPENDED runs are rejected immediately."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/feedback:
    patch:
      operationId: submitRunFeedback
      x-required-permissions: [runs:read]
      summary: Submit post-completion feedback (Am.85)
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`
        Records user-declared KPIs after a run COMPLETED. Used for ROI analytics.
        **Constraint:** run must be in COMPLETED status.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                estimated_hours_saved:
                  type: number
                  minimum: 0
                business_value_note:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: "Rating and ROI data persisted to the run record. `user_rating` and `estimated_hours_saved` are included in analytics aggregates from the next computation cycle. Feedback can be updated by calling this endpoint again after it has been submitted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '400':
