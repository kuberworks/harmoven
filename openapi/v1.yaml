  /v1/analytics:
    get:
      operationId: v1GetAnalytics
      x-required-permissions: [runs:read]
      summary: "[v1] Analytics (API key auth)"
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`

        Same data as `/api/analytics` but accessible via API key.
        Non-admin callers: own project data, anonymised user names.
      security:
        - BearerKey: []
      tags: [v1, analytics]
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: string
            format: uuid
          description: "Required for non-admin callers"
        - in: query
          name: from
          description: "Start of the analytics period (inclusive), ISO 8601 UTC timestamp, e.g. `2025-01-01T00:00:00Z`."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          description: "End of the analytics period (inclusive), ISO 8601 UTC timestamp. Defaults to the current UTC time when omitted."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: granularity
          description: "Time bucket size for timeseries data points: `hour`, `day`, `week`, or `month`. Coarser granularity reduces response size."
          schema:
            type: string
            enum: [day, week, month]
            default: week
        - in: query
          name: format
          description: "Response format for analytics exports: `json` (default) or `csv`. CSV format flattens nested fields for spreadsheet compatibility."
          schema:
            type: string
            enum: [json, csv, pdf]
            default: json
      responses:
        '200':
          description: "Analytics aggregates for the API key's project and the requested period. User names are anonymised unless the key's role includes `admin:audit`. Granularity defaults to `day` for periods up to 90 days, `week` for longer periods."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
            text/csv:
              schema:
                type: string
            text/html:
              schema:
                type: string
        '400':
          description: "Same constraints as `GET /analytics`: `from` or `to` is not a valid ISO 8601 timestamp; `to` is before `from`; `granularity` is not one of `day|week|month`; or the requested period exceeds the maximum window for the chosen granularity."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: "The analytics module is disabled on this instance (`ANALYTICS_ENABLED=false`). Contact the instance administrator to enable it."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
# ─── Tags ─────────────────────────────────────────────────────────────────────
tags:
  - name: system
    description: |
      Health, readiness, and observability endpoints. All are public (no authentication
      required). Used by load balancers, container orchestrators, and Prometheus scrapers.
  - name: auth
    description: |
      Authentication lifecycle — sign-in, sign-out, and session inspection. Managed by
      Better Auth ≥ 1.3.26 with Argon2id password hashing, TOTP, and Passkey support.
      Rate-limited to prevent brute-force attacks.
  - name: runs
    description: |
      Full AI task execution run lifecycle: creation, real-time monitoring, human gate
      resolution, pause/resume, context injection, node interruption, and feedback
      collection. The minimum required permission is `runs:read` (`viewer` role).
  - name: sse
    description: |
      Server-Sent Event (SSE) real-time streams. Events are filtered server-side by the
      caller's permission set. Supports reconnection via `Last-Event-ID` with a 30-second
      replay buffer backed by the `EventPayload` database table (24-hour TTL).
  - name: projects
    description: |
      Project management: create, update, and archive projects; manage team members,
      built-in and custom roles, and project-scoped API keys. Minimum required
      permission: `project:read` (`viewer` role).
  - name: admin
    description: |
      Instance administration. Endpoints in this group require at minimum the
      `developer` role (for triggers) or `admin`/`instance_admin` for models, skills,
      users, and instance-level operations. All writes emit immutable audit log entries.
  - name: analytics
    description: |
      Run analytics, KPIs, and ROI data. `instance_admin` callers receive organisation-wide
      aggregated data; project `admin` callers receive own-project data with anonymised user
      names. Requires `admin:audit` permission.
  - name: triggers
    description: |
      Inbound webhook trigger endpoint. Validates HMAC-SHA256 signature, timestamp
      freshness (< 5 minutes), and delivery idempotency. Fires an auto-run on the target
      project subject to global safety gates (20 runs/day, $10/day spend cap).
  - name: users
    description: |
      User preference endpoints. Allow the authenticated user to update their own
      locale and UI settings without requiring any elevated permission.
  - name: pipeline-templates
    description: |
      Reusable pipeline templates: create, retrieve, update, delete, and collect
      run feedback. Templates support automatic versioning when the DAG changes and
      optional AI-generated improvement suggestions based on run outcomes.
  - name: v1
    description: |
      Public API v1 — stable, versioned contract for third-party integrators and the
      official `@harmoven/sdk`. All routes require a Bearer API key. This tag group
      represents the externally published API surface; the internal session-authenticated
      routes above are consumed by the Harmoven web application only.

# ─── Tag groups (Redoc extension) ────────────────────────────────────────────
x-tagGroups:
  - name: Core API
    description: The primary API surface for running and monitoring AI task executions.
    tags: [runs, sse, projects, pipeline-templates]
  - name: Authentication
    tags: [auth, users]
  - name: System & Observability
    tags: [system, analytics, triggers]
  - name: Administration
    description: |
      Endpoints restricted to `admin` and `instance_admin` roles.
      All writes emit immutable audit log entries.
    tags: [admin]
  - name: Public API v1
    description: |
      Stable, bearer-key-authenticated API for external integrators.
      Rate limit: 60 req/min per key.
    tags: [v1]
