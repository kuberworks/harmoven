# orchestrator.yaml — Harmoven instance configuration
# No secrets here — commit this file. Secrets go in .env (never committed).
# Auto-synced to config.git on every change via PATCH /api/projects/:id (Am.83).

organization:
  name: "My Organization"
  preset: small_business           # small_business | enterprise | developer
  deployment_mode: docker          # docker | electron

execution_engine:
  provider: custom                 # custom | temporal | restate
  max_concurrent_nodes: 4          # per run — respected by CustomExecutor

llm:
  default_provider: anthropic
  profiles_active:
    - claude-haiku-4-5-20251001    # fast, low cost — default for most tasks
    - claude-sonnet-4-6            # balanced — complex tasks
    # - claude-opus-4-6            # premium — enable explicitly
    # - gemini-3-1-pro
    # - gpt-5-4

confidentiality:
  default_level: MEDIUM            # LOW | MEDIUM | HIGH | CRITICAL
  local_classifier: true           # always true — cloud never used for classification

privacy:
  presidio:
    enabled: false                 # opt-in — requires PRESIDIO_ENDPOINT in .env

secrets_backend:
  provider: internal               # internal | onecli
  key_rotation:
    alert_after_days: 80

security:
  mfa_required_for_admin: true     # enforced — TOTP or Passkey required
  mfa_required_for_user: false
  mfa_methods: [totp, passkey]
  email_verification: true
  session_timeout_minutes: 480     # 8 hours
  setup_token_required: true       # /setup route protected by token shown in Docker logs
  rate_limit_provider: memory      # memory (default, Electron-safe) | upstash (production)

proactivity:
  max_auto_runs_per_day: 20
  max_cost_usd_per_day: 10.00
  full_auto_enabled: false         # admin must enable explicitly

litellm:
  enabled: false                   # opt-in — requires LiteLLM sidecar in docker-compose.yml

memory:
  enabled: true
  scope: app_scaffolding           # v1: app_scaffolding only
  backend: sqlite                  # sqlite | postgres | pgvector

updates:
  auto_install: false              # true = silently install; false = notify only
  check_interval_hours: 24

regulatory:
  contexts: []                     # e.g. [gdpr, hipaa] — declare what applies

experimental:
  actor_stats:
    enabled: false                 # Am.80 — RunActorStats model present but disabled
  mcp_server:
    enabled: false                 # Am.81 — MCP server exposure disabled by default
    transport: stdio               # stdio | sse
    gate_strategy: suspend         # suspend | auto_approve | reject

app_scaffolding:
  preview:
    mode: auto                     # auto | subdomain | subpath | screenshots
    # wildcard_domain: ""          # e.g. "preview.harmoven.mycompany.com"
    #                              # Requires: *.preview.harmoven.mycompany.com DNS + TLS
    # base_url: ""                 # auto-detected from AUTH_URL if empty
    port_range_start: 3100         # inclusive
    port_range_end: 3199           # inclusive (100 concurrent previews max)
    smoke_test_timeout_s: 30       # seconds to wait for the container to be healthy
