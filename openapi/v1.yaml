  /v1/profiles:
    get:
      operationId: v1ListProfiles
      x-required-permissions: [project:read]
      summary: "[v1] List available domain profiles"
      description: |
        > **Required permission:** `project:read` — minimum role: `viewer`

        Returns the catalog of domain profiles available for this instance.
        Safe fields only (no API keys or base_url).
      security:
        - BearerKey: []
      tags: [v1]
      responses:
        '200':
          description: "All available domain profiles for this instance: built-in profiles plus any custom TOML profiles loaded from `/profiles/custom/`. Use the `name` field as the `domain_profile` parameter when creating a run via `POST /v1/runs`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
                        provider:
                          type: string
                          description: "LLM provider identifier. Determines the API client adapter, authentication mechanism, and rate limit handling."
                        model_string:
                          type: string
                          description: "Provider-native model identifier string, e.g. `claude-sonnet-4-6`, `gpt-4o`. Passed verbatim to the provider API."
                        tier:
                          type: string
                          description: "Quality/cost tier classification. `fast` = cheapest, lowest latency. `balanced` = mid-tier. `powerful` = highest capability, highest cost."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
