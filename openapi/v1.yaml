  /v1/runs/{runId}:
    get:
      operationId: v1GetRun
      x-required-permissions: [runs:read]
      summary: "[v1] Get run state"
      security:
        - BearerKey: []
      tags: [v1]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: "Current run state: `status`, cost counters, timing, and `output` when COMPLETED. `output.text` contains the final Markdown deliverable. `error` is populated when `status = failed`. Cost fields require `runs:read_costs` on the API key's role."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    type: string
                    enum: [pending, running, completed, failed, paused, suspended]
                  domain_profile:
                    type: string
                    description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
                  created_at:
                    type: string
                    format: date-time
                    description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
                  started_at:
                    type: [string, 'null']
                    format: date-time
                    description: "ISO 8601 timestamp when the executor began processing this run or node. Null if execution has not started."
                  completed_at:
                    type: [string, 'null']
                    format: date-time
                    description: "ISO 8601 timestamp when this run or node reached a terminal state. Null if not yet complete."
                  duration_seconds:
                    type: [number, 'null']
                    description: "Wall-clock execution time in seconds from `started_at` to `completed_at`. Null if the run has not completed."
                  cost_usd:
                    type: number
                    description: "Cost in USD of LLM calls attributed to this node. Populated when the node completes. Null while the node is still running."
                  output:
                    type: [object, 'null']
                    properties:
                      text:
                        type: string
                        description: "Markdown output"
                      format:
                        type: string
                        enum: [markdown]
                      files:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
                            url:
                              type: string
                              description: "Signed URL, 24h TTL"
                            mime_type:
                              type: string
                              description: "MIME type of the file, e.g. `application/pdf`, `text/csv`. Used for format detection and injection safety checks."
                  error:
                    type: [object, 'null']
                    properties:
                      code:
                        type: string
                        description: "Machine-readable trigger event code, e.g. `file_changed`, `schedule`, `webhook`. Used for conditional automation logic."
                      message:
                        type: string
                        description: "Human-readable description of the event, error, or update."
                  metadata:
                    type: object
                    additionalProperties:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
