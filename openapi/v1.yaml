                    description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
                  decision:
                    $ref: '#/components/schemas/InterruptGateDecision'
                    description: "Gate resolution action chosen by the operator."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
