  # ── Internal ───────────────────────────────────────────────────────────────

  /internal/run-update-checks:
    post:
      operationId: internalRunUpdateChecks
      summary: Trigger marketplace update checks (cron or manual admin)
      description: |
        > **Auth:** `X-Cron-Secret` header (cron container) **OR** authenticated `instance_admin` session.

        Runs the marketplace update checker for up to `max_per_run` skills.
        Called by the cron container on schedule or manually from the Admin UI
        ("Run now" button). Constant-time comparison for the cron secret prevents
        timing attacks (SEC-48). Returns HTTP 503 when `INTERNAL_CRON_SECRET` is unset.
      tags: [Internal]
      security:
        - CronSecret: []
        - SessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                max_per_run: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Update check summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { type: integer }
                  updated: { type: integer }
                  errors:  { type: integer }
        '401': { description: "Missing or invalid cron secret / session." }
        '503': { description: "INTERNAL_CRON_SECRET not configured." }

