# .github/workflows/release.yml
# Amendment 88.4 — Level 3: Release pipeline
# Triggered by version tags (v1.2.3). Builds signed binaries, runs E2E tests, publishes.

name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:

  e2e-tests:
    name: E2E test suite (Sonnet)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harmoven_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
        run: npx prisma migrate deploy
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E test suite
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
          HARMOVEN_LLM_TIER: sonnet
        run: npm run test:e2e
        # 5 app_scaffolding scenarios from APP_SCAFFOLDING_SCENARIOS.md
        # ~$2.50 per run, 15-20 minutes

  build-electron-mac:
    name: Build + sign macOS binary
    needs: e2e-tests
    runs-on: macos-latest   # must be macOS for signing + notarization
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/certificate.XXXXXX.p12)
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"
          security import "$CERT_FILE" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k ~/Library/Keychains/login.keychain-db \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          rm -f "$CERT_FILE"
      - name: Build, sign, and notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          CSC_KEYCHAIN: ~/Library/Keychains/login.keychain-db
        run: npm run build:electron:mac
        # electron-builder: sign + notarize + staple
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: Harmoven-mac
          path: dist/*.dmg
          retention-days: 30

  build-electron-win:
    name: Build + sign Windows binary
    needs: e2e-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build and sign with EV certificate
        env:
          WIN_CERTIFICATE: ${{ secrets.WIN_EV_CERTIFICATE_BASE64 }}
          WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_EV_CERTIFICATE_PASSWORD }}
        run: npm run build:electron:win
        # electron-builder: sign with EV cert (eliminates SmartScreen warning)
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: Harmoven-win
          path: dist/*.exe
          retention-days: 30

  build-electron-linux:
    name: Build Linux binary
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:electron:linux
        # AppImage + deb + rpm, no signing required
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: Harmoven-linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-electron-mac, build-electron-win, build-electron-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required to create GitHub Releases
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # full history for CHANGELOG generation
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Download all build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444306a5e01e856e52cb416e # v4.1.8
        with:
          path: dist/
          merge-multiple: true
      - name: Generate CHANGELOG section
        run: |
          # Conventional commits → CHANGELOG section for this release
          npx conventional-changelog-cli -p angular \
            -o CHANGELOG_SECTION.md -r 1 --tag-prefix v
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          body_path: CHANGELOG_SECTION.md
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  docker-release:
    name: Tag + publish release Docker image
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3.0.0
        with:
          username: harmoven
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Tag and push release image
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          docker pull harmoven/app:${{ github.sha }}
          docker tag harmoven/app:${{ github.sha }} harmoven/app:${VERSION}
          docker tag harmoven/app:${{ github.sha }} harmoven/app:latest
          docker push harmoven/app:${VERSION}
          docker push harmoven/app:latest

  # ─── Amendment 93: publish-release-pins ─────────────────────────────────────
  # Writes image digest + commit SHA + Cosign bundle to release-pins.yaml
  # in config.git. Detects tag rewrites (3-layer immutability verification).
  publish-release-pins:
    name: Publish release pins (Am.93)
    needs: [docker-release, build-electron-mac, build-electron-win, build-electron-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config.git
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: harmoven/harmoven-instance-config
          token: ${{ secrets.CONFIG_GIT_TOKEN }}
          path: config-repo

      - name: Get commit SHA for this tag
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get Docker image digest
        id: digest
        run: |
          DIGEST=$(docker manifest inspect \
            harmoven/app:${GITHUB_REF_NAME} \
            --format '{{.config.digest}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image and generate Cosign bundle
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            harmoven/app@${{ steps.digest.outputs.digest }}
          cosign verify --key cosign.pub \
            harmoven/app:${GITHUB_REF_NAME} \
            --output-file cosign-bundle.json

      - name: Update release-pins.yaml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 scripts/update-release-pins.py \
            --version "$VERSION" \
            --digest  "${{ steps.digest.outputs.digest }}" \
            --commit  "${{ steps.commit.outputs.sha }}" \
            --bundle  "$(base64 -w0 cosign-bundle.json)" \
            --file    config-repo/instance/release-pins.yaml

      - name: Commit and push release pins
        run: |
          cd config-repo
          git config user.name  "harmoven-release-bot"
          git config user.email "release-bot@harmoven.com"
          git add instance/release-pins.yaml
          git commit -m "release-pins: add ${GITHUB_REF_NAME} [skip ci]"
          git push
