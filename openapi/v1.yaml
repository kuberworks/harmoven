  /v1/runs:
    post:
      operationId: v1CreateRun
      x-required-permissions: [runs:create]
      summary: "[v1] Submit a run"
      description: |
        > **Required permission:** `runs:create` — minimum role: `user`

        Public API entry point. API key determines the project automatically.
        Returns 202 (accepted) immediately; poll `poll_url` or subscribe to `stream_url`.

        **Rate limit:** 60 req/min per key.
      security:
        - BearerKey: []
      tags: [v1]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                  minLength: 1
                  maxLength: 10000
                  description: "Free-text task description"
                domain_profile:
                  $ref: '#/components/schemas/DomainProfile'
                supervision:
                  $ref: '#/components/schemas/SupervisionMode'
                language:
                  type: string
                  description: "ISO 639-1 code: fr, en, de, …"
                budget_usd:
                  type: number
                  minimum: 0.01
                  maximum: 100
                  description: "Maximum allowed LLM spend in USD for this run. The executor suspends the run with `suspended_reason: budget_exceeded` when the cumulative cost reaches this value. Range: $0.01–$100. Omit for no budget limit."
                files:
                  type: array
                  description: "Base64-encoded files, max 10 MB each"
                  items:
                    type: object
                    required: [name, base64, mime_type]
                    properties:
                      name:
                        type: string
                        description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
                      base64:
                        type: string
                        description: "Base64-encoded file content. Maximum decoded size: 10 MB. ZIP bomb detection is applied on extraction."
                      mime_type:
                        type: string
                        description: "MIME type of the file, e.g. `application/pdf`, `text/csv`. Used for format detection and injection safety checks."
                webhook_url:
                  type: string
                  format: uri
                  description: "Called on run.completed / run.failed / run.gate_opened"
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  maxProperties: 20
      responses:
        '202':
          description: "Run accepted. Returns immediately with a run ID and polling/streaming URLs. The run is in PENDING state — no LLM calls have been made yet. Use `poll_url` for simple integrations or `stream_url` for real-time progress events."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    type: string
                    enum: [pending]
                    description: "Always `pending` immediately after a successful submission. The orchestrator picks up the run within seconds. Subscribe to the SSE stream at `stream_url` for live progress events or poll `GET /v1/runs/{run_id}`."
                  estimated_duration_seconds:
                    type: number
                    description: "Estimated wall-clock execution time in seconds computed from DAG depth and profile benchmarks. Available immediately after the run is accepted; may be refined as nodes complete."
                  estimated_cost_usd:
                    type: number
                    description: "Pre-run cost estimate computed by the Planner from DAG node weights and LLM tier pricing. Displayed to the user before confirming the run."
                  poll_url:
                    type: string
                    description: "URL to poll for run status: `GET /api/v1/runs/{run_id}`. Use this instead of subscribing to the SSE stream for simple integrations."
                  stream_url:
                    type: string
                    description: "URL of the SSE event stream for real-time run progress: `GET /api/v1/runs/{run_id}/stream` (or internal equivalent). Requires `stream:state` permission."
        '400':
          description: "`task` is missing or empty; `project_id` is not provided or is not accessible via this API key; a required field exceeds its maximum length; or `webhook_url` is not a valid HTTPS URL. See `error.details` for the specific field."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: "No enabled LLM profile satisfies the combination of `confidentiality`, `jurisdiction_tags`, and `providers` constraints in the request. Relax the constraints, add a compatible LLM profile via `POST /admin/models`, or remove provider restrictions."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'

