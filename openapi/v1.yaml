openapi: "3.1.0"
info:
  title: Harmoven API
  version: "1.0.0"
  description: |
    # Harmoven — On-Premise AI Orchestration Platform

    Harmoven is an AI operating system that lets any team — from Fortune 500 analysts to
    solo entrepreneurs — describe a business goal in plain language and receive a real,
    immediately usable result. Under the hood, Harmoven orchestrates a graph of specialised
    AI agents (Classifier, Planner, Writer, Reviewer, Critical Reviewer, Evaluator) executing
    a Directed Acyclic Graph (DAG) against a budget, jurisdiction, and confidentiality policy.

    This API covers two access layers:
    - **Internal API** (`/api/…`): session-authenticated routes consumed by the Harmoven
      web application. All write operations emit audit log entries.
    - **Public API v1** (`/api/v1/…`): project-scoped Bearer API key routes, intended for
      third-party developers, CI/CD pipelines, and the official `@harmoven/sdk`.

    ## Authentication

    ### Session Cookie — Internal routes
    Cookie-based sessions managed by Better Auth (≥ 1.3.26). Set automatically on
    `POST /api/auth/signin`. Session TTL: 8 hours. Revocation is instant.
    Multi-factor authentication (TOTP or Passkey) is mandatory for `instance_admin` accounts.
    Rate limit: **5 sign-in attempts / IP / 15 minutes** (CVE-2025-61928 mitigated).

    ### API Key — Public routes (`/api/v1/*`)
    Project-scoped Bearer token. Format: `hv1_<32 random hexadecimal characters>`.
    Header: `Authorization: Bearer hv1_<key>`.
    Permissions are determined by the role attached to the key at creation time — not by
    runtime scopes. **Generate a key:** Project Settings → API Keys → Create Key.
    Rate limit: **60 requests/minute per key**. Excess returns HTTP 429 with `Retry-After`.

    ## Permission Model

    27 permissions are organised into 7 built-in roles with additive inheritance:
    `viewer` ⊂ `operator` ⊂ `user` ⊂ `user_with_costs` ⊂ `developer` ⊂ `admin` ⊂ `instance_admin`.
    Custom roles can extend any built-in role and add individual permissions.

    | Permission | Minimum role | Key endpoints governed |
    |---|---|---|
    | `runs:read` | `viewer` | `GET /runs/{id}`, `GET /v1/runs/{id}` |
    | `stream:state` | `viewer` | `GET /runs/{id}/stream` |
    | `project:read` | `viewer` | `GET /projects`, `GET /projects/{id}` |
    | `stream:gates` | `operator` | SSE gate events |
    | `gates:read` | `operator` | Human gate tabs |
    | `gates:approve` | `operator` | `POST /runs/{id}/gate`, `POST /runs/{id}/nodes/{nid}/gate` |
    | `gates:read_critical` | `operator` | `POST /runs/{id}/critical-ignore`, `POST /runs/{id}/critical-fix` |
    | `runs:create` | `user` | `POST /runs`, `POST /runs/{id}/fork`, `POST /v1/runs` |
    | `runs:abort` | `user` | `DELETE /v1/runs/{id}`, `POST /runs/{id}/nodes/{nid}/interrupt` |
    | `runs:replay` | `user` | Run replay |
    | `runs:inject` | `user` | `POST /runs/{id}/inject` |
    | `runs:pause` | `user` | `POST /runs/{id}/pause`, `POST /runs/{id}/resume` |
    | `marketplace:install` | `user` | Marketplace pack installation |
    | `runs:read_costs` | `user_with_costs` | Cost fields in run responses |
    | `stream:costs` | `user_with_costs` | SSE `cost_update`, `budget_warning` events |
    | `gates:read_code` | `developer` | Code tab in Human Gate |
    | `project:edit` | `developer` | `PATCH /projects/{id}` |
    | `stream:project` | `developer` | `GET /projects/{id}/stream` |
    | `admin:triggers` | `developer` | `GET/POST/PATCH /admin/triggers` |
    | `project:members` | `admin` | `GET/POST/PATCH/DELETE /projects/{id}/members`, roles, |
    | `project:credentials` | `admin` | `GET/POST/PATCH/DELETE /projects/{id}/api-keys`, credentials |
    | `admin:integrations` | `admin` | `GET/POST/PATCH/DELETE /admin/integrations` |
    | `admin:models` | `instance_admin` | `GET/POST/PATCH /admin/models` |
    | `admin:users` | `instance_admin` | `GET/POST /admin/users`, `PATCH/DELETE /admin/users/{id}`, ban/unban |
    | `admin:audit` | `instance_admin` | `GET /analytics` |
    | `admin:instance` | `instance_admin` | `DELETE /projects/{id}`, `GET/POST /updates` |

    Full permissions reference: [Project Settings → Roles & Permissions]

    ## Rate Limits

    | Route | Limit | Business rationale |
    |---|---|---|
    | `POST /api/runs` | 10 req/min/IP | Prevents accidental LLM cost explosions |
    | `POST /api/auth/signin` | 5 req/15 min/IP | Brute-force protection |
    | `/api/v1/*` (API key) | 60 req/min/key | Fair-use enforcement across tenants |
    | Auto-runs (triggers) | 20/day + $10/day | Global safeguard against runaway automation |

    ## Error Format

    All errors use a consistent machine-readable envelope:
    ```json
    {
      "error": {
        "code": "run_not_found",
        "message": "Run 7f3a2c1e not found or inaccessible.",
        "details":
          "run_id": "7f3a2c1e-9b4d-4e8f-a1c2-3d5e6f7a8b9c"
      }
    }
    ```
    Error codes are snake_case strings. A 404 is returned whether the resource does not
    exist or is simply inaccessible to the caller — this prevents enumeration attacks.

    ## Versioning & Deprecation

    Breaking changes increment the path prefix (`/api/v2/`). Additive changes (new fields,
    new endpoints) are released without a MAJOR increment and do not break existing clients.
    Deprecated routes carry the response header `X-Harmoven-Deprecated: true`.

    ## Quick Start (< 5 minutes)

    1. Sign in and navigate to **Project Settings → API Keys**.
    2. Click **Create Key**, select a role (`operator` for read/approve, `user` for full runs).
    3. Copy the `hv1_…` token — it is displayed once and cannot be retrieved again.
    4. Attach the token: `Authorization: Bearer hv1_<key>` in every API call.
    5. Call `POST /api/v1/runs` with `{ "task": "Summarise this CSV", "project_id": "…" }`.

  contact:
    name: Harmoven Support
    url: https://harmoven.io/support
  license:
    name: Proprietary
    url: https://harmoven.io/legal/license
  termsOfService: https://harmoven.io/legal/terms

servers:
  - url: /api
    description: |
      Internal API — Cookie session authentication (Better Auth). Intended for the
      Harmoven web application. Routes require an active session; the `SessionCookie`
      is set automatically after `POST /auth/signin`.
  - url: /api/v1
    description: |
      Public API v1 — Bearer API key authentication. Intended for external integrators,
      CI/CD pipelines, and the official `@harmoven/sdk`. All routes require an
      `Authorization: Bearer hv1_<key>` header. Rate limit: 60 req/min per key.

# ─── Security schemes ────────────────────────────────────────────────────────
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: harmoven_session
      description: |
        HTTP-only session cookie set by Better Auth (≥ 1.3.26) after a successful
        `POST /auth/signin`. The cookie uses `SameSite=Lax` for implicit CSRF protection
        in browser contexts — no explicit CSRF token is required.

        **Lifecycle:** Session TTL is 8 hours. Revocation is instant via
        `POST /auth/signout` or the admin user-ban endpoints. The cookie cache is
        disabled — every request performs a live database session check, ensuring
        revoked sessions are rejected immediately without waiting for TTL expiry.

        **MFA:** `instance_admin` accounts must complete a TOTP or Passkey challenge
        before the session cookie is issued. The challenge is triggered automatically
        when `mfa_required: true` is returned in the 401 response.

        **Intended callers:** Harmoven web application running in the same browser
        context as the API. Not suitable for machine-to-machine integrations — use
        `BearerKey` instead.

    BearerKey:
      type: http
      scheme: bearer
      bearerFormat: "hv1_<32 random hexadecimal characters>"
      description: |
        Project-scoped API key for the Public API v1 (`/api/v1/*` routes).
        Permissions are determined by the role attached to the key at creation time —
        not by runtime scopes. Roles are additive: `operator` permissions are a strict
        superset of `viewer` permissions, and so on up the hierarchy.

        **Format:** `hv1_` prefix followed by 32 random hexadecimal characters.
        Example: `hv1_a3f7c2e1b8d4f9e2c6a1b3d5e7f9a2c4`.

        **Lifecycle:**
        - **Generate:** Project Settings → API Keys → Create Key. Select the role that
          matches the minimal permissions required for the integration.
        - **Display:** The raw key is shown **once** at creation. It cannot be retrieved
          again. Store it securely (e.g. in a CI secret manager).
        - **Revocation:** Immediate via `DELETE /projects/{id}/api-keys/{keyId}`. The
          `revoked_at` timestamp is set; subsequent requests return 401.
        - **Expiry:** Optional `expires_at` field at creation. Expired keys return 401.

        **Role hierarchy (additive):**
        `viewer` ⊂ `operator` ⊂ `user` ⊂ `user_with_costs` ⊂ `developer`
        ⊂ `admin` ⊂ `instance_admin`.
        See the Permission Model table in `info.description` for the full mapping.

        **Intended callers:** Third-party applications, CI/CD pipelines, data pipelines,
        and automated integrations. Not suitable for interactive browser sessions.

  # ─── Reusable schemas ──────────────────────────────────────────────────────
  schemas:

    # ── User management ───────────────────────────────────────────────────────
    CreateUserRequest:
      type: object
      required: [name, email, password]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
          description: "Full display name for the new account."
        email:
          type: string
          format: email
          maxLength: 512
          description: "Email address. Must be unique. Used as login identifier."
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: "Temporary password. The user should change it on first login."
        role:
          type: string
          enum: [user, instance_admin]
          default: user
          description: "Initial role. Defaults to `user`."

    # ── RGPD ──────────────────────────────────────────────────────────────────
    RgpdConfig:
      type: object
      required: [maintenance_enabled, data_retention_days, env_override_active]
      properties:
        maintenance_enabled:
          type: boolean
          description: "Whether the automated RGPD maintenance crons (session cleanup and run-data TTL) are currently enabled. Controlled via `PATCH /admin/rgpd` or the `RGPD_MAINTENANCE_ENABLED` environment variable."
        data_retention_days:
          type: integer
          description: "Number of days after which run content (LLM input/output) is nullified by the TTL cron. Applies to new runs. Range: 7–3650."
          minimum: 7
          maximum: 3650
          example: 90
        env_override_active:
          type: boolean
          description: "True when the `RGPD_MAINTENANCE_ENABLED=false` environment variable is set. In this case the DB setting is ignored and maintenance is forcibly disabled. Update the environment variable (not the DB) to re-enable."

    # ── Orchestrator config ───────────────────────────────────────────────────
    OrchestratorConfig:
      type: object
      description: "Parsed content of orchestrator.yaml. All fields are optional — only fields present in the file are returned."
      properties:
        organization:
          type: object
          properties:
            name:   { type: string }
            preset: { type: string, enum: [small_business, enterprise, developer] }
        execution_engine:
          type: object
          properties:
            provider:             { type: string, enum: [custom, temporal, restate] }
            max_concurrent_nodes: { type: integer, minimum: 1, maximum: 64 }
        privacy:
          type: object
          properties:
            presidio:
              type: object
              properties:
                enabled: { type: boolean }
        litellm:
          type: object
          properties:
            enabled: { type: boolean }
        proactivity:
          type: object
          properties:
            full_auto_enabled:     { type: boolean }
            max_auto_runs_per_day: { type: integer, minimum: 1 }
            max_cost_usd_per_day:  { type: number, minimum: 0.01 }
        security:
          type: object
          properties:
            rate_limit_provider: { type: string, enum: [memory, upstash] }
            allow_public_signup: { type: boolean, description: "When true, anyone can self-register at /register. When false (default), only admins can create accounts. Override: HARMOVEN_ALLOW_PUBLIC_SIGNUP env var." }
        updates:
          type: object
          properties:
            auto_install:    { type: string, enum: [notify, auto, manual] }
            update_channel:  { type: string, enum: [stable, edge] }
            auto_check:      { type: boolean }
            auto_download:   { type: boolean }
        marketplace:
          type: object
          properties:
            default_update_policy: { type: string, enum: [auto, notify, manual] }
            auto_check_updates:    { type: boolean }
      additionalProperties: true

    OrchestratorConfigPatch:
      type: object
      description: "Partial update for orchestrator.yaml. All fields are optional; only supplied fields are merged."
      properties:
        organization:
          type: object
          properties:
            name:   { type: string, minLength: 1, maxLength: 120 }
            preset: { type: string, enum: [small_business, enterprise, developer] }
          additionalProperties: false
        execution_engine:
          type: object
          properties:
            provider:             { type: string, enum: [custom, temporal, restate] }
            max_concurrent_nodes: { type: integer, minimum: 1, maximum: 64 }
          additionalProperties: false
        privacy:
          type: object
          properties:
            presidio:
              type: object
              properties:
                enabled: { type: boolean }
              additionalProperties: false
          additionalProperties: false
        litellm:
          type: object
          properties:
            enabled: { type: boolean }
          additionalProperties: false
        proactivity:
          type: object
          properties:
            full_auto_enabled:     { type: boolean }
            max_auto_runs_per_day: { type: integer, minimum: 1, maximum: 1000 }
            max_cost_usd_per_day:  { type: number, minimum: 0.01, maximum: 10000 }
          additionalProperties: false
        security:
          type: object
          properties:
            rate_limit_provider: { type: string, enum: [memory, upstash] }
            allow_public_signup: { type: boolean }
          additionalProperties: false
        updates:
          type: object
          properties:
            auto_install:    { type: string, enum: [notify, auto, manual] }
            update_channel:  { type: string, enum: [stable, edge] }
            auto_check:      { type: boolean }
            auto_download:   { type: boolean }
          additionalProperties: false
        marketplace:
          type: object
          properties:
            default_update_policy: { type: string, enum: [auto, notify, manual] }
            auto_check_updates:    { type: boolean }
          additionalProperties: false
      additionalProperties: false

    # ── Error ─────────────────────────────────────────────────────────────────
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          description: "Error detail envelope. Always present when the request fails. Use `code` to branch programmatically and `message` for human display."
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code
              enum:
                - validation_error
                - unauthorized
                - api_key_invalid
                - budget_exceeded
                - plan_limit_reached
                - forbidden
                - project_not_found
                - run_not_found
                - run_already_terminal
                - no_compatible_model
                - rate_limit_exceeded
                - internal_error
                - service_unavailable
            message:
              type: string
              description: Human-readable description
            details:
              type: object
              additionalProperties: true
              description: Optional structured details (e.g. Zod field errors)
      example:
        error:
          code: run_not_found
          message: "Run abc-123 not found or inaccessible"

    # ── Enums ──────────────────────────────────────────────────────────────────
    RunStatus:
      type: string
      description: |
        Current status of the AI task execution run in its lifecycle. State machine:
        - `PENDING`: Run is queued and waiting for the executor to pick it up. No nodes
          have started yet. Budget and DAG estimates are available.
        - `RUNNING`: The executor is actively driving the DAG. Nodes are starting,
          streaming output, and completing in parallel according to the dependency graph.
        - `COMPLETED`: All terminal DAG nodes reached successfully. Output is available.
          Feedback (rating, hours saved) can be submitted while in this state.
        - `FAILED`: At least one node encountered an unrecoverable error after exhausting
          retries. The run cannot resume. Use fork to retry with a different configuration.
        - `SUSPENDED`: The run was automatically paused by the system due to one of:
          `human_gate` (reviewer requested changes), `crash_recovery` (process restart),
          `budget_exceeded` (cost cap reached), `no_compatible_model`, or `user_cancelled`.
          Inspect `suspended_reason` to determine the appropriate action.
        - `PAUSED`: The run was manually paused by the user via `POST /runs/{id}/pause`.
          In-progress nodes complete their current LLM call before the executor halts.
          Resume with `POST /runs/{id}/resume`.

        **Terminal states** (no outgoing transition): `COMPLETED`, `FAILED`.
        **Resumable states**: `SUSPENDED` (via gate resolution or budget increase), `PAUSED`.
      enum: [PENDING, RUNNING, COMPLETED, FAILED, SUSPENDED, PAUSED]

    NodeStatus:
      type: string
      description: |
        Current status of an individual DAG node within a run. State machine:
        - `PENDING`: Node is waiting for its upstream dependencies to complete.
        - `RUNNING`: The agent is executing — the LLM call is in progress. Streaming
          partial output is accumulated and accessible via the SSE stream.
        - `BLOCKED`: All upstream nodes have completed but this node cannot start yet
          (e.g. awaiting context injection or resource contention). Transitions to
          `RUNNING` once unblocked.
        - `FAILED`: The agent returned an error and retry attempts are exhausted.
          Can transition to `RUNNING` (retry) or `ESCALATED`.
        - `ESCALATED`: The node's failure has been escalated to a human gate. An operator
          must decide to retry, skip, or abort the run.
        - `SKIPPED`: The node was explicitly skipped by a human gate decision. Terminal.
        - `COMPLETED`: The node produced a valid `handoff_out` payload. Terminal.
        - `DEADLOCKED`: The node is part of a dependency cycle with no resolution path.
          Terminal. Indicates a DAG configuration error.
        - `INTERRUPTED`: The in-flight LLM call was aborted by the user via
          `POST /runs/{id}/nodes/{nid}/interrupt`. The partial output is preserved.
          An interrupt gate is opened; the user must decide whether to resume from
          partial, replay from scratch, accept partial output, or abort the run.

        **Allowed transitions:**
        `PENDING` → `RUNNING` | `BLOCKED`
        `RUNNING` → `COMPLETED` | `FAILED` | `BLOCKED` | `INTERRUPTED`
        `BLOCKED` → `PENDING` | `RUNNING`
        `FAILED` → `RUNNING` (retry) | `ESCALATED`
        `ESCALATED` → `RUNNING` | `SKIPPED`
        `INTERRUPTED` → `RUNNING` (resume or replay)

        **Terminal states**: `DEADLOCKED`, `SKIPPED`, `COMPLETED`.
      enum: [PENDING, RUNNING, BLOCKED, FAILED, ESCALATED, SKIPPED, COMPLETED, DEADLOCKED, INTERRUPTED]

    Permission:
      type: string
      description: |
        Fine-grained permission string that governs access to a specific operation or
        data category within a project. Permissions are additive: a role that `extends`
        a built-in role automatically inherits all of that role's permissions.

        **Run management:**
        - `runs:create` — Submit new runs and fork existing ones. Minimum role: `user`.
        - `runs:read` — Read run state, nodes, and handoff outputs. Minimum role: `viewer`.
        - `runs:read_costs` — View cost fields (`cost_usd`, token counts, LLM breakdown).
          Minimum role: `user_with_costs`.
        - `runs:abort` — Abort a run or interrupt a streaming node. Minimum role: `user`.
        - `runs:replay` — Replay a completed or failed run. Minimum role: `user`.
        - `runs:inject` — Inject context into a running run. Minimum role: `user`.
        - `runs:pause` — Pause and resume a running run. Minimum role: `user`.

        **Human gates:**
        - `gates:read` — View gate content (Preview, Reviewer tabs). Minimum role: `operator`.
        - `gates:approve` — Submit a gate decision (approve, modify, replay, abort). Minimum role: `operator`.
        - `gates:read_code` — View the Code tab in the Human Gate (generated source code). Minimum role: `developer`.
        - `gates:read_critical` — View the Critical Reviewer findings and trigger targeted fixes. Minimum role: `operator`.

        **Projects:**
        - `project:read` — List and view project details. Minimum role: `viewer`.
        - `project:edit` — Update project metadata and configuration. Minimum role: `developer`.
        - `project:members` — Manage members, roles, and role assignments. Minimum role: `admin`.
        - `project:credentials` — Manage API keys and credentials. Minimum role: `admin`.

        **SSE streams:**
        - `stream:state` — Receive `initial` and `state_change` events. Minimum role: `viewer`.
        - `stream:gates` — Receive `human_gate` events. Minimum role: `operator`.
        - `stream:costs` — Receive `cost_update`, `budget_warning`, `llm_fallback` events. Minimum role: `user_with_costs`.
        - `stream:project` — Receive the project-level aggregated stream. Minimum role: `developer`.

        **Marketplace:** `marketplace:install` — Install domain packs from the marketplace. Minimum role: `user`.

        **Administration (instance_admin or delegated):**
        - `admin:models` — Manage LLM profiles. Minimum role: `instance_admin`.
        - `admin:integrations` — Install and approve integrations. Minimum role: `admin`.
        - `admin:users` — Ban/unban users, view all user accounts. Minimum role: `instance_admin`.
        - `admin:triggers` — Create and manage CRON/FILE_WATCHER/WEBHOOK triggers. Minimum role: `developer`.
        - `admin:audit` — Access analytics and audit logs. Minimum role: `instance_admin`.
        - `admin:instance` — Archive projects, apply software updates. Minimum role: `instance_admin`.
      enum:
        # Run management
        - runs:create
        - runs:read
        - runs:read_costs
        - runs:abort
        - runs:replay
        - runs:inject
        - runs:pause
        # Human gates
        - gates:read
        - gates:approve
        - gates:read_code
        - gates:read_critical
        # Projects
        - project:read
        - project:edit
        - project:members
        - project:credentials
        # SSE streams
        - stream:state
        - stream:gates
        - stream:costs
        - stream:project
        # Marketplace
        - marketplace:install
        # Admin
        - admin:models
        - admin:integrations
        - admin:users
        - admin:triggers
        - admin:audit
        - admin:instance

    DomainProfile:
      type: string
      description: |
        Built-in domain profile that pre-configures the agent topology, tool set,
        LLM tier selection, and output templates for a specific class of business task.
        Selected automatically by the Intent Classifier (confidence ≥ 80%) or manually
        by the user from the profile picker.

        - `data_reporting` — Data analysis, dashboards, KPIs, CSV/Excel processing.
        - `app_scaffolding` — Full-stack application generation with layered agents and
          git worktrees. Requires `admin:integrations` to enable the UI UX Pro Max MCP integration.
        - `document_drafting` — Reports, emails, presentations, business documents.
        - `research_synthesis` — Market research, competitive analysis, trend reports.
        - `marketing_content` — Social posts, SEO articles, campaign briefs, copywriting.
        - `hr_recruiting` — Job descriptions, candidate evaluation, onboarding documents.
        - `legal_compliance` — Contracts, GDPR/CCPA compliance, due diligence.
          **Forces minimum confidentiality = HIGH** regardless of project setting.
        - `finance_modeling` — Business plans, financial projections, P&L models.
        - `customer_support` — FAQ bases, support scripts, chatbot training content.
        - `ecommerce_ops` — Product catalogues, pricing sheets, e-commerce content.
        - `training_content` — E-learning courses, quizzes, training materials.
        - `generic` — Fallback profile when the Intent Classifier confidence is < 80%
          and the user has not selected a specific profile. Uses neutral agent configuration.

        Custom TOML profiles are also supported, loaded from `/profiles/custom/*.toml`
        at instance startup. Custom profiles resolve to a built-in base profile and
        extend it with domain-specific prompt overrides and tool restrictions.
      enum:
        - data_reporting
        - app_scaffolding
        - document_drafting
        - research_synthesis
        - marketing_content
        - hr_recruiting
        - legal_compliance
        - finance_modeling
        - customer_support
        - ecommerce_ops
        - training_content
        - generic

    Confidentiality:
      type: string
      description: |
        Data sensitivity classification that governs which LLM providers the run is
        permitted to call. Set at the project level and optionally overridden per run.
        The Confidentiality Classifier (local NER + regex, zero cloud calls) automatically
        raises the level when it detects sensitive content in the task input.

        - `LOW` — All enabled providers are eligible, including providers with
          `trust_tier = 3` (unvetted or CN-jurisdiction models).
        - `MEDIUM` — Trust tier 1–3 providers allowed. CN-jurisdiction providers
          blocked when the instance `gdpr_mode` flag is enabled.
        - `HIGH` — Only `trust_tier ≤ 2` providers (vetted, non-CN). Forced for the
          `legal_compliance` domain profile regardless of the project setting.
        - `CRITICAL` — Only local (Ollama) providers. No data leaves the instance.
          Suitable for air-gapped deployments and classified content.

        The LLM selector enforces this classification at routing time by filtering
        profiles against their `jurisdiction_block` list.
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    SupervisionMode:
      type: string
      description: |
        Controls the frequency of human review gates inserted into the run's DAG.
        Selected at run creation and affects the agent topology the Planner generates.

        - `human_in_the_loop` — A review gate is inserted after every major agent
          (e.g. after the Writer, after the Reviewer). Maximum human oversight.
          Recommended for high-stakes outputs (legal documents, client-facing content).
        - `auto_deliver_if_approved` — A gate is inserted only if the Reviewer
          requests changes or the Critical Reviewer finds blocking issues. The default
          and recommended mode for most users.
        - `full_auto` — No gates. The run executes end-to-end without human intervention.
          Available to `instance_admin` roles only. Use for well-tested, low-risk automations.
      enum: [auto_deliver_if_approved, human_in_the_loop, full_auto]

    GateDecision:
      type: string
      description: |
        Decision submitted by the operator at a human review gate.
        - `approve`: the output is accepted as-is; the run transitions back to RUNNING immediately.
        - `modify`: the operator supplies a `patch` map applied to `task_input`; the Planner
          regenerates the DAG with the new input and resumes.
        - `replay_node`: the specified `node_id` is replayed from scratch with its original inputs;
          downstream nodes that depend on it are reset to PENDING.
        - `abort`: the run is transitioned to FAILED immediately; no further nodes are dispatched.
      enum: [approve, modify, replay_node, abort]

    InterruptGateDecision:
      type: string
      description: |
        Decision submitted by the user after manually interrupting a node, restarting a FAILED node,
        or force-restarting a COMPLETED node. In all cases a `replay_from_scratch` gate call is valid.
        - `resume_from_partial`: mark the node COMPLETED using the partial output as its
          `handoff_out`; downstream nodes proceed with what was generated (INTERRUPTED nodes only).
        - `replay_from_scratch`: reset the node to PENDING for re-dispatch. If the node is COMPLETED,
          all transitively downstream nodes are also reset; any downstream RUNNING nodes are aborted first.
        - `accept_partial`: alias for `resume_from_partial`, kept for SDK compatibility.
        - `abort`: discard the output and transition the entire run to FAILED.
      enum: [resume_from_partial, replay_from_scratch, accept_partial, abort]

    # ── DAG ───────────────────────────────────────────────────────────────────
    DagNode:
      type: object
      required: [node_id, agent_type]
      properties:
        node_id:
          type: string
          description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
        agent_type:
          description: "Type of AI agent executing this node. Determines the system prompt template, available tools, and expected handoff schema. The executor validates the handoff output against the declared agent type."
          type: string
          enum: [classifier, planner, writer, reviewer, critical_reviewer, eval, smoke_test, repair, human_gate, image_gen]
        label:
          type: string
          description: "Short human-readable label for this DAG node, shown in the run visualisation graph. Does not affect execution."
        description:
          type: string
          description: "Human-readable description of this node's purpose or the resource's content."
        depends_on:
          description: "List of `node_id` values that must reach COMPLETED status before this node is eligible to start. An empty list means no upstream dependencies — the node can start as soon as the run begins."
          type: array
          items:
            type: string
        llm_tier:
          description: "LLM quality tier required for this node. `fast` selects the lowest-latency, lowest-cost model. `balanced` uses a mid-tier model. `powerful` uses the highest-capability model. Resolved to a concrete LLM profile at runtime using project confidentiality and provider constraints."
          type: string
          enum: [fast, balanced, powerful]
        tools_allowed:
          description: "Allow-list of tool identifiers this node's agent may invoke. An empty list means the agent has no tool access. Enforced by the executor before each tool call to prevent scope creep."
          type: array
          items:
            type: string
        estimated_tokens_in:
          type: integer
          description: "Planner estimate of input tokens this node will consume. Used for budget pre-check before the run starts."
        estimated_tokens_out:
          type: integer
          description: "Planner estimate of output tokens this node will generate."
        estimated_cost_usd:
          type: number
          description: "Pre-run cost estimate computed by the Planner from DAG node weights and LLM tier pricing. Displayed to the user before confirming the run."
        timeout_minutes:
          type: integer
          description: "Maximum wall-clock time in minutes the executor allows for this node. If exceeded, the node transitions to FAILED with reason `timeout`."
        config:
          description: "Node-level configuration passed verbatim to the agent at invocation time. Schema is agent-type-specific and unvalidated by the executor. Use to pass prompt templates, output format preferences, or skill-specific options."
          type: object
          additionalProperties: true
        output_file_format:
          type: string
          description: "Requested output file format for this node's artifact. Set by the Planner when the node is expected to produce a file. Used by WRITER and PYTHON_EXECUTOR nodes to determine the appropriate serialisation format."
          enum: [txt, csv, json, yaml, html, md, py, ts, js, sh, docx, pdf]

    DagEdge:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          description: "Source `node_id` of this directed edge. The node at this end must complete before the target node can start."
        to:
          type: string
          description: "Target `node_id` of this directed edge. Transitions to PENDING→RUNNING eligibility when the source node completes."

    Dag:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          description: "Ordered list of all agent nodes in this DAG. Each node declares its agent type, LLM tier, dependencies, and optional tool scope. The executor starts all nodes whose `depends_on` list is satisfied."
          type: array
          items:
            $ref: '#/components/schemas/DagNode'
        edges:
          description: "List of directed dependency edges connecting nodes. The executor uses these to derive execution order and to detect when all dependencies of a node have completed."
          type: array
          items:
            $ref: '#/components/schemas/DagEdge'

    # ── Run ───────────────────────────────────────────────────────────────────
    Run:
      type: object
      required: [id, project_id, status, domain_profile, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        project_id:
          type: string
          format: uuid
          description: "Identifier of the project this resource belongs to. All IDOR checks gate access based on project membership."
        status:
          $ref: '#/components/schemas/RunStatus'
          description: "Current lifecycle state of the run. See `RunStatus` for the full state machine, valid transitions, and terminal states (`COMPLETED`, `FAILED`)."
        domain_profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
        task_input:
          description: "Free-form task payload submitted by the caller at run creation. Schema is domain-profile-specific and interpreted by the Classifier agent — not validated by the API layer. Typically contains the user's natural language prompt plus optional structured context (file references, metadata). Stored verbatim and returned in every Run response."
          type: object
          additionalProperties: true
        dag:
          $ref: '#/components/schemas/Dag'
          description: "Directed Acyclic Graph of agent nodes and dependency edges, generated by the Planner. Governs the execution order and parallelism of agent calls."
        run_config:
          description: "Runtime execution options provided at run creation. Controls LLM selection, budget limits, supervision mode, and jurisdiction constraints. Immutable after the run starts."
          type: object
          properties:
            supervision_mode:
              $ref: '#/components/schemas/SupervisionMode'
              description: "Human oversight frequency for this run. See `SupervisionMode` schema."
            budget_usd:
              type: number
              description: "Maximum allowed LLM spend in USD for this run. When `cost_actual_usd` reaches this threshold, the executor suspends the run with `suspended_reason: budget_exceeded`."
            budget_tokens:
              type: integer
              description: "Maximum allowed token count for this run. Suspends the run when exceeded, regardless of cost."
            preferred_llm:
              type: string
              description: "Caller-requested LLM profile ID for this run. Applied as a soft preference — the selector may override it if confidentiality or jurisdiction constraints prevent its use."
            jurisdiction_tags:
              description: "Jurisdiction constraints for LLM routing. `no_cn_jurisdiction` excludes providers with CN data centres. `eu_only` restricts to EU-based providers. `local_only` restricts to locally-hosted models only."
              type: array
              items:
                type: string
                enum: [no_cn_jurisdiction, eu_only, local_only]
            providers:
              description: "Explicit allow-list of provider identifiers, e.g. `[\"anthropic\", \"openai\"]`. When non-empty, only models from these providers are eligible for selection. Overrides tier preferences."
              type: array
              items:
                type: string
            enable_web_search:
              type: boolean
              description: "When `true`, WRITER nodes can invoke the web search tool to retrieve current information during generation."
            web_search_provider:
              type: string
              enum: [brave, tavily, duckduckgo]
              description: "Override the web search provider for this run. Defaults to the instance-level `WEB_SEARCH_PROVIDER` env variable."
            web_search_max_results:
              type: integer
              minimum: 1
              maximum: 10
              description: "Maximum number of web search results per query for this run. Defaults to 5."
        confidentiality:
          $ref: '#/components/schemas/Confidentiality'
          description: "Data sensitivity level applied to LLM routing. Determines which providers are eligible. See `Confidentiality` schema."
        transparency_mode:
          type: boolean
          description: "When true, the run explanation panel is shown to the user in real time — intermediate agent thoughts, tool calls, and confidence scores are surfaced. Increases context token usage."
        cost_actual_usd:
          type: number
          description: "Cumulative cost in USD of all LLM calls made so far in this run. Updated after each node completes. Used to enforce `budget_usd` limits."
        tokens_actual:
          type: integer
          description: "Cumulative token count (input + output) consumed by all nodes in this run so far."
        budget_usd:
          type: [number, 'null']
          description: "Maximum allowed LLM spend in USD for this run. When `cost_actual_usd` reaches this threshold, the executor suspends the run with `suspended_reason: budget_exceeded`."
        budget_tokens:
          type: [integer, 'null']
          description: "Maximum allowed token count for this run. Suspends the run when exceeded, regardless of cost."
        estimated_cost_usd:
          type: [number, 'null']
          description: "Pre-run cost estimate computed by the Planner from DAG node weights and LLM tier pricing. Displayed to the user before confirming the run."
        estimated_duration_minutes:
          type: [number, 'null']
          description: "Pre-run duration estimate in minutes, computed from DAG depth and typical node latencies. Updated when the Planner finalises the DAG."
        started_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the executor began processing this run or node. Null if execution has not started."
        completed_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when this run or node reached a terminal state. Null if not yet complete."
        paused_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the run was transitioned to PAUSED state by the user. Null if the run has never been paused."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
        suspended_reason:
          description: "Machine-readable reason the system suspended this run. Populated only when `status = SUSPENDED`. `human_gate` = waiting for operator decision. `crash_recovery` = executor restarted mid-flight. `budget_exceeded` = cost or token limit reached. `no_compatible_model` = no eligible LLM for current constraints. `user_cancelled` = manual abort."
          type: [string, 'null']
          enum: [human_gate, crash_recovery, budget_exceeded, no_compatible_model, user_cancelled, null]
        metadata:
          description: "Caller-supplied key/value pairs attached at run creation. Passed through to webhook callbacks and analytics exports. Max 20 entries; all values must be strings. Useful for correlating runs with external systems (ticket IDs, commit SHAs)."
          type: object
          additionalProperties: true
        user_rating:
          type: [integer, 'null']
          minimum: 1
          maximum: 5
          description: "User star rating (1–5) submitted via the feedback endpoint after the run completes. Null if no feedback has been provided."
        estimated_hours_saved:
          type: [number, 'null']
          description: "User-declared estimate of manual work hours saved by this run. Submitted via the feedback endpoint after completion. Used for ROI analytics."
        primary_artifact_id:
          type: [string, 'null']
          format: uuid
          description: "ID of the artifact designated as the primary deliverable for this run. Set by the reviewer agent or by the user after completion. Null until a primary artifact is selected."

    RunNode:
      type: object
      required: [id, run_id, node_id, agent_type, status]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        run_id:
          type: string
          format: uuid
          description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
        node_id:
          type: string
          description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
        agent_type:
          type: string
          description: "Type of AI agent assigned to this node. Determines the system prompt, available tools, and LLM tier selection."
        status:
          $ref: '#/components/schemas/NodeStatus'
          description: "Current lifecycle state of this DAG node. See `NodeStatus` for the full state machine, valid transitions, and terminal states (`COMPLETED`, `SKIPPED`, `DEADLOCKED`)."
        handoff_in:
          description: "Structured input payload delivered to this agent node by the DAG executor. Schema is agent-type-specific — see `ClassifierHandoff` and `PlannerHandoff` for typed variants. Contains the merged outputs of all upstream dependency nodes. Null for the DAG root node (no upstream dependencies)."
          type: object
          additionalProperties: true
        handoff_out:
          description: "Structured output payload produced by this agent node when it reaches COMPLETED status. Schema is agent-type-specific. Consumed by directly downstream nodes in the DAG. Null while the node is PENDING, RUNNING, or has FAILED."
          type: object
          additionalProperties: true
        cost_usd:
          type: [number, 'null']
          description: "Cost in USD of LLM calls attributed to this node. Populated when the node completes. Null while the node is still running."
        tokens_in:
          type: [integer, 'null']
          description: "Number of input tokens consumed by this node's LLM call. Used for cost attribution and context window monitoring."
        tokens_out:
          type: [integer, 'null']
          description: "Number of output tokens generated by this node's LLM call."
        error:
          type: [string, 'null']
          description: "Human-readable error message describing the failure cause when `status = FAILED`. Null in all other states."
        interrupted_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the in-flight LLM call was aborted via `POST /runs/{id}/nodes/{nid}/interrupt`. Null if the node has not been interrupted."
        interrupted_by:
          type: [string, 'null']
          description: "Actor who triggered the interruption: `user` for manual interruption via the interrupt endpoint, or `system` for executor-initiated interrupts."
        started_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the executor began processing this run or node. Null if execution has not started."
        completed_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when this run or node reached a terminal state. Null if not yet complete."
        last_heartbeat:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp of the executor's most recent heartbeat for this node. Used for orphan detection: nodes with a stale heartbeat (> 30 s without update while RUNNING) are transitioned to FAILED."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."

    # ── Project ───────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, domain_profile, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
        description:
          type: [string, 'null']
          description: "Optional human-readable description of this project's purpose, scope, or domain context. Displayed in the project list and admin panel. Max suggested length: 500 characters."
        domain_profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
        confidentiality:
          $ref: '#/components/schemas/Confidentiality'
          description: "Data sensitivity level applied to LLM routing. Determines which providers are eligible. See `Confidentiality` schema."
        config:
          description: "Project-level configuration overrides applied to all runs in this project. Keys and values are project-specific and interpreted at run creation. Examples: default supervision mode, output language, preferred skill packs."
          type: object
          additionalProperties: true
        regulatory_ctx:
          description: "List of regulatory framework tags applicable to this project, e.g. `['GDPR', 'HIPAA', 'SOC2']`. Used by the Intent Classifier to enforce minimum confidentiality levels and disable non-compliant LLM providers."
          type: array
          items:
            type: string
        config_git_hash:
          type: [string, 'null']
          description: "Git commit SHA of the last successfully committed project configuration snapshot. Null until the first configuration write."
        config_git_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp of the last configuration commit to the project's `config.git` repository."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
        updated_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of the most recent update to this resource. Populated by the server on every write."

    # ── LLM Profile ───────────────────────────────────────────────────────────
    LlmProfile:
      type: object
      required: [id, provider, model_string, tier]
      properties:
        id:
          type: string
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        provider:
          description: "LLM provider identifier. Determines the API client adapter, authentication mechanism, rate limit handling, and trust tier. Evaluated against project confidentiality and jurisdiction constraints before selection."
          type: string
          enum: [anthropic, openai, gemini, ollama, cometapi, mistral, deepseek, qwen, minimax, github_copilot]
        model_string:
          type: string
          description: "Provider-native model identifier string, e.g. `claude-sonnet-4-6`, `gpt-4o`. Passed verbatim to the provider API."
        tier:
          description: "Quality/cost tier for this model. `fast` = lowest latency and cost, suitable for classification and smoke tests. `balanced` = mid-tier, suitable for writing and review. `powerful` = highest capability and cost, used for complex planning and critical review."
          type: string
          enum: [fast, balanced, powerful]
        trust_tier:
          type: integer
          minimum: 1
          maximum: 3
          description: "Trust classification used to gate data routing against project confidentiality. `1` = fully trusted providers (Anthropic, OpenAI direct, Google Gemini) — eligible at all confidentiality levels. `2` = vetted providers (Mistral, GitHub Copilot, CometAPI) — blocked at `CRITICAL`. `3` = unvetted or CN-jurisdiction providers (DeepSeek, Qwen, MiniMax) — blocked at `HIGH`, `CRITICAL`, and when `no_cn_jurisdiction` is set."
        jurisdiction:
          description: "Primary geographic jurisdiction of the provider's data processing infrastructure. Used by the LLM selector to enforce `eu_only` and `no_cn_jurisdiction` routing constraints defined on the run."
          type: string
          enum: [us, eu, cn, local, unknown]
        jurisdiction_block:
          description: "Confidentiality levels at which this provider is automatically excluded from selection. For example, a CN-jurisdiction provider may block `internal` and `secret` levels. Applied by the LLM selector before any other preference."
          type: array
          items:
            $ref: '#/components/schemas/Confidentiality'
        base_url:
          description: "Optional base URL overriding the provider's default API endpoint. Required for self-hosted Ollama instances, OpenAI-compatible proxies (CometAPI), or private deployments. Validated against the SSRF blocklist before saving."
          type: [string, 'null']
          format: uri
        modality:
          type: string
          enum: [text, image, multimodal]
          default: text
          description: "Modality supported by this model. `text` (default) = language model. `image` = image generation model (DALL-E, Imagen). `multimodal` = both text and image. The executor routes IMAGE_GEN DAG nodes to profiles with modality=image."

    # ── Analytics ─────────────────────────────────────────────────────────────

    LlmOverrides:
      type: object
      additionalProperties: false
      description: |
        Per-agent LLM profile overrides for a run.
        Each key selects the exact profile ID to use for that agent stage.
        Absent keys = auto-selection by the system.
        Profile IDs are validated against enabled profiles in the DB at run creation;
        unknown or disabled IDs return HTTP 422.
        `CLASSIFIER` cannot be overridden — it always uses the fastest eligible profile.
      properties:
        PLANNER:
          type: string
          maxLength: 128
          description: "LLM profile ID to force for the PLANNER agent. Injected into the initial PLANNER node metadata so the executor routes it to this model."
        WRITER:
          type: string
          maxLength: 128
          description: "LLM profile ID to force for all WRITER agents produced by the DAG expansion."
        REVIEWER:
          type: string
          maxLength: 128
          description: "LLM profile ID to force for all REVIEWER agents produced by the DAG expansion."

    AvailableProfile:
      type: object
      required: [id, provider, model_string, tier]
      description: "Safe excerpt of an LlmProfile returned by `GET /models/available`. Never includes `config` or `api_key_enc` secrets."
      properties:
        id:
          type: string
          description: "Unique identifier for this LLM profile. Use as the value in `LlmOverrides` when overriding agents."
        provider:
          type: string
          description: "LLM provider identifier, e.g. `anthropic`, `openai`."
        model_string:
          type: string
          description: "Provider-native model identifier, e.g. `claude-sonnet-4-6`."
        tier:
          type: string
          enum: [fast, balanced, powerful]
          description: "Quality / cost tier. `fast` = lowest cost + latency; `balanced` = mid-tier; `powerful` = highest capability."
        context_window:
          type: integer
          description: "Maximum context window in tokens."
        cost_per_1m_input_tokens:
          type: number
          description: "Cost in USD per one million input tokens."
        cost_per_1m_output_tokens:
          type: number
          description: "Cost in USD per one million output tokens."
        modality:
          type: string
          enum: [text, image, multimodal]
          description: "Modality supported by this model."

    # ── Analytics (original marker kept) ──────────────────────────────────────
    AnalyticsSummary:
      type: object
      properties:
        runs_total:
          type: integer
          description: "Total number of runs created in the selected analytics period, across all statuses."
        runs_completed:
          type: integer
          description: "Number of runs that reached COMPLETED status in the selected analytics period."
        completion_rate_pct:
          type: number
          description: "Percentage of runs that completed successfully: `runs_completed / runs_total * 100`."
        users_active:
          type: integer
          description: "Number of distinct users who created at least one run in the selected analytics period."
        retention_rate_pct:
          type: number
          description: "Percentage of users from the previous period who also created runs in the current period."
        cost_total_usd:
          type: number
          description: "Total LLM cost in USD across all runs in the selected analytics period."
        cost_per_run_usd:
          type: number
          description: "Average LLM cost per run in the selected analytics period. Useful for budget forecasting."
        approval_direct_rate_pct:
          type: number
          description: "Percentage of runs where the Human Gate was approved without modification on the first submission. A proxy for output quality."
        avg_critical_findings:
          type: number
          description: "Average number of Critical Reviewer blocking findings per completed run. Lower is better; target is 0."
        avg_user_rating:
          type: [number, 'null']
          description: "Average user star rating (1–5) across completed runs that received feedback. Null when no feedback has been submitted."
        estimated_hours_saved:
          type: [number, 'null']
          description: "User-declared estimate of manual work hours saved by this run. Submitted via the feedback endpoint after completion. Used for ROI analytics."
        roi_multiplier:
          type: [number, 'null']
          description: "Value-to-cost ratio: `estimated_hours_saved * hourly_rate / cost_actual_usd`. Null when either KPI input is missing."
        roi_coverage_pct:
          type: number
          description: "Percentage of completed runs in the period that have user-submitted ROI feedback, indicating ROI data completeness."

    AnalyticsDataPoint:
      type: object
      properties:
        ts:
          type: string
          format: date-time
          description: "ISO 8601 timestamp for the start of this data point's time bucket."
        runs:
          type: integer
          description: "Number of runs in this bucket."
        cost:
          type: number
          description: "Total LLM cost in USD for runs in this bucket."
        tokens:
          type: integer
          description: "Combined input and output token count for all LLM calls attributed to runs completed in this time bucket. Use to plot token consumption trends across the selected analytics period."

    ProfileBreakdown:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Domain profile for this breakdown bucket. Groups runs by the `domain_profile` assigned at run creation."
        runs:
          type: integer
          description: "Number of runs in this bucket."
        cost:
          type: number
          description: "Total LLM cost in USD for runs in this bucket."
        avg_rating:
          type: [number, 'null']
          description: "Average user star rating for runs in this bucket. Null when no feedback has been submitted."

    UserBreakdown:
      type: object
      properties:
        user_id:
          type: string
          description: "Identifier of the user account. References the Better Auth `user` table."
        display_name:
          type: [string, 'null']
          description: "Anonymised or real display name of the user, depending on the caller's permission level (`admin:audit` reveals real names)."
        runs:
          type: integer
          description: "Number of runs in this bucket."
        cost:
          type: number
          description: "Total LLM cost in USD for runs in this bucket."

    BoardKPI:
      type: object
      properties:
        key:
          type: string
          description: "Machine-readable KPI identifier, e.g. `completion_rate`, `avg_cost_usd`."
        value:
          description: "Computed KPI value for the selected period. Type is key-dependent: a number (percentage or USD amount) for rate and cost KPIs, an integer for count KPIs, or null when insufficient data exists for the period."
        delta:
          type: [number, 'null']
          description: "Relative change versus the equivalent previous period, expressed as a percentage-point difference. Positive values indicate improvement (e.g. `+5.0` = 5 pp better than the prior period). Null when the previous period has no data or when the metric is not rate-based."

    AnalyticsResponse:
      type: object
      properties:
        period:
          description: "The time window over which analytics aggregates were computed, echoing the caller-supplied `from` and `to` query parameters."
          type: object
          properties:
            from:
              type: string
              format: date-time
              description: "Start of the analytics period (inclusive), ISO 8601 UTC. The caller-supplied start bound used to filter runs and compute aggregates."
            to:
              type: string
              format: date-time
              description: "End of the analytics period (inclusive), ISO 8601 UTC. The caller-supplied end bound used to filter runs and compute aggregates."
        summary:
          $ref: '#/components/schemas/AnalyticsSummary'
          description: "Aggregated KPI metrics for the requested period: completion rates, cost totals, user retention, and ROI indicators."
        timeseries:
          description: "Chronological list of data points bucketed by `granularity`. Use to render trend charts for runs, cost, and token consumption over the selected period."
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsDataPoint'
        by_profile:
          description: "Breakdown of run counts, costs, and ratings grouped by domain profile. Shows which AI workflow categories drive the most usage and cost."
          type: array
          items:
            $ref: '#/components/schemas/ProfileBreakdown'
        by_user:
          description: "Breakdown of run counts and costs grouped by user. Visible only to callers with `admin:audit` permission; other callers receive anonymised user IDs."
          type: array
          items:
            $ref: '#/components/schemas/UserBreakdown'
        top_kpis:
          description: "List of the most relevant KPIs for the board view, pre-selected and ordered by the server. Each entry includes a delta versus the previous equivalent period."
          type: array
          items:
            $ref: '#/components/schemas/BoardKPI'

    # ── Members & Roles ───────────────────────────────────────────────────────
    ProjectRole:
      type: object
      required: [id, name, display_name, permissions, is_builtin]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: string
          description: "Machine-readable slug for this role, unique within the project. Used as a stable identifier in role-assignment APIs. Built-in role slugs: `viewer`, `operator`, `user`, `user_with_costs`, `developer`, `admin`. Custom roles use a caller-supplied slug."
        display_name:
          type: string
          description: "Human-readable label shown in the member management UI and role picker. Built-in roles capitalise the slug (e.g. `Viewer`, `Admin`). Custom roles use the label provided at creation."
        extends:
          description: "Built-in role slug this custom role additively extends. All permissions of the parent role are inherited. Null means the role is standalone with only the permissions explicitly listed in `permissions`."
          type: [string, 'null']
          enum: [viewer, operator, user, user_with_costs, developer, admin, null]
        permissions:
          description: "Explicit list of permissions granted by this role, in addition to those inherited from `extends`. For built-in roles, this is the complete and canonical permission set."
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        is_builtin:
          type: boolean
          description: "True for the seven factory-installed roles (`viewer` through `instance_admin`). Built-in roles cannot be deleted or renamed."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."

    ProjectMember:
      type: object
      properties:
        user_id:
          type: string
          description: "Identifier of the user account. References the Better Auth `user` table."
        added_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp when this user was added to the project."
        added_by:
          type: [string, 'null']
          description: "Identifier of the user or actor who added this member to the project. Null for the project creator (bootstrap case)."
        user:
          description: "Basic profile of the member's user account. `email` is only visible to callers with `members:manage` or `admin:audit` permission."
          type: object
          properties:
            id:
              type: string
              description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
            name:
              type: [string, 'null']
              description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
            email:
              type: string
              format: email
              description: "Verified email address of the user. Used for authentication and invitation delivery."
        role:
          $ref: '#/components/schemas/ProjectRole'
          description: "Role assigned to this member or API key, determining their permission set within this project."

    # ── API Keys ──────────────────────────────────────────────────────────────
    ProjectApiKey:
      type: object
      description: "key_hash and raw key are NEVER returned (write-once)"
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: string
          description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
        role:
          $ref: '#/components/schemas/ProjectRole'
          description: "Role assigned to this member or API key, determining their permission set within this project."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
        created_by:
          type: [string, 'null']
          description: "Identifier of the user who created this API key or credential. Used for audit tracing."
        last_used:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp of the most recent request authenticated with this API key. Null if the key has never been used."
        expires_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp after which this API key is no longer valid. Null means the key does not expire."
        revoked_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when this API key was revoked. Non-null means the key is invalid regardless of expiry."

    # ── Integrations ──────────────────────────────────────────────────────────
    Skill:
      type: object
      required: [id, name, enabled]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: string
          description: "Human-readable name of this MCP skill pack, displayed in the skill marketplace and admin panel. Must be unique within the instance."
        pack_id:
          type: [string, 'null']
          description: "Stable machine identifier for the pack, e.g. `ui_ux_pro_max`. Lowercase alphanumeric + underscores, 1–64 chars. Used as a key for update checks."
          example: "ui_ux_pro_max"
        capability_type:
          type: [string, 'null']
          description: "Category of the pack that determines how it is loaded and invoked."
          enum: [domain_pack, mcp_skill, prompt_only, harmoven_agent, js_ts_plugin, slash_command, null]
        source_url:
          type: [string, 'null']
          format: uri
          description: "Resolved raw content URL (e.g. `raw.githubusercontent.com`). Updated when `source_ref` is changed after installation."
        source_type:
          description: "Origin of the skill pack. `official` = published by Harmoven. `git` = from a Git repository. `local` = uploaded directly by an admin."
          type: string
          enum: [official, git, local]
        source_ref:
          type: [string, 'null']
          description: "Git ref (branch name, tag, or full 40-char commit SHA) pinned at installation or last update. Changing this triggers a re-fetch and re-scan."
          example: "main"
        version:
          type: [string, 'null']
          description: "Semantic version string declared in the pack manifest, e.g. `1.2.3`."
        author:
          type: [string, 'null']
          description: "Author name or organisation as declared in the pack manifest."
        tags:
          type: array
          items:
            type: string
          description: "Comma-separated keyword tags for filtering in the marketplace UI."
        enabled:
          type: boolean
          description: "Whether this resource is currently active. Disabled resources are excluded from execution and scheduling."
        scan_status:
          description: "Result of the automated security scan. `passed` = scan OK, eligible for activation. `pending` = not yet scanned. `failed` = policy violation; cannot be activated."
          type: string
          enum: [passed, pending, failed]
        scan_report:
          type: [object, 'null']
          additionalProperties: true
          description: "JSON object containing the scan details: `scanned_at`, `content_sha256`, `source`, and any violation summaries. Never contains raw pack content."
        approved_by:
          type: [string, 'null']
          description: "User ID of the instance admin who approved this pack. Null until explicitly approved."
        approved_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the pack was approved by an admin."
        update_policy:
          description: "Controls how version updates are applied. `auto` = installed automatically. `notify` = admin alerted. `manual` = never auto-applied."
          type: string
          enum: [auto, notify, manual]
        installed_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp when this skill pack was installed on the instance."
        config:
          description: "Pack-level configuration set by the admin. Schema is pack-specific. For `mcp_skill`, must include a `command` field."
          type: object
          additionalProperties: true

    # ── Credentials ───────────────────────────────────────────────────────────
    Credential:
      type: object
      description: "value_enc is NEVER returned"
      required: [id, name, type]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: string
          description: "Human-readable label for this credential, shown in the credentials vault UI. Should identify the external service it authenticates against, e.g. `Stripe Live`, `GitHub Actions`. Must be unique within the project."
        type:
          description: "Authentication mechanism of this credential. `HTTP_BEARER` injects `Authorization: Bearer <value>`. `HTTP_BASIC` encodes as Basic auth. `HEADER` injects a custom header. `QUERY_PARAM` appends to the query string. `OAUTH2` uses a token exchange flow. `SSH_KEY` is used for Git operations."
          type: string
          enum: [HTTP_BEARER, HTTP_BASIC, HEADER, QUERY_PARAM, OAUTH2, SSH_KEY]
        host_pattern:
          type: string
          description: "Hostname pattern that scopes credential injection. The credential is only injected into tool calls targeting hosts matching this pattern, e.g. `api.stripe.com`."
        path_pattern:
          type: [string, 'null']
          description: "Optional URL path prefix that further scopes credential injection. When set, the credential is only injected for requests whose path starts with this prefix."
        tool_scope:
          description: "List of tool identifiers allowed to use this credential. An empty list permits all project tools. Restricting scope limits blast radius if a tool agent is compromised or misbehaves."
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."
        updated_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of the most recent update to this resource. Populated by the server on every write."

    # ── Triggers ──────────────────────────────────────────────────────────────
    Trigger:
      type: object
      required: [id, project_id, type, enabled]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        project_id:
          type: string
          format: uuid
          description: "Identifier of the project this resource belongs to. All IDOR checks gate access based on project membership."
        type:
          description: "Trigger mechanism type. `CRON` fires on a schedule using a cron expression. `FILE_WATCHER` fires when files change within a monitored directory. `WEBHOOK` fires when an authenticated HTTP POST is received at the trigger endpoint."
          type: string
          enum: [CRON, FILE_WATCHER, WEBHOOK]
        enabled:
          type: boolean
          description: "Whether this resource is currently active. Disabled resources are excluded from execution and scheduling."
        config:
          oneOf:
            - description: CRON config
              type: object
              required: [schedule]
              properties:
                schedule:
                  type: string
                  description: "cron expression, e.g. '0 9 * * 1-5'"
                timezone:
                  type: string
                  default: "UTC"
                  description: "IANA timezone name applied to the cron schedule, e.g. `Europe/Paris`. Defaults to `UTC`."
            - description: FILE_WATCHER config
              type: object
              required: [watch_path]
              properties:
                watch_path:
                  type: string
                  description: "Absolute filesystem path monitored for changes. The trigger fires when any file within this path is created, modified, or deleted."
                debounce_seconds:
                  type: integer
                  default: 5
                  description: "Number of seconds to wait after the last file change event before firing the trigger. Prevents redundant run creation when many files change in rapid succession."
            - description: WEBHOOK config
              type: object
              properties:
                webhook_secret:
                  type: string
                  description: "Shared secret used to authenticate incoming webhook deliveries. Harmoven computes `HMAC-SHA256(raw_request_body, secret)` and sets the result in the `X-Harmoven-Signature: sha256={hex}` header. Verify this header on your receiver before processing the payload. Omit at creation to generate a signed endpoint — the secret is returned once in the creation response and never again."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."

    # ── SSE Events ────────────────────────────────────────────────────────────
    RunSSEEventInitial:
      type: object
      required: [type, run, nodes]
      properties:
        type:
          type: string
          enum: [initial]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        run:
          $ref: '#/components/schemas/Run'
          description: "The full Run object representing the created or retrieved execution."
        nodes:
          description: "Full snapshot of all RunNode objects at stream open time. Clients use this to initialise their local state before applying subsequent `state_change` events."
          type: array
          items:
            $ref: '#/components/schemas/RunNode'

    RunSSEEventStateChange:
      type: object
      required: [type, entity_type, id, status]
      properties:
        type:
          type: string
          enum: [state_change]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        entity_type:
          type: string
          enum: [run, node]
          description: "Indicates whether the state change applies to the run itself or to one of its constituent nodes."
        id:
          type: string
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        status:
          type: string
          description: "New status of the entity after the state change. For `entity_type: run`, one of the `RunStatus` values. For `entity_type: node`, one of the `NodeStatus` values. Clients should update their local state and re-render affected components."

    RunSSEEventCostUpdate:
      type: object
      required: [type, cost_usd, tokens, percent_of_budget]
      description: "Requires stream:costs permission"
      properties:
        type:
          type: string
          enum: [cost_update]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        cost_usd:
          type: number
          description: "Cumulative cost in USD of all LLM calls made so far in this run, at the moment this event was emitted. Monotonically increasing. Sent after each node completes a billable LLM call. Use `percent_of_budget` to assess proximity to the budget ceiling."
        tokens:
          type: integer
          description: "Cumulative combined input and output token count across all DAG nodes in this run at the moment this event was emitted. Monotonically increasing. Use alongside `percent_of_budget` to monitor proximity to the `budget_tokens` ceiling."
        percent_of_budget:
          type: number
          description: "Percentage of the run's `budget_usd` consumed so far: `cost_actual_usd / budget_usd * 100`. Null when no budget is set."

    RunSSEEventHumanGate:
      type: object
      required: [type, gate_id, reason]
      description: "Requires stream:gates permission"
      properties:
        type:
          type: string
          enum: [human_gate]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        gate_id:
          type: string
          description: "Identifier of the HumanGate record opened by this event."
        reason:
          type: string
          description: "Human-readable reason for the fallback or gate event."
        data:
          description: "Gate-specific context payload. For `human_gate` events this includes the Reviewer output text and any Critical Reviewer findings requiring operator action. Schema varies by gate reason. Null when the gate was opened without attached review content."
          type: object
          additionalProperties: true

    RunSSEEventBudgetWarning:
      type: object
      required: [type, percent_used, remaining_usd]
      description: "Requires stream:costs permission. Fired at 80% of any budget limit."
      properties:
        type:
          type: string
          enum: [budget_warning]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        percent_used:
          type: number
          description: "Percentage of the run's budget consumed when this warning was emitted."
        remaining_usd:
          type: number
          description: "Remaining budget in USD when this warning was emitted."

    RunSSEEventLlmFallback:
      type: object
      required: [type, node_id, from, to, reason]
      description: "Requires stream:costs permission"
      properties:
        type:
          type: string
          enum: [llm_fallback]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        node_id:
          type: string
          description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
        from:
          type: string
          description: "LLM profile ID the executor was using before the fallback event triggered."
        to:
          type: string
          description: "LLM profile ID the executor switched to after the fallback trigger."
        reason:
          type: string
          description: "Human-readable reason for the fallback or gate event."

    RunSSEEventCompleted:
      type: object
      required: [type, run, handoff_note]
      properties:
        type:
          type: string
          enum: [completed]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        run:
          $ref: '#/components/schemas/Run'
          description: "The full Run object representing the created or retrieved execution."
        handoff_note:
          type: string
          description: "Plain-language summary produced by the final agent describing what was created, what assumptions were made, and recommended next steps."

    RunSSEEventError:
      type: object
      required: [type, node_id, message]
      properties:
        type:
          type: string
          enum: [error]
          description: "SSE event type discriminator. Determines the structure of the event payload."
        node_id:
          type: string
          description: "Identifier string of the DAG node (e.g. `n1`, `n2`). Matches the `node_id` in the Dag definition — not a UUID."
        message:
          type: string
          description: "Human-readable description of the event, error, or update."

    RunSSEEventSpawnedFollowupRuns:
      type: object
      required: [type, node_id, runs]
      description: "Emitted when a REVIEWER node completes with verdict `SPAWN_FOLLOWUP`. Each entry in `runs` is a newly created child run in the same project, automatically launched by the executor."
      properties:
        type:
          type: string
          enum: [spawned_followup_runs]
          description: "SSE event type discriminator."
        node_id:
          type: string
          description: "Identifier of the REVIEWER DAG node that triggered the spawn."
        runs:
          type: array
          description: "List of spawned follow-up runs."
          items:
            type: object
            required: [run_id, label]
            properties:
              run_id:
                type: string
                format: uuid
                description: "UUID of the newly created child run."
              label:
                type: string
                description: "Short human-readable label for this follow-up run, as determined by the Reviewer LLM. Displayed in the UI as a link."

    RunSSEEvent:
      oneOf:
        - $ref: '#/components/schemas/RunSSEEventInitial'
        - $ref: '#/components/schemas/RunSSEEventStateChange'
        - $ref: '#/components/schemas/RunSSEEventCostUpdate'
        - $ref: '#/components/schemas/RunSSEEventHumanGate'
        - $ref: '#/components/schemas/RunSSEEventBudgetWarning'
        - $ref: '#/components/schemas/RunSSEEventLlmFallback'
        - $ref: '#/components/schemas/RunSSEEventCompleted'
        - $ref: '#/components/schemas/RunSSEEventError'
        - $ref: '#/components/schemas/RunSSEEventSpawnedFollowupRuns'
      discriminator:
        propertyName: type

    ProjectLifecycleEvent:
      oneOf:
        - type: object
          required: [type, run_id, profile, task_summary]
          properties:
            type:
              type: string
              enum: [run_started]
              description: "SSE event type discriminator. Determines the structure of the event payload."
            run_id:
              type: string
              description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
            profile:
              type: string
              description: "The resolved LLM profile assigned to or retrieved for this entity."
            task_summary:
              type: string
              description: "Short LLM-generated summary of the task objective, used for the run list display and Human Gate description panel. Max 200 characters."
        - type: object
          required: [type, run_id, status]
          properties:
            type:
              type: string
              enum: [run_finished]
              description: "SSE event type discriminator. Determines the structure of the event payload."
            run_id:
              type: string
              description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
            status:
              $ref: '#/components/schemas/RunStatus'
              description: "Terminal status of the run: `COMPLETED` (all nodes succeeded) or `FAILED` (an unrecoverable error occurred). Used by the Kanban board to move the card to the correct column."
        - type: object
          required: [type, gate_id, reason]
          properties:
            type:
              type: string
              enum: [gate_opened]
              description: "SSE event type discriminator. Determines the structure of the event payload."
            gate_id:
              type: string
              description: "Identifier of the HumanGate record opened by this event."
            reason:
              type: string
              description: "Human-readable reason for the fallback or gate event."

    # ── Handoff Schemas ───────────────────────────────────────────────────────
    ClassifierHandoff:
      type: object
      description: "Output of the Classifier agent, stored in Handoff table"
      properties:
        classifier_version:
          type: string
          description: "Semver string of the Intent Classifier model version that produced this result. Used for reproducibility and regression tracking."
        input_summary:
          type: string
          description: "Short LLM-generated summary of the raw user input, used for logging and Human Gate display. Max 500 characters."
        detected_profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Domain profile selected by the Intent Classifier with highest confidence. Drives LLM tier selection, supervision defaults, and safety guardrails."
        output_type:
          description: "Categorisation of the expected deliverable, inferred from the user's task. Drives agent specialisation — e.g. `web_app` enables frontend-specific tools, `data_pipeline` enables SQL/ETL tools, `document` routes to the writing agent tier."
          type: string
          enum: [web_app, api_only, cli_tool, desktop_app, library, data_pipeline,
                 native_binary, embedded, mobile_pwa, mobile_crossplatform,
                 mobile_native_ios, mobile_native_android, document, data]
        domain:
          type: string
          description: "Primary business domain of the task as determined by the Intent Classifier. Coarser-grained than `detected_profile` — maps to an industry vertical such as `software`, `finance`, `legal`, `hr`, `marketing`, or `data`. Used to select domain-specific prompt overlays and tool presets."
        confidence:
          type: integer
          minimum: 0
          maximum: 100
          description: "Confidence score (0–100) of the classifier's domain profile selection. Scores below 60 trigger the uncertainty branch and surface a user confirmation dialog requesting input before the run starts."
        confidence_rationale:
          type: string
          description: "One-sentence explanation produced by the classifier describing why it assigned the detected profile and confidence score."
        clarification_questions:
          description: "Questions the Classifier suggests presenting to the user when confidence is below the threshold. Each question targets a specific ambiguity in the task description. Displayed in the pre-run confirmation dialog when user input is needed."
          type: array
          items:
            type: string
        fallback_profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Fallback domain profile if the user declines the `detected_profile` confirmation. Null when no fallback is applicable."
        user_confirmation_text:
          type: string
          description: "Copy presented to the user in the confirmation dialog when classifier confidence is below threshold. Explains the detected profile and asks the user to confirm."

    PlannerHandoff:
      type: object
      description: "Output of the Planner agent — contains the full DAG"
      properties:
        handoff_version:
          type: string
          description: "Schema version of this handoff payload. Used by the receiving agent to select the correct deserialiser."
        source_agent:
          type: string
          enum: [PLANNER]
          description: "Identifier of the agent that produced this handoff payload."
        target_agent:
          type: string
          enum: [DAG_EXECUTOR]
          description: "Identifier of the agent expected to consume this handoff payload."
        run_id:
          type: string
          description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
        domain_profile:
          $ref: '#/components/schemas/DomainProfile'
          description: "Domain profile applied to this run, determining the safety preset, LLM tier defaults, and Human Gate threshold."
        task_summary:
          type: string
          description: "Short LLM-generated summary of the task objective, used for the run list display and Human Gate description panel. Max 200 characters."
        assumptions:
          description: "List of plain-language assumptions the Planner made when decomposing the task into a DAG. Displayed in the Human Gate approval panel so the operator can verify correctness before approving execution."
          type: array
          items:
            type: string
        dag:
          $ref: '#/components/schemas/Dag'
          description: "Directed Acyclic Graph of agent nodes and dependency edges, generated by the Planner. Governs the execution order and parallelism of agent calls."
        meta:
          description: "Planner metadata about DAG quality and execution estimates. Used by the Human Gate UI and budget guard to make pre-run decisions."
          type: object
          properties:
            confidence:
              type: integer
              description: "Planner confidence score (0–100) in the generated DAG structure. Scores below 85 set `requires_human_approval = true` and surface the pre-run DAG approval UI. Low scores typically result from ambiguous task inputs or novel task types."
            requires_human_approval:
              type: boolean
              description: "True when the Planner confidence score is below 85, indicating the DAG should be reviewed by a human operator before execution begins. When true the Pre-Run Approval UI is shown with the annotated DAG preview and the list of Planner assumptions."
            estimated_total_tokens:
              type: integer
              description: "Planner estimate of the total token count across all nodes in the run, used for budget pre-check before the first LLM call."
            estimated_cost_usd:
              type: number
              description: "Pre-run cost estimate computed by the Planner from DAG node weights and LLM tier pricing. Displayed to the user before confirming the run."
            estimated_duration_minutes:
              type: number
              description: "Pre-run duration estimate in minutes, computed from DAG depth and typical node latencies. Updated when the Planner finalises the DAG."
            parallel_branches:
              description: "Groups of `node_id` values that can execute concurrently, produced by the Planner for the DAG visualisation. Does not affect execution — the executor derives parallelism from `depends_on`."
              type: array
              items:
                type: array
                items:
                  type: string
            human_gate_points:
              description: "List of `node_id` values where the Planner has inserted a `human_gate` node for mandatory operator review. Used by the Pre-Run Approval UI to annotate the DAG preview."
              type: array
              items:
                type: string
        trace_id:
          type: string
          description: "W3C TraceContext trace ID (16 hex bytes). Correlates all spans across this run in the distributed trace."
        span_id:
          type: string
          description: "W3C TraceContext span ID (8 hex bytes). Uniquely identifies this operation within the parent trace."
        parent_span_id:
          type: [string, 'null']
          description: "Span ID of the parent span, or null for root spans. Used to reconstruct the call tree in the observability backend."

    CriticalFinding:
      type: object
      required: [id, severity, title, observation, impact]
      description: "Max 3 findings enforced by Critical Reviewer (Am.75)"
      properties:
        id:
          description: "Unique identifier of this finding within the Critical Reviewer result. Stable across re-runs of the same output; used to action (ignore or queue) findings via the gate endpoint."
          type: string
        severity:
          description: "Severity of this finding. `blocking` = must be resolved before the output can be approved. `important` = significant issue recommended for immediate action. `watch` = low-risk note for future consideration."
          type: string
          enum: [blocking, important, watch]
        title:
          type: string
          description: "Concise headline of the finding (max 10 words). Displayed as the card title in the Critical Reviewer panel. Must identify the issue clearly without jargon."
        observation:
          type: string
          description: "One or two factual sentences describing what was observed in the output. Objective and evidence-based — no recommendations. Displayed in the finding expansion panel beneath the title."
        impact:
          type: string
          description: "Concrete, specific consequence of the finding if left unaddressed, expressed in terms of risk, data loss, user impact, or compliance failure. Displayed beneath the observation in the Critical Reviewer panel."
        suggestion:
          description: "Actionable recommended fix for this finding, produced by the Critical Reviewer. Null when no clear remediation exists or when the finding is informational only."
          type: [string, 'null']
        domain:
          description: "Category of the finding. `security` = vulnerabilities or credential exposure. `architecture` = design flaws. `scalability` = performance bottlenecks. `assumptions` = unverified Planner assumptions. `compliance` = regulatory violations. `hardware`, `maintenance`, `dependencies`, `safety` = operational concerns."
          type: string
          enum: [security, architecture, scalability, assumptions, compliance,
                 hardware, maintenance, dependencies, safety]

    # ── Webhooks ──────────────────────────────────────────────────────────────
    WebhookPayload:
      type: object
      description: |
        Sent to `webhook_url` on run completion.
        Signed with HMAC-SHA256 in header `X-Harmoven-Signature: sha256={hex}`.
      required: [event, run_id, run]
      properties:
        event:
          description: "Webhook event type. `run.completed` = run reached terminal COMPLETED state. `run.failed` = run reached terminal FAILED state. `run.gate_opened` = a Human Gate requires operator action."
          type: string
          enum: [run.completed, run.failed, run.gate_opened]
        run_id:
          type: string
          description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
        run:
          $ref: '#/components/schemas/Run'
          description: "The full Run object representing the created or retrieved execution."
        metadata:
          description: "Caller-supplied metadata attached to the run at creation, echoed in the webhook payload. Enables correlation with external system records (ticket IDs, commit SHAs)."
          type: object
          additionalProperties:
            type: string

    # ── PipelineTemplate ──────────────────────────────────────────────────────
    PipelineTemplate:
      type: object
      description: "A reusable pipeline template consisting of a DAG definition with optional version history."
      required: [id, name, dag, is_public, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: "Unique template identifier."
        name:
          type: string
          description: "Human-readable template name."
        description:
          type: string
          nullable: true
          description: "Optional description of the template's purpose."
        project_id:
          type: string
          format: uuid
          nullable: true
          description: "Project scope. Null for personal or public templates."
        is_public:
          type: boolean
          description: "When true the template is visible to all instance users."
        dag:
          type: object
          description: "DAG definition. Contains the full directed acyclic graph of agent nodes and their connections."
          required: [nodes, edges]
          properties:
            nodes:
              type: array
              description: "Ordered list of agent nodes in the pipeline. Each node specifies an agent type, LLM provider, and optional configuration overrides."
              items:
                type: object
            edges:
              type: array
              description: "Directed connections between nodes. Each edge defines a `source → target` dependency. A node is executed only after all its source nodes have completed."
              items:
                type: object
        change_note:
          type: string
          nullable: true
          description: "Description of the most recent change."
        created_by:
          type: string
          format: uuid
          description: "User ID of the template creator."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 UTC timestamp of template creation."
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: "ISO 8601 UTC timestamp of the most recent update."

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
        name:
          type: [string, 'null']
          description: "Display name of the user account, shown in the member list and audit log. Set by the user at registration or via their profile settings. Null when the user has not configured a display name."
        email:
          type: string
          format: email
          description: "Verified email address of the user. Used for authentication and invitation delivery."
        role:
          type: string
          enum: [user, instance_admin]
          description: "System-level role. Project-level roles are in ProjectMember."
        banned_at:
          type: [string, 'null']
          format: date-time
          description: "ISO 8601 timestamp when the user account was suspended by an admin. Null for active accounts. Suspended users cannot sign in."
        created_at:
          type: string
          format: date-time
          description: "ISO 8601 timestamp at which this resource was created. Set by the server; read-only."

    ConfigVersion:
      description: |
        A single commit in the project's configuration git history. Represents
        one atomic change to one or more config files (`project.json`,
        `AGENTS.md`, `orchestrator.yaml`, `roles/*.json`).
        History is append-only — commits are never rebased or amended.
      type: object
      required: [hash, message, author, timestamp, changed]
      properties:
        hash:
          type: string
          minLength: 7
          maxLength: 7
          description: "Short (7-character) git commit hash. Stable identifier used in `diff` and `restore` calls. Guaranteed unique within a repository."
          example: "a3f9c12"
        message:
          type: string
          description: "Auto-generated commit message describing the change."
          example: "set: AGENTS.md by usr_01HXY4ZQPB"
        author:
          type: string
          description: "User ID of the actor who triggered the config change, or the string `system` for automated changes."
          example: "usr_01HXY4ZQPB"
        timestamp:
          type: string
          format: date-time
          description: "ISO 8601 UTC timestamp of when the commit was created."
          example: "2026-03-15T14:22:11.000Z"
        changed:
          type: array
          description: "Relative paths of files modified by this commit."
          items:
            type: string
          example: ["projects/c96e5d92-a5e3-41de-b7a2-309411ad4460/AGENTS.md"]

    ConfigDiff:
      description: |
        Comparison between two config versions. Provides the full content before
        and after the change, plus the standard unified diff patch.
      type: object
      required: [before, after, patch]
      properties:
        before:
          type: string
          description: "Full text content of the file(s) at the older commit. Empty string if the file did not exist at that revision."
        after:
          type: string
          description: "Full text content of the file(s) at the newer commit. Empty string if the file was deleted."
        patch:
          type: string
          description: "Raw unified diff output (GNU diff format). Empty string if the two hashes are identical."

  # ─── Reusable parameters ──────────────────────────────────────────────────
  parameters:
    ProjectId:
      name: projectId
      description: "UUID of the project to operate on. Used as the primary routing key for all project-scoped endpoints. IDOR checks verify the caller holds a valid membership in this project. Returned by `GET /projects` and in every `Project` object."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      description: "UUID of the run to operate on. Returned by `POST /runs` in the `run_id` field and in every `Run` object. Access is IDOR-gated to the project the run belongs to."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NodeId:
      name: nodeId
      description: "DAG node identifier string (e.g. `n1`, `n_writer`). Matches the `node_id` field in the `DagNode` schema — not a UUID. Visible in `GET /runs/{runId}` nodes array and in SSE `state_change` events."
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      description: "UUID of the target user account. Returned in the `User` schema from `GET /admin/users`. For ban/unban operations the target must not be the calling admin's own account."
      in: path
      required: true
      schema:
        type: string
    RoleId:
      name: roleId
      description: "UUID of the project role to operate on. Returned by `GET /projects/{projectId}/roles`. Built-in roles (`viewer`, `operator`, `user`, `developer`, `admin`) cannot be deleted."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    KeyId:
      name: keyId
      description: "UUID of the API key to operate on. Returned in the `id` field of each entry from `GET /projects/{projectId}/api-keys`. The raw key value is never returned by GET — only this ID is safe to store client-side."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SkillId:
      name: id
      description: "UUID of the integration to operate on. Returned by `GET /admin/integrations`."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialId:
      name: credId
      description: "UUID of the project credential to operate on. Returned by `GET /admin/credentials`. Credential values (secrets) are write-only and never returned by any GET endpoint."
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TriggerId:
      name: triggerId
      description: "UUID of the automation trigger to operate on. Returned by `GET /admin/triggers`. For WEBHOOK triggers the `id` also identifies the delivery endpoint path segment."
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ─── Reusable responses ───────────────────────────────────────────────────
  responses:
    BadRequest:
      description: The request body or query parameters failed schema validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: bad_request
              message: "Invalid input. Check the request body or query parameters."
    Unauthorized:
      description: |
        The request carries no valid credential. Either the session cookie has expired
        or has been revoked (`SessionCookie`), or the Bearer API key is invalid, expired,
        or revoked (`BearerKey`). The caller must re-authenticate before retrying.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: unauthorized
              message: "Missing or expired authentication. Sign in again or provide a valid API key."
    Forbidden:
      description: |
        The credential is valid but the caller's role does not carry the permission required
        to perform this operation on this resource. Verify the role assigned to the API key
        in Project Settings → API Keys, or contact your project `admin` to update your
        membership role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            missing_permission:
              summary: API key role lacks the required permission
              value:
                error:
                  code: forbidden
                  message: "The required permission is not granted to this API key's role."
                  details:
                    required_permission: "<see x-required-permissions on this endpoint>"
                    doc_url: https://harmoven.io/docs/permissions
            wrong_project:
              summary: API key is valid but scoped to a different project
              value:
                error:
                  code: forbidden
                  message: "This API key does not have access to the requested project."
                  details:
                    required_permission: "<see x-required-permissions on this endpoint>"
                    doc_url: https://harmoven.io/docs/permissions
    NotFound:
      description: |
        The requested resource does not exist, or it exists but is not accessible to the
        caller. The response is identical in both cases to prevent resource enumeration.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: run_not_found
              message: "Resource not found or inaccessible."
    RateLimit:
      description: |
        The caller has exceeded the rate limit for this endpoint. Wait the number of
        seconds indicated by `Retry-After` before sending the next request. Public API
        key limit: 60 req/min. `POST /runs` limit: 10 req/min/IP.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Number of seconds to wait before the rate limit window resets.
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum number of requests allowed in the current window.
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Number of requests remaining in the current window (0 when this header is present).
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp at which the rate limit window resets.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: rate_limit_exceeded
              message: "Rate limit exceeded. Retry after 60 seconds."
    ValidationError:
      description: |
        The request body or query parameters failed schema validation or a business
        rule check. Inspect `error.details` for field-level messages (Zod field path
        and issue code when available).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: validation_error
              message: "Required field 'task_input' is missing or invalid."
              details:
                field: task_input
                issue: missing_required_field

    UnprocessableEntity:
      description: |
        The request is syntactically valid JSON but a required field is missing or
        a field value violates a business rule (e.g. missing `run_id` when recording
        template feedback). Inspect `error.details` for field-level messages.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: unprocessable_entity
              message: "`run_id` is required."

    Conflict:
      description: |
        The operation is syntactically valid but the resource is in a state that makes
        the operation impossible. Common causes: attempting to approve an already-resolved
        gate, or pausing a run that is not RUNNING.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: run_already_terminal
              message: "Run is already in a terminal state and cannot be modified."

    TooManyRequests:
      description: |
        Rate limit exceeded. The `Retry-After` header indicates how many seconds
        to wait before retrying.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before the next request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            error:
              code: rate_limit_exceeded
              message: "Rate limit exceeded. Please retry after 60 seconds."

security:
  - SessionCookie: []

# ═══════════════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════════════
paths:

  # ══════════════════════════════════════════════════════════════════════════
  # SYSTEM
  # ══════════════════════════════════════════════════════════════════════════

  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: "Returns 200 OK if the service is up. No authentication required."
      security: []
      tags: [system]
      responses:
        '200':
          description: "All system components are operational — database, executor, LLM connector, and SSE bus are reachable. Response body: `{status: ok}`. Used by load balancer health checks and container liveness probes."
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                    description: "Always `ok` when all system components (database, executor, LLM connector, SSE bus) are healthy and reachable. Any value other than `ok` indicates the service is degraded."

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      description: |
        Prometheus-compatible metrics endpoint.
        Accessible without auth from localhost; configurable otherwise.

        Exported metrics:
        - `orchestrator_run_total{profile, status}`
        - `orchestrator_run_duration_seconds{profile}` (p50/p95/p99)
        - `orchestrator_node_duration_seconds{agent_type, llm_provider}`
        - `orchestrator_tokens_total{agent_type, llm_provider, direction}`
        - `orchestrator_cost_usd_total{profile, llm_provider}`
        - `orchestrator_circuit_breaker_state{node_type}`
        - `orchestrator_human_gate_wait_seconds{profile}`
      security: []
      tags: [system]
      responses:
        '200':
          description: "Prometheus `text/plain; version=0.0.4` exposition format. Metrics include run throughput counters, node p50/p95/p99 latencies, LLM token and cost counters per provider, circuit-breaker states, and human-gate wait-time histograms."
          content:
            text/plain:
              schema:
                type: string

  # ══════════════════════════════════════════════════════════════════════════
  # AUTH  (Better Auth handler)
  # ══════════════════════════════════════════════════════════════════════════

  /auth/signin:
    post:
      operationId: signIn
      summary: Sign in with email + password
      description: |
        Rate-limited to **5 attempts / IP / 15 minutes**.
        Returns Set-Cookie with session token on success.
        MFA (TOTP or Passkey) required for instance_admin accounts.
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: "Verified email address of the user. Used for authentication and invitation delivery."
                password:
                  type: string
                  minLength: 8
                  description: "User account password. Must be at least 8 characters. Stored as an Argon2id hash; the plaintext is never persisted."
                totp_code:
                  type: string
                  description: "6-digit TOTP code (required if MFA enrolled)"
      responses:
        '200':
          description: Sign-in successful — session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                    description: "The authenticated user object returned after sign-in or registration."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

  /auth/signout:
    post:
      operationId: signOut
      summary: Sign out — revoke current session
      tags: [auth]
      responses:
        '200':
          description: "Session cookie cleared and invalidated server-side. Subsequent requests using this cookie return 401. All browser tabs sharing this session are logged out immediately."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True when the session was successfully revoked."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
  /auth/session:
    get:
      operationId: getSession
      summary: Get current session
      tags: [auth]
      responses:
        '200':
          description: "Returns the authenticated user's profile and active session metadata. Use on page load to bootstrap the UI, or to verify a session cookie is still valid before submitting write operations."
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                    description: "The authenticated user object returned after sign-in or registration."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'

  /auth/setup-status:
    get:
      operationId: getSetupStatus
      summary: Instance setup status
      description: |
        Public endpoint (no auth required). Returns boolean flags used by the
        `/setup` wizard to determine whether initial configuration is complete.

        Returns `setup_complete: true` once at least one admin user has been
        created. `has_llm_profile` is advisory — the wizard shows an extra step
        but does not block. Only boolean flags are returned; user counts or other
        potentially sensitive metrics are intentionally excluded.
      security: []
      tags: [auth]
      responses:
        '200':
          description: "Current setup state of the instance."
          content:
            application/json:
              schema:
                type: object
                properties:
                  setup_complete:
                    type: boolean
                    description: "True when all mandatory setup steps are done (at least one admin user created)."
                  setup_required:
                    type: boolean
                    description: "Inverse of `setup_complete`. Provided as a convenience alias for frontend consumers."
                  has_admin:
                    type: boolean
                    description: "True if at least one user account exists."

  /setup/admin:
    post:
      operationId: setupAdmin
      summary: Create initial admin account (first-run wizard)
      description: |
        Public endpoint (no auth required). Creates the first `instance_admin` user
        and persists organization config to `orchestrator.yaml`.

        **Guard 1 — setup token:** Requires `setup_token` generated at server startup.
        Token source (resolved in order):
        1. `HARMOVEN_SETUP_TOKEN` env var — set in `.env` before launch for a predictable URL.
           Minimum 20 printable ASCII characters.
        2. Random 128-bit token — printed as a full URL in Docker logs:
           `docker compose logs app | grep "Setup URL"`
        Single-use; invalidated after first successful call.
        Returns `403` if the token is missing, wrong, or already consumed.

        **Guard 2 — double-setup:** Returns `409` if any user already exists
        (`setup_complete = true`). Self-sealing against privilege-escalation.

        The created account has `emailVerified: true` to allow immediate login
        without requiring a mail server during initial setup.
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setup_token, org_name, preset, name, email, password]
              additionalProperties: false
              properties:
                setup_token:
                  type: string
                  minLength: 1
                  description: |
                    One-time token. Source: `HARMOVEN_SETUP_TOKEN` env var if set (≥20 chars),
                    otherwise the random token printed in Docker logs at server startup.
                org_name:
                  type: string
                  minLength: 1
                  maxLength: 120
                  description: "Organization name — written to `orchestrator.yaml` `organization.name`."
                preset:
                  type: string
                  enum: [small_business, enterprise, developer]
                  description: "Org preset — written to `orchestrator.yaml` `organization.preset`."
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                  description: "Admin user full name."
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: "Admin user email address."
                password:
                  type: string
                  minLength: 12
                  maxLength: 128
                  description: "Admin password (Argon2id hashed server-side). Min 12 characters."
      responses:
        '201':
          description: "Admin account created successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '403':
          description: "Invalid or already-consumed setup token."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: "Setup already complete — a user already exists."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /setup/llm-verify:
    post:
      operationId: setupLlmVerify
      summary: Verify LLM provider API key
      description: |
        Makes a minimal non-destructive test call to the selected LLM provider
        to verify the API key is valid.

        **Does not store the key.** Returns the name of the environment variable
        to set in order to activate the provider (`env_var_hint`).

        **Auth:** callable in two contexts:
        - Pre-setup (`userCount === 0`): public — no auth required.
        - Post-setup: requires an authenticated `instance_admin` session.
          The first-run wizard calls this in Step 4, which runs after admin creation
          in Step 2, so the session cookie must be included.

        Supported providers:
        - `anthropic` — calls `models.list()` (Anthropic SDK, 0 tokens)
        - `openai` — calls `models.list()` (OpenAI SDK, 0 tokens)
        - `gemini` — calls `generateContent` with 1 token (Google GenAI SDK)
        - `ollama` — pings `<ollama_url>/api/tags` where `<ollama_url>` is
          resolved in this order: `ollama_url` body field → `OLLAMA_BASE_URL` env var
          → `http://localhost:11434` fallback. No API key required.
          `ollama_url` is validated server-side: IMDS (169.254.x.x), loopback, and 0.0.0.0
          are blocked; RFC1918 LAN addresses are explicitly allowed.
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              additionalProperties: false
              properties:
                provider:
                  type: string
                  enum: [anthropic, openai, gemini, ollama]
                api_key:
                  type: string
                  maxLength: 256
                  description: "API key for the provider. Required for all providers except `ollama`."
                ollama_url:
                  type: string
                  maxLength: 512
                  format: uri
                  example: "http://192.168.1.50:11434"
                  description: |
                    Optional Ollama base URL override. Only used when `provider` is `ollama`.
                    Overrides the `OLLAMA_BASE_URL` env var for this verification call only — not stored.
                    Must be http/https. IMDS range (169.254.x.x), loopback (127.x.x.x / ::1),
                    and 0.0.0.0 are rejected; RFC1918 LAN addresses (192.168.x.x, 10.x.x.x,
                    172.16–31.x.x) are explicitly allowed.
                    Leave empty to fall back to `OLLAMA_BASE_URL` env var or `http://localhost:11434`.
      responses:
        '200':
          description: "Provider connection verified."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  provider:
                    type: string
                    example: anthropic
                  env_var_hint:
                    type: string
                    description: "Name of the environment variable to set for this provider."
                    example: ANTHROPIC_API_KEY
                  effective_url:
                    type: string
                    nullable: true
                    description: "Ollama only — the base URL that was actually used for the ping."
                    example: "http://192.168.1.50:11434"
                  message:
                    type: string
                    description: "Human-readable instructions."
        '400':
          description: "Provider connection failed (invalid key, wrong region, network error)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: "Post-setup call without an instance_admin session."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /instance/policy:
    get:
      operationId: getInstancePolicy
      summary: Public instance policy flags
      description: |
        Public endpoint (no auth required). Returns non-sensitive boolean policy
        flags consumed by the middleware and frontend to enforce instance-level
        rules (e.g. MFA enforcement for admin accounts).

        Response is cacheable for up to 60 seconds (`Cache-Control: private, max-age=60`).
        Only boolean flags are exposed — no secrets or user data.
      security: []
      tags: [system]
      responses:
        '200':
          description: "Active instance policy configuration."
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_required_for_admin:
                    type: boolean
                    description: "When true, instance_admin accounts must complete MFA on every sign-in. Controlled via `PATCH /admin/security` or the `HARMOVEN_ENFORCE_ADMIN_MFA` environment variable."

  # ══════════════════════════════════════════════════════════════════════════
  # RUNS
  # ══════════════════════════════════════════════════════════════════════════

  /runs:
    post:
      operationId: createRun
      x-required-permissions: [runs:create]
      summary: Create and enqueue a new run
      description: |
        > **Required permission:** `runs:create` — minimum role: `user`

        Submits a task to the orchestrator. The executor picks it up asynchronously
        and transitions the run through PENDING → RUNNING → …
        **Rate limit:** 10 req/min/IP
        **Expert Mode:** supply `raw_dag` to bypass the Planner (instance_admin only).

        On success, a 201 is returned immediately. Subscribe to the SSE stream
        at `stream_url` for live progress.
      tags: [runs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, task_input, domain_profile]
              properties:
                project_id:
                  type: string
                  format: uuid
                task_input:
                  type: object
                  required: [objective]
                  properties:
                    title:
                      type: string
                      maxLength: 200
                      description: "Optional short title summarising the task objective. Displayed in the run list and Kanban board."
                    objective:
                      type: string
                      description: "Free text task description"
                      maxLength: 10000
                    context:
                      type: string
                      maxLength: 5000
                      description: "Optional supplementary context appended to the agent system prompts. Use to provide background information, constraints, or formatting preferences not captured in `objective`."
                    inputs:
                      type: array
                      description: "Uploaded files or URLs"
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            enum: [url, file_ref]
                            description: "Type of input attachment. `url`: a publicly accessible web URL — the agent fetches and reads the content at runtime. `file_ref`: a UUID referencing a previously uploaded file in the instance's file storage."
                          value:
                            type: string
                            description: "Content of the input: a full URL string (when `type = url`) or a file storage UUID (when `type = file_ref`). For `file_ref`, the UUID is returned at upload time."
                          filename:
                            type: string
                            description: "Original filename of the uploaded attachment. Used for display in the Human Gate panel and for MIME type detection fallback."
                    domain_profile_override:
                      $ref: '#/components/schemas/DomainProfile'
                domain_profile:
                  $ref: '#/components/schemas/DomainProfile'
                run_config:
                  type: object
                  properties:
                    supervision_mode:
                      $ref: '#/components/schemas/SupervisionMode'
                    budget_usd:
                      type: number
                      minimum: 0
                      maximum: 100
                      description: "Maximum allowed LLM spend in USD for this run. When `cost_actual_usd` reaches this threshold, the executor suspends the run with `suspended_reason: budget_exceeded`. Useful to cap costs for exploratory tasks. Maximum: $100. Omit for no budget limit."
                    budget_tokens:
                      type: integer
                      minimum: 0
                      description: "Maximum allowed token count for this run. Suspends the run when exceeded, regardless of cost."
                    preferred_llm:
                      type: string
                      description: "Caller-requested LLM profile ID for this run. Applied as a soft preference — the selector may override it if confidentiality or jurisdiction constraints prevent its use."
                    jurisdiction_tags:
                      type: array
                      items:
                        type: string
                        enum: [no_cn_jurisdiction, eu_only, local_only]
                transparency_mode:
                  type: boolean
                  default: false
                confidentiality:
                  $ref: '#/components/schemas/Confidentiality'
                raw_dag:
                  $ref: '#/components/schemas/Dag'
                  description: "Expert Mode — bypass Planner. instance_admin only."
                parent_run_ids:
                  type: array
                  description: "UUIDs of up to 5 completed runs whose output this run chains from. The executor records `RunDependency` links and exposes them in the GET response `chain` object. All referenced runs must belong to the same project and have status `COMPLETED`."
                  maxItems: 5
                  items:
                    type: string
                    format: uuid
                enable_web_search:
                  type: boolean
                  default: false
                  description: "When `true`, WRITER nodes can invoke the web search tool during generation. Requires BRAVE_SEARCH_API_KEY or TAVILY_API_KEY to be configured, or DuckDuckGo is used as fallback. Stored in `run_config.enable_web_search`."
                output_file_format:
                  type: string
                  enum: [txt, csv, json, yaml, html, md, py, ts, js, sh, docx, pdf]
                  description: "User-selected output format (form selector). When set, the PLANNER applies this as the C2 rule — overrides any `desired_outputs` from the CLASSIFIER for all WRITER nodes. Stored in `run_config.output_file_format`."
                llm_overrides:
                  $ref: '#/components/schemas/LlmOverrides'
                  description: "Per-agent LLM profile overrides. Forces specific models for PLANNER/WRITER/REVIEWER stages. Validated against enabled profiles — unknown or disabled IDs return 422."
      responses:
        '201':
          description: "Run accepted by the orchestrator and placed in PENDING state. The executor picks it up within seconds. Subscribe to `stream_url` for live progress. `estimated_cost_usd` and `estimated_duration_minutes` may be null immediately — they are populated once the Planner generates the DAG."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    type: string
                    enum: [PENDING]
                    description: "Always `PENDING` immediately after a successful submission. The executor picks up the run within seconds and transitions it to `RUNNING`. Subscribe to the SSE stream at `stream_url` for live progress."
                  estimated_cost_usd:
                    type: number
                    description: "Pre-run cost estimate computed by the Planner from DAG node weights and LLM tier pricing. Displayed to the user before confirming the run."
                  estimated_duration_minutes:
                    type: number
                    description: "Pre-run duration estimate in minutes, computed from DAG depth and typical node latencies. Updated when the Planner finalises the DAG."
                  dag_preview_url:
                    type: string
                    description: "URL of the DAG visualisation endpoint for this run. Returns a rendered graph of agent nodes and dependencies."
                  stream_url:
                    type: string
                    description: "URL of the SSE event stream for real-time run progress: `GET /api/v1/runs/{run_id}/stream` (or internal equivalent). Requires `stream:state` permission."
        '400':
          description: "`task_input.objective` is missing or exceeds 10 000 characters; `project_id` is not a valid UUID; `domain_profile` is not a recognised value; or `raw_dag` is supplied without `instance_admin` role. See `error.details` for the specific field path."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: "No LLM profile compatible with confidentiality + jurisdiction constraints"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
    get:
      operationId: listRuns
      x-required-permissions: [runs:read]
      summary: List runs for a project (session auth)
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`

        Returns paginated runs for the given project, ordered by `created_at` descending.
        `instance_admin` callers may omit `project_id` to list across all projects.
      tags: [runs]
      parameters:
        - in: query
          name: project_id
          required: true
          description: "Project to list runs for. Required for non-`instance_admin` callers."
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          description: "Filter runs by status. Accepts a comma-separated list of `RunStatus` values, e.g. `RUNNING,SUSPENDED`."
          schema:
            type: string
            enum: [PENDING, RUNNING, COMPLETED, FAILED, PAUSED, SUSPENDED]
        - in: query
          name: page
          description: "Page number to retrieve (1-indexed). Combine with `per_page` to paginate large result sets."
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          description: "Number of records per page. Maximum 100. Controls response payload size."
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: "Paginated list of runs for the given project, ordered by `created_at` descending. Cost fields (`cost_actual_usd`, node `cost_usd`) are omitted unless the caller has `runs:read_costs`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Run'
                  page:
                    type: integer
                    description: "Current page number in the paginated result set. 1-indexed."
                  per_page:
                    type: integer
                    description: "Number of resources per page. Maximum 100."
                  total:
                    type: integer
                    description: "Total count of resources matching the query, before pagination. Use with `per_page` to compute total pages."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'

  /runs/{runId}:
    get:
      operationId: getRun
      x-required-permissions: [runs:read]
      summary: Get run state and nodes
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`
        Returns the full run object and all its nodes.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: "Full `Run` snapshot including all `RunNode` objects, accumulated cost, and token counters. Cost fields (`cost_actual_usd`, node `cost_usd`, `tokens_*`) are omitted for callers whose role lacks `runs:read_costs`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/Run'
                    description: "The full Run object representing the created or retrieved execution."
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunNode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/stream:
    get:
      operationId: streamRun
      x-required-permissions: [stream:state]
      summary: Subscribe to run SSE event stream
      description: |
        > **Required permission:** `stream:state` — minimum role: `viewer`
        Server-Sent Events stream. Delivers a snapshot on connect (`initial`),
        then pushes delta events as the run progresses.
        Cost events (`cost_update`, `budget_warning`, `llm_fallback`) additionally
        require `stream:costs`. Gate events require `stream:gates`.

        **Reconnect:** send `Last-Event-ID` header — server replays from the
        `EventPayload` table (30 s buffer window, 24 h TTL).
        **SSE heartbeat:** `:keepalive` comment every 30 s.
      tags: [runs, sse]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - in: header
          name: Last-Event-ID
          schema:
            type: string
          description: "Replay events after this ID (reconnect)"
      responses:
        '200':
          description: "SSE connection opened. The server emits an `initial` event with the full run and node snapshot, then pushes delta events as nodes change state. The connection closes automatically when the run reaches COMPLETED or FAILED."
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/RunSSEEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/gate:
    post:
      operationId: resolveRunGate
      x-required-permissions: [gates:approve]
      summary: Resolve the current human gate
      description: |
        > **Required permission:** `gates:approve` — minimum role: `operator`
        Called from the Human Gate UI to approve, request changes, replay a node,
        or abort the run.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  $ref: '#/components/schemas/GateDecision'
                  description: "Gate resolution action chosen by the operator."
                node_id:
                  type: string
                  description: "Required when decision = replay_node"
                patch:
                  type: object
                  description: "Partial task_input override — for decision = modify"
                  additionalProperties: true
      responses:
        '200':
          description: "Human-gate decision recorded and applied. `approve`: run transitions to RUNNING immediately. `modify`: Planner replans with the supplied patch. `replay_node`: specified node replays from scratch. `abort`: run transitions to FAILED. The response includes the new run status so callers can update their local state without additional polling."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  status:
                    $ref: '#/components/schemas/RunStatus'
                    description: "Updated run status reflecting the applied gate decision. `approve` → `RUNNING`. `modify` → `SUSPENDED` (Planner is re-running). `replay_node` → `RUNNING`. `abort` → `FAILED`."
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /runs/{runId}/fork:
    post:
      operationId: forkRun
      x-required-permissions: [runs:create]
      summary: Fork a run with modifications
      description: |
        > **Required permission:** `runs:create` — minimum role: `user`
        Creates a new PENDING run copied from an existing one, with optional
        task_input or config overrides applied.
      tags: [runs]
      parameters:
