  /runs/{runId}/artifacts/zip:
    get:
      operationId: downloadRunArtifactsZip
      x-required-permissions: [runs:read]
      summary: Download run artifacts as a ZIP archive
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`
        Builds and streams a ZIP archive (DEFLATE level 6) of all artifact files for the run.
        Use the optional `node_id` query parameter to limit the archive to a single DAG node.
        When the archive spans multiple nodes, entries are namespaced as `<node_id>/<filename>`
        to avoid collisions. When scoped to one node, a flat structure is used.
        The ZIP name is `harmoven-<runId8>.zip` (or `harmoven-<runId8>-<nodeId>.zip`).
      tags: [Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: node_id
          in: query
          required: false
          schema:
            type: string
          description: "Limit the archive to artifacts from a single DAG node (e.g. `n3`)"
      responses:
        '200':
          description: ZIP archive of the requested artifacts
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /runs/{runId}/artifacts/{artifactId}:
    get:
      operationId: downloadRunArtifact
      x-required-permissions: [runs:read]
      summary: Download a run artifact
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`
        Streams the binary content of the file. The response includes security headers:
        `X-Content-Type-Options: nosniff`, `Content-Security-Policy: sandbox`,
        `Content-Disposition: attachment` (RFC 5987 encoded filename).
      tags: [Runs]
      security:
        - bearerAuth: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Binary file content
          headers:
            Content-Disposition:
              schema:
                type: string
                example: "attachment; filename=\"report.xlsx\"; filename*=UTF-8''report.xlsx"
            X-Content-Type-Options:
              schema:
                type: string
                enum: [nosniff]
            Content-Security-Policy:
              schema:
                type: string
                enum: [sandbox]
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /runs/{runId}/nodes/{nodeId}:
