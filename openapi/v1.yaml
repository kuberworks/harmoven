                      type: string
                      enum: [primary, supplementary, pending_review, discarded]
                      description: "Role of this artifact within the run. `primary` = main deliverable selected by the reviewer. `supplementary` = attached for context. `pending_review` = default until reviewer assigns a role. `discarded` = rejected — not available for download."
                    created_at:
                      type: string
                      format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
