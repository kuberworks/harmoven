        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "User deleted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  userId:
                    type: string
                    format: uuid
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimit'
  /admin/users/{userId}/ban:
    post:
      operationId: banUser
      x-required-permissions: [admin:users]
      summary: Suspend a user account
      description: |
        > **Required permission:** `admin:users` — minimum role: `instance_admin`

      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "User account suspended. `banned_at` is set and all active sessions are invalidated immediately. The user cannot sign in. Existing API keys scoped to their projects continue to function unless explicitly revoked."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
  /admin/users/{userId}/unban:
    post:
      operationId: unbanUser
      x-required-permissions: [admin:users]
      summary: Unsuspend a user account
      description: |
        > **Required permission:** `admin:users` — minimum role: `instance_admin`

      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "`banned_at` cleared. The user can sign in again immediately. No prior sessions are restored — the user must authenticate fresh. Project memberships and API keys are unaffected."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── RGPD admin config ─────────────────────────────────────────────────────
  /admin/rgpd:
    get:
      operationId: getRgpdConfig
      x-required-permissions: [admin:instance]
      summary: Read RGPD maintenance configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns the current RGPD maintenance settings stored in `SystemSetting`.
        `env_override_active: true` means the operator has set
        `RGPD_MAINTENANCE_ENABLED=false` in the environment, which takes precedence
        over the DB value and disables automated maintenance regardless of the DB setting.

        **Note:** the user-facing statutory rights (`DELETE /api/users/me`,
        `GET /api/users/me/data`) are always active and are NOT controlled by this endpoint.
      tags: [admin]
      responses:
        '200':
          description: "Current RGPD maintenance configuration."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RgpdConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateRgpdConfig
      x-required-permissions: [admin:instance]
      summary: Update RGPD maintenance configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Persists one or both RGPD settings to `SystemSetting` and writes an
        `admin.rgpd.config.updated` audit log entry. All fields are optional — only
        the supplied fields are updated. Returns the full configuration after the update.

        **Constraints:**
        - `data_retention_days`: 7–3650 (1 week to ~10 years)
        - If `RGPD_MAINTENANCE_ENABLED=false` is set in the environment, the DB setting
          is ignored and `env_override_active: true` is returned.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance_enabled:
                  type: boolean
                  description: "When `false`, the automated session-cleanup and run-data-TTL crons are disabled. Statutory user rights (account deletion, data export) remain active regardless."
                data_retention_days:
                  type: integer
                  minimum: 7
                  maximum: 3650
                  description: "Number of days before run content (LLM input/output) is nullified by the TTL cron. Applies to new runs at creation time. Minimum: 7 days. Maximum: 3650 days (~10 years)."
              additionalProperties: false
      responses:
        '200':
          description: "Updated RGPD configuration. Returns the full config (same shape as `GET /admin/rgpd`) after applying the changes."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RgpdConfig'
        '400':
          description: "Request body is invalid or a field constraint is violated (e.g. `data_retention_days` outside the 7–3650 range)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/security:
    get:
      operationId: getSecurityConfig
      x-required-permissions: [admin:instance]
      summary: Read instance security settings
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns current instance security configuration stored in `SystemSetting`.
        `env_override_active: true` means the operator has set
        `HARMOVEN_ENFORCE_ADMIN_MFA=false` (with the acknowledgement env var), which
        takes precedence over the DB value and disables MFA enforcement.
      tags: [admin]
      responses:
        '200':
          description: "Current security configuration."
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_required_for_admin:
                    type: boolean
                    description: "When true, instance_admin accounts must complete MFA on every sign-in."
                  env_override_active:
                    type: boolean
                    description: "True when the `HARMOVEN_ENFORCE_ADMIN_MFA=false` operator escape hatch is active. The DB setting is ignored while this is true."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateSecurityConfig
      x-required-permissions: [admin:instance]
      summary: Update instance security settings
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Updates security settings in `SystemSetting` and writes an
        `admin.security.updated` audit log entry. All fields are optional — only
        supplied fields are updated.

        **Note:** If `HARMOVEN_ENFORCE_ADMIN_MFA=false` is set in the environment
        (with the acknowledgement var), it takes precedence over this setting
        regardless of the value stored here.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mfa_required_for_admin:
                  type: boolean
                  description: "Enable or disable mandatory MFA for instance_admin accounts."
              additionalProperties: false
      responses:
        '200':
          description: "Security configuration updated."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "`true` when the setting was persisted successfully and the audit log entry was written."
        '400':
          description: "Invalid request payload."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/rate-limits:
    get:
      operationId: getAdminRateLimits
      x-required-permissions: [admin:instance]
      summary: Read configurable rate-limit settings
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns the effective rate-limit configuration for all configurable
        endpoints. Each entry includes the currently active values alongside
        the compiled-in defaults so the admin UI can show "reset to default"
        options.

        Values are read from `SystemSetting` rows (set via `PATCH`) with a 60-second
        in-process cache. Changes made via `PATCH` take effect within 60 seconds.
      tags: [admin]
      responses:
        '200':
          description: "Current rate-limit configuration for all endpoints."
          content:
            application/json:
              schema:
                type: object
                properties:
                  limits:
                    type: object
                    description: "Map of endpoint key → rate-limit values."
                    additionalProperties:
                      type: object
                      properties:
                        max:
                          type: integer
                          description: "Maximum number of requests allowed in the window."
                        window_ms:
                          type: integer
                          description: "Window duration in milliseconds."
                        default_max:
                          type: integer
                          description: "Compiled-in default for `max`."
                        default_window_ms:
                          type: integer
                          description: "Compiled-in default for `window_ms`."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateAdminRateLimits
      x-required-permissions: [admin:instance]
      summary: Update rate-limit settings
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Upserts one or more rate-limit settings stored in `SystemSetting`.
        Supports partial updates — only the supplied fields are written.

        **Constraints:**
        - `max` must be a positive integer ≥ 1
        - `window_ms` must be an integer ≥ 1000 (1 second)

        Changes are reflected within 60 seconds due to the in-process cache TTL.
        The in-process cache is also invalidated immediately on the responding
        replica.

        **Configurable endpoints:** `signin`, `create-run`, `create-api-key`,
        `webhook`, `admin-cred-create`
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limits]
              properties:
                limits:
                  type: object
                  description: "Map of endpoint key → fields to update."
                  minProperties: 1
                  additionalProperties:
                    type: object
                    properties:
                      max:
                        type: integer
                        minimum: 1
                        description: "New max requests per window."
                      window_ms:
                        type: integer
                        minimum: 1000
                        description: "New window duration in milliseconds."
                    additionalProperties: false
              additionalProperties: false
      responses:
        '200':
          description: "Rate-limit settings updated. Returns the full updated configuration."
          content:
            application/json:
              schema:
                type: object
                properties:
                  limits:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        max:               { type: integer }
                        window_ms:         { type: integer }
                        default_max:       { type: integer }
                        default_window_ms: { type: integer }
        '400':
          description: "Invalid JSON body."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/instance/orchestrator:
    get:
      operationId: getOrchestratorConfig
      x-required-permissions: [admin:instance]
      summary: Read orchestrator.yaml opt-in configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns the parsed contents of `orchestrator.yaml`. All fields are
        returned as-is from the file; unknown or future fields are included.
        Secrets are never stored in `orchestrator.yaml` — this endpoint is safe
        to read without exposing credentials.
      tags: [admin]
      responses:
        '200':
          description: "Parsed orchestrator.yaml content."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrchestratorConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateOrchestratorConfig
      x-required-permissions: [admin:instance]
      summary: Update orchestrator.yaml opt-in configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Deep-merges the supplied fields into `orchestrator.yaml`, writes the
        result to disk, and commits the new version to config.git.

        All fields are optional and validated with strict Zod schema — unknown
        keys are rejected with `422`. Returns coherence warnings (e.g. missing
        env vars for enabled opt-in services) without blocking the save.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrchestratorConfigPatch'
      responses:
        '200':
          description: "Configuration saved. `warnings` lists coherence issues (missing env vars, risky settings) but does not block the save."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: "Dot-path of the affected field, e.g. `litellm.enabled`."
                        message:
                          type: string
                          description: "Human-readable coherence warning."
                      required: [field, message]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: "Validation failed — unknown key or type mismatch."
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:   { type: string, example: Validation failed }
                  details: { type: object }
        '500':
          description: "Failed to write orchestrator.yaml (disk error or config.git sync failure)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── Admin: Marketplace ─────────────────────────────────────────────────────

  /admin/marketplace/upload:
    post:
      operationId: adminMarketplaceUpload
      x-required-permissions: [admin:marketplace]
      summary: Upload a skill pack (.hpkg / .harmoven.zip)
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Accepts a multipart/form-data request with a `.hpkg` or `.harmoven.zip` file (max 10 MB).
        The pack is validated, its SHA-256 checked for duplicates, and stored with `enabled: false`.
        Rate-limited to 5 uploads per user per hour.
      tags: [Admin — Marketplace]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: ".hpkg or .harmoven.zip archive (max 10 MB)"
                import_reason:
                  type: string
                  description: "Required when instance policy `marketplace.import_reason_required` is enabled."
      responses:
        '201':
          description: Pack installed (enabled=false — activate separately).
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill_id:  { type: string }
                  message:   { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Validation error (INVALID_EXTENSION, FILE_TOO_LARGE, IMPORT_REASON_REQUIRED, or pack validation failure).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:   { type: string }
                  message: { type: string }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/marketplace/import-history:
    get:
      operationId: adminMarketplaceImportHistory
      x-required-permissions: [admin:marketplace]
      summary: List marketplace import and upload audit events
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns paginated audit log entries for marketplace imports (git, upload) and
        Smart Import LLM cost tracking. Monthly LLM cost is derived from phantom runs
        (`run_type = 'marketplace_import'`).
      tags: [Admin — Marketplace]
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated import history.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/analyze-command:
    post:
      operationId: adminMarketplaceAnalyzeCommand
      x-required-permissions: [admin:marketplace]
      summary: Run Smart Import LLM analysis on a previewed pack
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Runs the Smart Import pipeline (relevance gate or adapter) for a given `preview_id`.
        The caller must own the preview (`preview.created_by === caller.userId`).
        Requires Smart Import to be enabled (`marketplace.smart_import.enabled = true`).
      tags: [Admin — Marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preview_id, step]
              properties:
                preview_id:      { type: string, format: uuid }
                step:            { type: string, enum: [relevance_gate, adapter] }
                budget_override: { type: boolean }
      responses:
        '200':
          description: Analysis result (outcome, confidence, risks, capability_summary, budget).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '402':
          description: Monthly LLM budget exceeded (BUDGET_EXCEEDED).
        '410':
          description: Preview expired (PREVIEW_EXPIRED).
        '422':
          description: Smart Import disabled or invalid step.

  /admin/marketplace/check-pack-id:
    get:
      operationId: adminMarketplaceCheckPackId
      x-required-permissions: [admin:marketplace]
      summary: Check pack_id uniqueness (debounced UI helper)
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns whether a pack_id slug is already taken. Validates format (`/^[a-z0-9_]{1,64}$/`).
      tags: [Admin — Marketplace]
      parameters:
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: "{ available: boolean }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: { type: boolean }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/cron-health:
    get:
      operationId: adminMarketplaceCronHealth
      x-required-permissions: [admin:marketplace]
      summary: Get marketplace update-check cron health status
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns cron health state (`OK | UPDATES_AVAILABLE | STALE | NEVER_RAN`),
        last run timestamp, last run summary, and count of skills with pending updates.
      tags: [Admin — Marketplace]
      responses:
        '200':
          description: Cron health snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:            { type: string, enum: [OK, UPDATES_AVAILABLE, STALE, NEVER_RAN] }
                  last_run_at:      { type: string, format: date-time, nullable: true }
                  last_run_status:  { type: string, nullable: true }
                  pending_updates:  { type: integer }
                  cron_configured:  { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/smart-import-settings:
    get:
      operationId: adminMarketplaceGetSmartImportSettings
      x-required-permissions: [admin:marketplace]
      summary: Read Smart Import settings and monthly budget snapshot
      tags: [Admin — Marketplace]
      responses:
        '200':
          description: Smart Import settings + current and prior month LLM cost.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      operationId: adminMarketplacePatchSmartImportSettings
      x-required-permissions: [admin:marketplace]
      summary: Update Smart Import settings
      tags: [Admin — Marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:              { type: boolean }
                monthly_budget_usd:   { type: number, minimum: 0 }
                import_reason_required: { type: boolean }
      responses:
        '200':
          description: Updated settings.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/git-whitelist:
    get:
      operationId: adminMarketplaceListGitWhitelist
      x-required-permissions: [admin:marketplace]
      summary: List allowed Git URL patterns for marketplace imports
      tags: [Admin — Marketplace]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated whitelist entries.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: adminMarketplaceCreateGitWhitelistEntry
      x-required-permissions: [admin:marketplace]
      summary: Add a Git URL pattern to the whitelist
      tags: [Admin — Marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pattern]
              properties:
                pattern:   { type: string, description: "Glob pattern, e.g. github.com/myorg/**" }
                note:      { type: string }
      responses:
        '201':
          description: Entry created.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/git-whitelist/{id}:
    delete:
      operationId: adminMarketplaceDeleteGitWhitelistEntry
      x-required-permissions: [admin:marketplace]
      summary: Remove a Git URL whitelist entry
      tags: [Admin — Marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Entry removed.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/marketplace/registries:
    get:
      operationId: adminMarketplaceListRegistries
      x-required-permissions: [admin:marketplace]
      summary: List marketplace registries
      tags: [Admin — Marketplace]
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated registry list.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: adminMarketplaceCreateRegistry
      x-required-permissions: [admin:marketplace]
      summary: Add a marketplace registry
      tags: [Admin — Marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:  { type: string, format: uri }
                name: { type: string }
      responses:
        '201':
          description: Registry created.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/marketplace/registries/{id}:
    get:
      operationId: adminMarketplaceGetRegistry
      x-required-permissions: [admin:marketplace]
      summary: Get a marketplace registry
      tags: [Admin — Marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Registry object.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: adminMarketplacePatchRegistry
      x-required-permissions: [admin:marketplace]
      summary: Update a marketplace registry
      tags: [Admin — Marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:     { type: string, format: uri }
                name:    { type: string }
                enabled: { type: boolean }
      responses:
