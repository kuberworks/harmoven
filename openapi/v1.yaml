      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, provider, model_string, tier]
              properties:
                id:
                  type: string
                  description: "Unique, immutable identifier assigned by the system at creation. Used as the primary key for all subsequent API interactions with this resource."
                provider:
                  type: string
                  description: "LLM provider identifier. Determines the API client adapter, authentication mechanism, and rate limit handling."
                model_string:
                  type: string
                  description: "Provider-native model identifier string, e.g. `claude-sonnet-4-6`, `gpt-4o`. Passed verbatim to the provider API."
                tier:
                  type: string
                  enum: [fast, balanced, powerful]
                trust_tier:
                  type: integer
                  description: "Trust classification: 1 = fully trusted (Anthropic, OpenAI direct), 2 = vetted (Mistral, GitHub Copilot), 3 = unvetted or CN-jurisdiction providers (DeepSeek, Qwen). Used with `confidentiality` to gate data routing."
                jurisdiction:
                  type: string
                  description: "Primary geographic jurisdiction of the provider's data processing infrastructure. Used with `confidentiality` to enforce routing constraints."
                base_url:
                  type: string
                  format: uri
                  description: "SSRF-validated before saving"
                api_key_env:
                  type: string
                  description: "Environment variable name that holds the API key for this provider, e.g. `ANTHROPIC_API_KEY`. Never returned in API responses."
                enabled:
                  type: boolean
                  default: true
                  description: "Whether this resource is currently active. Disabled resources are excluded from execution and scheduling."
      responses:
        '201':
          description: "New LLM profile registered and enabled by default. The `api_key_env` environment variable must be set on the server — if absent, routing will fail at call time. `base_url` is validated against the SSRF blocklist before saving."
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/LlmProfile'
                    description: "The resolved LLM profile assigned to or retrieved for this entity."
