          in: query
          required: false
          schema:
            type: boolean
          description: "When `true`, include artifacts with role `discarded`. Requires `admin:instance` permission."
      responses:
        '200':
          description: Array of artifact metadata (no binary content)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, node_id, filename, mime_type, size_bytes, created_at, artifact_role]
                  properties:
                    id:
                      type: string
