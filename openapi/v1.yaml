                tier:
                  type: string
                  enum: [fast, balanced, powerful]
                  description: "Quality/cost tier classification. `fast` = cheapest, lowest latency. `balanced` = mid-tier. `powerful` = highest capability, highest cost."
                trust_tier:
                  type: integer
                  description: "Trust classification: 1 = fully trusted (Anthropic, OpenAI direct), 2 = vetted (Mistral, GitHub Copilot), 3 = unvetted or CN-jurisdiction providers (DeepSeek, Qwen). Used with `confidentiality` to gate data routing."
                jurisdiction:
                  type: string
                  description: "Primary geographic jurisdiction of the provider's data processing infrastructure. Used with `confidentiality` to enforce routing constraints."
                base_url:
                  type: string
                  format: uri
                  description: "Custom base URL overriding the provider's default endpoint. Used for self-hosted models (Ollama), OpenAI-compatible proxies (CometAPI), or private deployments. Validated against SSRF blocklist before saving."
      responses:
        '200':
          description: "Profile updated. If `enabled` changed to `false`, the profile is excluded from all future routing decisions immediately. Nodes currently calling this profile complete their in-flight LLM call before the change takes effect."
