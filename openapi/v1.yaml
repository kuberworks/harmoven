      responses:
        '200':
          description: Matching users (id, name, email, role).
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string }
                        name:  { type: string }
                        email: { type: string }
                        role:  { type: string }
