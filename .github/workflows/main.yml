# .github/workflows/main.yml
# Amendment 88.3 — Level 2: Main branch pipeline
# Runs on every merge to main. Builds Docker image, integration tests, staging smoke.

name: Main Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  integration-tests:
    name: Integration tests (Haiku)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harmoven_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run generate:types
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
        run: npx prisma migrate deploy
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
          HARMOVEN_LLM_TIER: haiku
        run: npm run test:integration
        # ~$0.05 per run, 3-4 minutes

  provision-db:
    name: Provision Neon DB branch (~3s)
    runs-on: ubuntu-latest
    outputs:
      db_host:   ${{ steps.provision.outputs.db_host }}
      branch_id: ${{ steps.provision.outputs.branch_id }}
    steps:
      - name: Create Neon branch
        id: provision
        env:
          NEON_API_KEY:          ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID:       ${{ secrets.NEON_PROJECT_ID }}
          NEON_DB_USER:          ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD:      ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_NAME:          ${{ secrets.NEON_DB_NAME }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"ci-${GITHUB_SHA:0:8}\",\"parent_id\":\"${NEON_PARENT_BRANCH_ID}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")

          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          ENDPOINT_HOST=$(echo "$RESPONSE" | jq -r '.endpoints[0].host')

          echo "::add-mask::${NEON_DB_PASSWORD}"

          echo "branch_id=${BRANCH_ID}" >> "$GITHUB_OUTPUT"
          echo "db_host=${ENDPOINT_HOST}" >> "$GITHUB_OUTPUT"
          echo "Neon branch ready — ${BRANCH_ID} @ ${ENDPOINT_HOST}"

  build-docker:
    name: Build + push Docker image
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Log in to Docker Hub
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/app:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging-smoke:
    name: Deploy to staging (Render) + smoke tests
    needs: [build-docker, provision-db]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Mask DB credentials
        run: |
          echo "::add-mask::${{ secrets.NEON_DB_PASSWORD }}"
          echo "::add-mask::${{ needs.provision-db.outputs.db_host }}"
      - name: Update DATABASE_URL + image on Render, then deploy
        env:
          RENDER_API_KEY:    ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DB_HOST:           ${{ needs.provision-db.outputs.db_host }}
          NEON_DB_USER:      ${{ secrets.NEON_DB_USER }}
          NEON_DB_PASSWORD:  ${{ secrets.NEON_DB_PASSWORD }}
          NEON_DB_NAME:      ${{ secrets.NEON_DB_NAME }}
          AUTH_SECRET:       ${{ secrets.AUTH_SECRET }}
          ENCRYPTION_KEY:    ${{ secrets.ENCRYPTION_KEY }}
          NEXTAUTH_URL:      ${{ secrets.RENDER_STAGING_URL }}
          IMAGE:             ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }}
        run: |
          # 1. Inject ephemeral DATABASE_URL (reconstructed from parts to avoid GitHub secret masking)
          # URL-encode the password to handle special characters (e.g. @, /, #)
          DB_PASS_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "${NEON_DB_PASSWORD}")
          DB_URL="postgresql://${NEON_DB_USER}:${DB_PASS_ENC}@${DB_HOST}/${NEON_DB_NAME}?sslmode=require"

          # PUT all required env vars explicitly (avoids fragile GET+merge;
          # AUTH_SECRET and ENCRYPTION_KEY come from GitHub secrets)
          ENV_JSON=$(jq -nc \
            --arg db  "$DB_URL" \
            --arg as  "$AUTH_SECRET" \
            --arg ek  "$ENCRYPTION_KEY" \
            --arg nu  "$NEXTAUTH_URL" \
            '[
              {"key":"DATABASE_URL",    "value":$db},
              {"key":"AUTH_SECRET",     "value":$as},
              {"key":"ENCRYPTION_KEY",  "value":$ek},
              {"key":"DEPLOYMENT_MODE", "value":"docker"},
              {"key":"CONFIG_GIT_DIR",  "value":"/data"},
              {"key":"NEXTAUTH_URL",    "value":$nu}
            ]')
          curl -sf -X PUT \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$ENV_JSON"

          # 2. Update Docker image tag
          curl -sf -X PATCH \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":{\"imagePath\":\"${IMAGE}\"}}"

          # 3. Trigger deploy and capture deploy ID
          DEPLOY_ID=$(curl -sf -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' | jq -r '.id')
          echo "Deploy ID: ${DEPLOY_ID}"

          # 4. Poll until live (up to 10 min)
          for i in $(seq 1 60); do
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')
            echo "  [$i] status=${STATUS}"
            [ "$STATUS" = "live" ] && break
            case "$STATUS" in
              deactivated|build_failed|update_failed|canceled)
                echo "Deploy failed: ${STATUS}" && exit 1 ;;
            esac
            sleep 10
          done
        # Requires (one-time bootstrap in Render dashboard):
        #   - Web Service from Docker Hub image, port 3000
        #   - Env: AUTH_SECRET, ENCRYPTION_KEY, DEPLOYMENT_MODE=docker,
        #     CONFIG_GIT_DIR=/data  (DATABASE_URL injected per-run)
        # GitHub secrets: RENDER_API_KEY, RENDER_SERVICE_ID,
        #   RENDER_STAGING_URL (https://YOUR-SERVICE.onrender.com)
      - name: Wait for staging health check
        # Render free tier: cold start (50-90s) + Prisma migrate deploy (~30s)
        # + seed (~10s) = up to ~3 min before first request is served.
        # 36 × 10s = 6 min max.
        run: |
          for i in $(seq 1 36); do
            curl -sf --max-time 20 ${{ secrets.RENDER_STAGING_URL }}/api/health && echo " OK" && break
            echo "Waiting... ($i/36)"
            [ "$i" -eq 36 ] && echo "Health check timed out after 6 min" && exit 1
            sleep 10
          done
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests against staging
        run: npx playwright test --grep "@smoke" --project=chromium
        env:
          BASE_URL: ${{ secrets.RENDER_STAGING_URL }}
        # 5 critical paths: login, create run, view gate, analytics, admin

  openapi-types:
    name: OpenAPI → TypeScript (generate + validate)
    # types/api.ts is NOT committed (spec-first / Pattern A).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Generate types/api.ts from openapi/v1.yaml
        run: npm run generate:types

  cleanup-db:
    name: Delete Neon DB branch
    needs: [staging-smoke, provision-db]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        env:
          NEON_API_KEY:    ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          BRANCH_ID:       ${{ needs.provision-db.outputs.branch_id }}
        run: |
          if [ -z "$BRANCH_ID" ]; then
            echo "No branch_id — nothing to delete"
            exit 0
          fi
          curl -sf -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
            -H "Authorization: Bearer ${NEON_API_KEY}"
          echo "Neon branch ${BRANCH_ID} deleted"
