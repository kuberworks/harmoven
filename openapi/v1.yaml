      summary: Resolve an interrupt gate (Am.65)
      description: |
        > **Required permission:** `gates:approve` — minimum role: `operator`
        After interrupting a node, the user chooses how to proceed.
      tags: [runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  $ref: '#/components/schemas/InterruptGateDecision'
                edited_partial:
                  type: string
                  description: "User-edited partial output — required for resume_from_partial"
                patch:
                  type: string
                  description: "Optional instruction added to context"
      responses:
        '200':
          description: "Interrupt-gate decision applied. `resume_from_partial`: execution continues from the (optionally edited) partial output (INTERRUPTED nodes only). `replay_from_scratch`: node resets to PENDING for re-dispatch; if the node was COMPLETED, all transitively downstream nodes are also reset and any downstream RUNNING nodes are aborted first. `accept_partial`: node is marked COMPLETED with the partial output as `handoff_out`. `abort`: run transitions to FAILED."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  node_id:
