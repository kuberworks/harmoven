      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: "All current members of the project with their resolved roles and join timestamps. `user.email` is only visible to callers with `admin:audit`; other callers receive a redacted placeholder."
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectMember'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
    post:
      operationId: addMember
      x-required-permissions: [project:members]
      summary: Add a member to the project
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role_id]
              properties:
                user_id:
                  type: string
                  description: "Identifier of the user account. References the Better Auth `user` table."
                role_id:
                  type: string
                  format: uuid
                  description: "Identifier of the role assigned to this member or API key. References a `ProjectRole` row."
      responses:
        '201':
          description: "User added to the project with the specified role. An invitation email is sent if the user does not yet have a Harmoven account. The member is immediately visible in `GET /projects/{projectId}/members`."
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: '#/components/schemas/ProjectMember'
                    description: "The full ProjectMember object for the added or retrieved project member."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /projects/{projectId}/members/{userId}:
    patch:
      operationId: updateMember
      x-required-permissions: [project:members]
      summary: Change a member's role
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: string
                  format: uuid
                  description: "Identifier of the role assigned to this member or API key. References a `ProjectRole` row."
      responses:
        '200':
          description: "Member's role updated. New permissions take effect on the member's next API call — no re-authentication is required. Cannot downgrade the last `admin` to a lower role (returns 409 in that case)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    type: object
                    properties:
                      user_id:
                        type: string
                        description: "Identifier of the user account. References the Better Auth `user` table."
                      role:
                        $ref: '#/components/schemas/ProjectRole'
                        description: "Role assigned to this member or API key, determining their permission set within this project."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
    delete:
      operationId: removeMember
      x-required-permissions: [project:members]
      summary: Remove a member from the project
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`
        Cannot remove the last admin

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: "Member removed from the project. Their active sessions lose access to this project's runs and resources immediately. Project-scoped API keys held by this user are not automatically revoked — revoke them separately if needed."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: "The project must always retain at least one `admin` member. Promote another member to `admin` first, then retry the removal."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── Roles ─────────────────────────────────────────────────────────────────
  /projects/{projectId}/roles:
    get:
      operationId: listRoles
      x-required-permissions: [project:members]
      summary: List project roles (built-in + custom)
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: "All roles available in this project: the 7 factory-installed built-in roles (`viewer` through `instance_admin`) plus any custom roles created by project admins. Built-in roles have `is_builtin: true` and cannot be modified or deleted."
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectRole'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimit'
    post:
      operationId: createRole
      x-required-permissions: [project:members]
      summary: Create a custom role
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, display_name, permissions]
              properties:
                name:
                  type: string
                  description: "Human-readable display label. Used in the administration panel and developer-facing API key listings."
                display_name:
                  type: string
                  description: "Anonymised or real display name of the user, depending on the caller's permission level (`admin:audit` reveals real names)."
                extends:
                  type: [string, 'null']
                  enum: [viewer, operator, user, user_with_costs, developer, admin]
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Permission'
      responses:
        '201':
          description: "Custom role created and immediately available for assignment to members and API keys. If `extends` is set, the new role inherits all permissions of the parent built-in role additively."
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    $ref: '#/components/schemas/ProjectRole'
                    description: "Role assigned to this member or API key, determining their permission set within this project."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /projects/{projectId}/roles/{roleId}:
    patch:
      operationId: updateRole
      x-required-permissions: [project:members]
      summary: Update a custom role
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`
        Built-in roles cannot be modified

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RoleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  description: "Anonymised or real display name of the user, depending on the caller's permission level (`admin:audit` reveals real names)."
                extends:
                  type: [string, 'null']
                  description: "Built-in role slug this custom role extends. All permissions of the parent role are inherited additively. Null for standalone roles."
                permissions:
                  type: array
                  items:
                    $ref: '#/components/schemas/Permission'
      responses:
        '200':
          description: "Custom role's permissions or display name updated. Members and API keys currently assigned to this role inherit the new permission set immediately — no re-authentication required."
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    $ref: '#/components/schemas/ProjectRole'
                    description: "Role assigned to this member or API key, determining their permission set within this project."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
    delete:
      operationId: deleteRole
      x-required-permissions: [project:members]
      summary: Delete a custom role
      description: |
        > **Required permission:** `project:members` — minimum role: `admin`
        Cannot delete if members or API keys are assigned to it

      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          description: "Custom role permanently deleted. The role record is removed and it disappears from the assignable role list immediately. Built-in roles cannot be targeted by this endpoint."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: "One or more project members or API keys are currently assigned to this role. Reassign all of them to another role before attempting deletion."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── API Keys ───────────────────────────────────────────────────────────────
  /projects/{projectId}/api-keys:
    get:
      operationId: listApiKeys
      x-required-permissions: [project:credentials]
      summary: List project API keys
      description: |
        > **Required permission:** `project:credentials` — minimum role: `admin`
        Returns metadata only. `key_hash` and raw key are **never** returned.
      tags: [projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: "Metadata for all API keys in this project. The raw key value and its hash are never returned — only descriptive fields such as name, role, creation date, expiry, revocation status, and last-used timestamp are included."
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
