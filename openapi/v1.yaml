  /admin/rgpd:
    get:
      operationId: getRgpdConfig
      x-required-permissions: [admin:instance]
      summary: Read RGPD maintenance configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Returns the current RGPD maintenance settings stored in `SystemSetting`.
        `env_override_active: true` means the operator has set
        `RGPD_MAINTENANCE_ENABLED=false` in the environment, which takes precedence
        over the DB value and disables automated maintenance regardless of the DB setting.

        **Note:** the user-facing statutory rights (`DELETE /api/users/me`,
        `GET /api/users/me/data`) are always active and are NOT controlled by this endpoint.
      tags: [admin]
      responses:
        '200':
          description: "Current RGPD maintenance configuration."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RgpdConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateRgpdConfig
      x-required-permissions: [admin:instance]
      summary: Update RGPD maintenance configuration
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Persists one or both RGPD settings to `SystemSetting` and writes an
        `admin.rgpd.config.updated` audit log entry. All fields are optional — only
        the supplied fields are updated. Returns the full configuration after the update.

        **Constraints:**
        - `data_retention_days`: 7–3650 (1 week to ~10 years)
        - If `RGPD_MAINTENANCE_ENABLED=false` is set in the environment, the DB setting
          is ignored and `env_override_active: true` is returned.
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenance_enabled:
                  type: boolean
                  description: "When `false`, the automated session-cleanup and run-data-TTL crons are disabled. Statutory user rights (account deletion, data export) remain active regardless."
                data_retention_days:
                  type: integer
                  minimum: 7
                  maximum: 3650
                  description: "Number of days before run content (LLM input/output) is nullified by the TTL cron. Applies to new runs at creation time. Minimum: 7 days. Maximum: 3650 days (~10 years)."
              additionalProperties: false
      responses:
        '200':
          description: "Updated RGPD configuration. Returns the full config (same shape as `GET /admin/rgpd`) after applying the changes."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RgpdConfig'
        '400':
          description: "Request body is invalid or a field constraint is violated (e.g. `data_retention_days` outside the 7–3650 range)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

