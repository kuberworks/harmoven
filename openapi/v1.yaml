                  description: "Identifier of the Critical Reviewer finding, scoped to the result it belongs to."
                finding:
                  $ref: '#/components/schemas/CriticalFinding'
                  description: "Complete CriticalFinding object to be actioned (ignored or queued for fix)."
                result_id:
                  type: string
                  description: "Identifier of the Critical Reviewer output result that contains this finding."
      responses:
        '200':
          description: "Targeted repair sub-agent queued asynchronously with a $0.10 USD budget cap. Returns immediately without waiting for the repair to complete. The fix result appears as a new `human_gate` SSE event on the run stream when it finishes."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
