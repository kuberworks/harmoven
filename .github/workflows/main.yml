# .github/workflows/main.yml
# Amendment 88.3 — Level 2: Main branch pipeline
# Runs on every merge to main. Builds Docker image, integration tests, staging smoke.

name: Main Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  integration-tests:
    name: Integration tests (Haiku)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harmoven_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run generate:types
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
        run: npx prisma migrate deploy
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
          HARMOVEN_LLM_TIER: haiku
        run: npm run test:integration
        # ~$0.05 per run, 3-4 minutes

  provision-db:
    name: Provision OVH staging DB (DB1-4)
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.provision.outputs.db_url }}
      db_id:  ${{ steps.provision.outputs.db_id }}
    steps:
      - name: Install OVH Python SDK
        run: pip install ovh
      - name: Create DB and wait for READY
        id: provision
        env:
          OVH_APP_KEY:      ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET:   ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
          OVH_PROJECT_ID:   ${{ secrets.OVH_PROJECT_ID }}
          OVH_REGION:       ${{ secrets.OVH_REGION }}
        run: |
          python3 - <<'PYEOF'
          import ovh, time, sys, os

          client = ovh.Client(
              endpoint='ovh-eu',
              application_key=os.environ['OVH_APP_KEY'],
              application_secret=os.environ['OVH_APP_SECRET'],
              consumer_key=os.environ['OVH_CONSUMER_KEY'],
          )
          project = os.environ['OVH_PROJECT_ID']
          region  = os.environ.get('OVH_REGION') or 'GRA'

          print(f'Creating PostgreSQL DB1-4 in {region}...', flush=True)
          result = client.post(
              f'/cloud/project/{project}/database/postgresql',
              description='harmoven-ci-staging',
              flavor='db1-4',
              plan='essential',
              version='16',
              nodesList=[{'flavor': 'db1-4', 'region': region}],
              ipRestrictions=[{'description': 'ci', 'ip': '0.0.0.0/0'}],
          )
          db_id = result['id']
          print(f'DB ID: {db_id}', flush=True)

          # Poll up to 15 min for READY
          for i in range(60):
              db = client.get(f'/cloud/project/{project}/database/postgresql/{db_id}')
              print(f'  [{i}] status={db["status"]}', flush=True)
              if db['status'] == 'READY':
                  break
              time.sleep(15)
          else:
              print('TIMEOUT: DB not READY after 15 min', flush=True)
              sys.exit(1)

          users     = client.get(f'/cloud/project/{project}/database/postgresql/{db_id}/user')
          admin     = users[0]
          creds     = client.post(f'/cloud/project/{project}/database/postgresql/{db_id}/user/{admin["id"]}/credentials/reset')
          endpoints = client.get(f'/cloud/project/{project}/database/postgresql/{db_id}/endpoint')
          ep        = next(e for e in endpoints if e.get('ssl'))

          # Mask the password before writing outputs
          print(f'::add-mask::{creds["password"]}', flush=True)

          db_url = (
              f'postgresql://{creds["username"]}:{creds["password"]}'
              f'@{ep["domain"]}:{ep["port"]}/defaultdb?sslmode=require'
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'db_url={db_url}\n')
              f.write(f'db_id={db_id}\n')
          print(f'DB ready — endpoint: {ep["domain"]}:{ep["port"]}', flush=True)
          PYEOF

  build-docker:
    name: Build + push Docker image
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Log in to Docker Hub
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v3.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/app:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging-smoke:
    name: Deploy to staging (Fly.io) + smoke tests
    needs: [build-docker, provision-db]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Mask DB URL
        run: echo "::add-mask::${{ needs.provision-db.outputs.db_url }}"
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Set staging DATABASE_URL on Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DB_URL: ${{ needs.provision-db.outputs.db_url }}
        run: flyctl secrets set DATABASE_URL="$DB_URL" --app harmoven
      - name: Deploy to staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --app harmoven \
            --image ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }} \
            --strategy rolling \
            --wait-timeout 300
        # Replaces SSH-based deploy. Requires:
        #   1. FLY_API_TOKEN secret in GitHub repo settings
        #      (create at: fly.io → Account → Access Tokens)
        #   2. App + secrets bootstrapped once:
        #      fly apps create harmoven --org personal
        #      fly secrets set DATABASE_URL=... AUTH_SECRET=... \
        #        ENCRYPTION_KEY=... DEPLOYMENT_MODE=docker \
        #        CONFIG_GIT_DIR=/data --app harmoven
      - name: Wait for staging health check
        run: |
          for i in $(seq 1 12); do
            curl -sf ${{ secrets.STAGING_URL }}/api/health && break
            echo "Waiting... ($i/12)"
            sleep 5
          done
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests against staging
        run: npx playwright test --grep "@smoke" --project=chromium
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        # 5 critical paths: login, create run, view gate, analytics, admin

  openapi-types:
    name: OpenAPI → TypeScript (generate + validate)
    # types/api.ts is NOT committed (spec-first / Pattern A).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Generate types/api.ts from openapi/v1.yaml
        run: npm run generate:types

  openapi-spec:
    name: Generate + commit OpenAPI spec
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run generate:openapi
      - name: Commit updated spec
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842 # v5.0.1
        with:
          commit_message: "chore: update OpenAPI spec [skip ci]"
          file_pattern: "docs/openapi.yaml"

  cleanup-db:
    name: Destroy OVH staging DB
    needs: [staging-smoke, provision-db]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Install OVH Python SDK
        run: pip install ovh
      - name: Delete DB
        env:
          OVH_APP_KEY:      ${{ secrets.OVH_APP_KEY }}
          OVH_APP_SECRET:   ${{ secrets.OVH_APP_SECRET }}
          OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
          OVH_PROJECT_ID:   ${{ secrets.OVH_PROJECT_ID }}
          DB_ID:            ${{ needs.provision-db.outputs.db_id }}
        run: |
          python3 - <<'PYEOF'
          import ovh, os, sys

          db_id = os.environ.get('DB_ID', '').strip()
          if not db_id:
              print('No DB_ID — nothing to delete')
              sys.exit(0)

          client = ovh.Client(
              endpoint='ovh-eu',
              application_key=os.environ['OVH_APP_KEY'],
              application_secret=os.environ['OVH_APP_SECRET'],
              consumer_key=os.environ['OVH_CONSUMER_KEY'],
          )
          project = os.environ['OVH_PROJECT_ID']
          print(f'Deleting OVH DB {db_id}...', flush=True)
          client.delete(f'/cloud/project/{project}/database/postgresql/{db_id}')
          print('Done', flush=True)
          PYEOF
