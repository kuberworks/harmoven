        Returns current instance security configuration stored in `SystemSetting`.
        `env_override_active: true` means the operator has set
        `HARMOVEN_ENFORCE_ADMIN_MFA=false` (with the acknowledgement env var), which
        takes precedence over the DB value and disables MFA enforcement.
