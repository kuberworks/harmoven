# .github/workflows/pr.yml
# Amendment 88.2 — Level 1: Pull Request pipeline
# Must complete in < 5 minutes. Blocks merge on any failure.

name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run generate:types
      - run: npx tsc --noEmit

  lint:
    name: ESLint + Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  unit-tests:
    name: Unit tests (MockLLMClient)
    runs-on: ubuntu-latest
    env:
      HARMOVEN_LLM_TIER: mock
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run generate:types
      - run: npm run test:unit
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  migration-check:
    name: Migration down.sql guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check down.sql present for every migration
        run: |
          MISSING=0
          for dir in prisma/migrations/*/; do
            if [ -f "$dir/migration.sql" ] && [ ! -f "$dir/down.sql" ]; then
              echo "ERROR: $dir missing down.sql"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "Every migration.sql must have a matching down.sql (Amendment 84)."
            exit 1
          fi
      - name: Check NOT REVERSIBLE in release checklist
        run: |
          if grep -r "NOT REVERSIBLE" prisma/migrations/ 2>/dev/null; then
            echo "⚠  Irreversible migrations detected — confirm in release notes"
          fi
      - name: Run migration baseline verifier
        run: node scripts/verify-migration-baseline.js

  migration-roundtrip:
    name: Migration roundtrip (up + down)
    runs-on: ubuntu-latest
    # Only run when migration files actually changed
    if: |
      contains(github.event.pull_request.labels.*.name, 'migration') ||
      github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harmoven_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Apply all up migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
        run: npx prisma migrate deploy
      - name: Run down migrations in reverse order
        env:
          PGPASSWORD: test
        run: |
          for dir in $(ls -r prisma/migrations/*/); do
            if [ -f "$dir/down.sql" ]; then
              echo "Rolling back: $dir"
              psql postgresql://postgres:test@localhost:5432/harmoven_test \
                -f "$dir/down.sql"
            fi
          done
      - name: Verify baseline (schema empty after full rollback)
        run: node scripts/verify-migration-baseline.js

  translations:
    name: Translation completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check fr.json completeness
        # exits 0 gracefully when locales/ doesn't exist yet (T3.7 pending)
        run: node scripts/check-translations.js

  openapi-types:
    name: OpenAPI → TypeScript (generate + validate)
    # types/api.ts is NOT committed (spec-first / Pattern A).
    # This job verifies that openapi/v1.yaml is valid and produces compilable types.
    # Compilation correctness is enforced by the sibling `typecheck` job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Generate types/api.ts from openapi/v1.yaml
        run: npm run generate:types

  license-scan:
    name: License compatibility scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Scan for prohibited licenses
        run: |
          npx license-checker --summary \
            --failOn "GPL-2.0;GPL-3.0;AGPL-3.0" \
            --excludePackages "harmoven" || true
          # MIT, Apache-2.0, BSD-* → allowed
          # GPL* → blocked (incompatible with self-hosted commercial)

  accessibility:
    name: Accessibility checks (axe)
    runs-on: ubuntu-latest
    # next build forces NODE_ENV=production and requires these vars to be set.
    # Values mirror .env.test — no real secrets, safe to inline.
    env:
      AUTH_SECRET: test-secret-do-not-use-in-production-32chars
      AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
      ENCRYPTION_KEY: test-encryption-key-do-not-use-in-prod
      DEPLOYMENT_MODE: docker
      HARMOVEN_LLM_TIER: mock
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build:test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run axe accessibility checks
        run: npx playwright test --grep "@a11y"
        # Tests key screens: onboarding, gate, kanban
        # Checks: contrast, aria-labels, focus management
        continue-on-error: true   # non-blocking until T3.7 UI finalized

  dependency-audit:
    name: Dependency audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: npm audit (no high/critical)
        # Blocks merge on high or critical severity CVEs in direct/transitive deps.
        # Use --omit=dev to only check production dependencies.
        run: npm audit --omit=dev --audit-level=high
      - name: Validate pack prompt scripts
        run: |
          node scripts/validate-pack-tools.js || true
          node scripts/scan-pack-prompts.js   || true
        # Non-blocking for now — becomes blocking in T3.9 when CI packs are present
