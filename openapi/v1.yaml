  # ── Analytics (internal) ───────────────────────────────────────────────────
  /analytics:
    get:
      operationId: getAnalytics
      x-required-permissions: [admin:audit]
      summary: Retrieve analytics (session auth — admin:audit)
      description: |
        > **Required permission:** `admin:audit` — minimum role: `instance_admin`
        Full analytics access. Returns all project data for `instance_admin`;
        own-project anonymised data for project admins.
      tags: [analytics]
      parameters:
        - in: query
          name: from
          description: "Start of the analytics period (inclusive), ISO 8601 UTC timestamp, e.g. `2025-01-01T00:00:00Z`."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          description: "End of the analytics period (inclusive), ISO 8601 UTC timestamp. Defaults to the current UTC time when omitted."
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: project_id
          description: "Filter results to a specific project. Required for admin endpoints when the instance admin manages multiple projects."
          schema:
            type: string
            format: uuid
        - in: query
          name: granularity
          description: "Time bucket size for timeseries data points: `hour`, `day`, `week`, or `month`. Coarser granularity reduces response size."
          schema:
            type: string
            enum: [day, week, month]
            default: week
        - in: query
          name: format
          description: "Response format for analytics exports: `json` (default) or `csv`. CSV format flattens nested fields for spreadsheet compatibility."
          schema:
            type: string
            enum: [json, csv, pdf]
            default: json
      responses:
        '200':
          description: "Aggregated analytics for the requested period and granularity. `instance_admin` callers receive organisation-wide data across all projects; other callers receive own-project data with user names anonymised. `timeseries` bucket size is controlled by the `granularity` parameter."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
            text/csv:
              schema:
                type: string
            text/html:
              schema:
                type: string
                description: "PDF-ready HTML"
        '400':
          description: "`from` or `to` is not a valid ISO 8601 timestamp; `to` is before `from`; `granularity` is not one of `hour|day|week|month`; or the requested period exceeds the maximum window (1 year for `day`, 90 days for `hour`)."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: "The analytics module is disabled on this instance (`ANALYTICS_ENABLED=false` in server config). Contact the instance administrator to enable it."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── Updates ────────────────────────────────────────────────────────────────
  /updates:
    get:
      operationId: getUpdates
      x-required-permissions: [admin:instance]
      summary: Check for available updates
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

      tags: [admin]
      responses:
        '200':
          description: "Current deployed version versus the latest available in the configured release channel. `migration_preview` lists the database migrations that will execute during an upgrade — review before applying to estimate downtime. All version fields are null if the update channel is unreachable."
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_version:
                    type: string
                    description: "Currently deployed semantic version of the Harmoven instance."
                  latest_version:
                    type: string
                    description: "Latest available semantic version in the update channel."
                  bump_type:
                    type: [string, 'null']
                    enum: [patch, minor, major]
                  changelog_url:
                    type: [string, 'null']
                    description: "URL of the release changelog for the pending update. Null when no update is available."
                  migration_preview:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimit'
  /updates/apply:
    post:
      operationId: applyUpdate
      x-required-permissions: [admin:instance]
      summary: Apply a software update
      description: |
        > **Required permission:** `admin:instance` — minimum role: `instance_admin`

        Pulls the new Docker image, runs migrations, and restarts.
        Rollback is automatic on health check failure.

      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, imageTag, imageDigest, bump, confirmed]
              properties:
                version:
                  type: string
                  description: "Semantic version string of the target software release, e.g. `1.2.3`."
                imageTag:
                  type: string
                  description: "Docker image tag of the new release, e.g. `v1.2.3`."
                imageDigest:
                  type: string
                  description: "SHA256 content digest of the Docker image. Verified against the release pin file before applying."
                bump:
                  type: string
                  enum: [patch, minor, major]
                confirmed:
                  type: boolean
                  enum: [true]
                  description: "Must be true to prevent accidental calls"
      responses:
        '200':
          description: "Software update applied successfully. The instance pulled the new Docker image, executed all pending database migrations, and restarted. A post-migration health check was performed — if it failed, the system automatically rolled back to the previous image."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '400':
          description: "`confirmed` is `false` or absent; `imageDigest` does not match the pinned release manifest; `version` does not match the latest available version in the channel; or a pre-migration validation check failed."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── User settings ──────────────────────────────────────────────────────────
  /users/me:
    patch:
      operationId: updateMyProfile
      x-required-permissions: [runs:read]
      summary: Update current user profile
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer` (any authenticated user)

        Updates one or more profile fields for the authenticated user. All fields are optional;
        only the supplied fields are updated. Email changes are **not** accepted here — use the
        dedicated email-change flow with verification instead.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: "Display name shown in the UI and audit log entries."
                expert_mode:
                  type: boolean
                  description: "When `true`, advanced controls (e.g. manual gate overrides, raw cost breakdowns) are surfaced in the UI."
                ui_level:
                  type: string
                  enum: [GUIDED, STANDARD, ADVANCED]
                  description: "Interface complexity level. `GUIDED` hides advanced options, `STANDARD` is the default, `ADVANCED` exposes all controls."
              additionalProperties: false
      responses:
        '200':
          description: "Profile fields updated successfully."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
    delete:
      operationId: deleteMyAccount
      summary: Permanently delete own account (RGPD Art.17)
      description: |
        **RGPD Article 17 — Right to erasure ("right to be forgotten")**

        Permanently and irreversibly deletes the authenticated user's account.
        This operation cannot be undone.

        **Pseudonymization strategy (runs before deletion):**
        - FK-nullable fields (`Run.created_by`, `PipelineTemplate.created_by`, …) → `NULL`
        - Non-nullable identity fields in linked records → sentinel `"__deleted__"`
        - `AuditLog` actor fields are intentionally left unchanged (legal retention obligation)

        **Security requirements (double-confirmation pattern):**
        - Requires an active **session** — API keys are not accepted.
        - `password` must be the user's current password (re-authentication, Art.7 consent).
        - `confirm` must be the exact string `"DELETE MY ACCOUNT"` (typed confirmation to
          prevent accidental deletion — same UX as GitHub, Vercel, Stripe).

        **After deletion:** all sessions are invalidated immediately. The response includes
        `redirect: "/login"` so the client can clear local state and redirect.

        > **Note:** This endpoint is always active regardless of the RGPD maintenance
        > configuration (`PATCH /admin/rgpd`), as it implements a statutory right.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm]
              properties:
                password:
                  type: string
                  description: "User's current password. Required to prove unambiguous informed consent (RGPD Art.7). Verified via scrypt before any data is modified."
                confirm:
                  type: string
                  enum: ["DELETE MY ACCOUNT"]
                  description: "Must be the exact string `DELETE MY ACCOUNT`. Case-sensitive. Deliberate friction to prevent accidental account deletion."
              additionalProperties: false
      responses:
        '200':
          description: "Account deleted. All user data has been pseudonymized or removed. All active sessions are invalidated. The client should clear local state and redirect the user to the login page."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
                  message:
                    type: string
                    description: "Human-readable confirmation of the deletion."
                    example: "Your account has been permanently deleted."
                  redirect:
                    type: string
                    description: "Suggested redirect path for the client after clearing local session state."
                    example: "/login"
        '401':
          description: "No active session, or `password` does not match the user's stored credential."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: "`confirm` is not exactly `\"DELETE MY ACCOUNT\"`, or the account uses passkey/social login only (no password to verify). See `hint` in the response body for guidance."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          $ref: '#/components/responses/RateLimit'
  /users/me/data:
    get:
      operationId: exportMyData
      summary: Export personal data archive (RGPD Art.20)
      description: |
        **RGPD Article 20 — Right to data portability**

        Returns a JSON file containing all personal data held by the platform for the
        authenticated user (profile, projects, runs, templates, installed packs,
        preferences, API key metadata, audit activity).

        The response uses `Content-Disposition: attachment` so browsers download the file
        directly. The payload is never cached (`Cache-Control: private, no-store`).

        **Schema version:** `1.0` — the `schema_version` field in the JSON can be used
        by data-migration scripts when the export format is updated.

        > **Note:** This endpoint is always active regardless of the RGPD maintenance
        > configuration (`PATCH /admin/rgpd`), as it implements a statutory right.
      tags: [users]
      responses:
        '200':
          description: "JSON data archive. Contains all personal data for the authenticated user as a structured, machine-readable object."
          headers:
            Content-Disposition:
              description: "`attachment; filename=\"harmoven-data-export-YYYY-MM-DD.json\"`"
              schema:
                type: string
            Cache-Control:
              description: "`private, no-store` — PII must never be cached by a CDN or shared cache."
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                description: "Full personal data export. Top-level keys correspond to data categories. `schema_version` can be used to detect format changes."
                properties:
                  schema_version:
                    type: string
                    example: "1.0"
                  exported_at:
                    type: string
                    format: date-time
                  user:
                    type: object
                    description: "Core user profile (id, name, email, created_at, …)."
                  projects:
                    type: array
                    items:
                      type: object
                    description: "Projects owned by or memberships for this user."
                  pipeline_templates:
                    type: array
                    items:
                      type: object
                    description: "Pipeline templates created by this user."
                  runs:
                    type: array
                    items:
                      type: object
                    description: "Runs initiated by this user."
                  installed_packs:
                    type: array
                    items:
                      type: object
                    description: "Marketplace packs installed by this user."
                  user_preferences:
                    type: array
                    items:
                      type: object
                    description: "Inferred user preferences (expert mode, ui_level, …)."
                  api_keys:
                    type: array
                    items:
                      type: object
                    description: "API key metadata (no secrets — hashed keys are omitted)."
                  audit_activity:
                    type: array
                    items:
                      type: object
                    description: "Audit log entries where this user was the actor."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimit'
        '500':
          description: "An internal error prevented the export from being generated. The user's data is unaffected — retry is safe."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /users/me/locale:
    patch:
      operationId: updateLocale
      x-required-permissions: [runs:read]
      summary: Update current user locale preferences
      description: |
        > **Required permission:** `runs:read` — minimum role: `viewer`
        Updates `ui_locale` and/or `transparency_language`. Passing null resets to auto-detect.
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ui_locale:
                  type: [string, 'null']
                  example: fr
                transparency_language:
                  type: [string, 'null']
                  example: en
      responses:
        '200':
          description: "Locale preferences persisted to the user record. The new `ui_locale` is applied by the web app on the next page load. `transparency_language` controls the language in which intermediate agent reasoning is shown in the transparency panel."
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    description: "True if the operation completed successfully."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimit'
  # ── Webhooks (inbound) ─────────────────────────────────────────────────────
  /webhooks/{projectId}/{triggerId}:
    post:
      operationId: receiveWebhook
      summary: Receive inbound webhook trigger
      description: |
        Validates signature and fires an auto-run for the project.

        **Validation (all required):**
        - `X-Hub-Signature-256`: `sha256=<HMAC-SHA256 of "${timestamp}.${rawBody}">`
        - `X-Webhook-Timestamp`: Unix timestamp (seconds) — must be within 5 minutes of server
          time. **The timestamp is included in the signed message** so that a captured
          `(body, signature)` pair cannot be replayed with a fresh timestamp header.
        - `X-Webhook-Delivery`: Idempotency UUID — rejects duplicates (stored in `WebhookDelivery`)

        **Rate limit:** 60 requests per minute per IP per trigger endpoint — enforced before HMAC validation and DB queries. Excess returns `429` with `Retry-After`.

        **Safety gate:** max 20 auto-runs/day + $10/day cost globally.
      security: []
      tags: [triggers]
      parameters:
        - name: projectId
          in: path
          required: true
          description: "Project identifier scoping this webhook endpoint. Only triggers registered to this project will accept deliveries."
          schema:
            type: string
            format: uuid
        - name: triggerId
          in: path
          required: true
          description: "Trigger identifier. The incoming webhook payload is validated against this trigger's `webhook_secret` before a run is created."
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: "HMAC-SHA256 signature verified, `X-Webhook-Timestamp` within the 5-minute skew window, and `X-Webhook-Delivery` UUID is not a duplicate. A run has been queued for the project. The run ID is not returned synchronously — poll `GET /v1/runs?project_id=…` or subscribe to the project SSE stream to track it."
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    description: "Identifier of the parent run. Used to associate this resource with its execution context and to route SSE events."
                  message:
                    type: string
                    description: "Human-readable description of the event, error, or update."
        '400':
          description: "HMAC-SHA256 signature in `X-Hub-Signature-256` does not match `${X-Webhook-Timestamp}.${rawBody}`, or the `X-Webhook-Timestamp` is more than 5 minutes from the server's current UTC time, or `X-Webhook-Timestamp` is missing. Re-sign the request (using the new signed-message format) before retrying."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: "No trigger matches the `projectId`/`triggerId` combination, or the trigger exists but is disabled (`enabled: false`). Disabled triggers intentionally return 404 to prevent endpoint enumeration."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: "A delivery with this `X-Webhook-Delivery` UUID was already processed. The run was not created again. Re-deliveries with the same UUID are idempotently rejected to prevent duplicate runs."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: |
            Two distinct rate limits can trigger a 429 on this endpoint:
            1. **Per-IP rate limit:** 60 requests per minute per IP+trigger combination. Enforced before any DB query or HMAC check. Retry after the duration indicated by `Retry-After`.
            2. **Instance safety gate:** The instance-wide daily limit of 20 auto-runs or the $10/day cost cap has been reached. Both counters reset at UTC midnight.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

