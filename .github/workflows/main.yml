# .github/workflows/main.yml
# Amendment 88.3 — Level 2: Main branch pipeline
# Runs on every merge to main. Builds Docker image, integration tests, staging smoke.

name: Main Branch

on:
  push:
    branches: [main]

jobs:

  integration-tests:
    name: Integration tests (Haiku)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harmoven_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
        run: npx prisma migrate deploy
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/harmoven_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CI }}
          HARMOVEN_LLM_TIER: haiku
        run: npm run test:integration
        # ~$0.05 per run, 3-4 minutes

  build-docker:
    name: Build + push Docker image
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: harmoven
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            harmoven/app:${{ github.sha }}
            harmoven/app:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging-smoke:
    name: Staging smoke tests
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH key for staging
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H staging.harmoven.co >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/staging_key \
              -o StrictHostKeyChecking=no \
              deploy@staging.harmoven.co \
              "docker compose pull && docker compose up -d"
      - name: Wait for staging health check
        run: |
          for i in $(seq 1 12); do
            curl -sf https://staging.harmoven.co/api/health && break
            echo "Waiting... ($i/12)"
            sleep 5
          done
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests against staging
        run: npx playwright test --grep "@smoke" --project=chromium
        env:
          BASE_URL: https://staging.harmoven.co
        # 5 critical paths: login, create run, view gate, analytics, admin

  openapi-spec:
    name: Generate + commit OpenAPI spec
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate:openapi
      - name: Commit updated spec
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update OpenAPI spec [skip ci]"
          file_pattern: "docs/openapi.yaml"
